                            borders, width: { size: colWidths[i], type: WidthType.DXA },
                            shading: { fill: ri%2===0 ? "FFFFFF":"F8F9FA", type: ShadingType.CLEAR },
                            margins: { top: 80, bottom: 80, left: 160, right: 160 },
                            children: [new Paragraph({ children: [new TextRun({ text: String(cell), font: "Arial", size: 20, color: "374151" })] })]
                        })) }))
                    ]
                });

                // ── Detectar trimestre actual por fecha del sistema ────────
                // Trimestres del ITD:
                //   1° Ene–Mar  → meses ITD: Enero, Febrero, Marzo
                //   2° Abr–Jun  → meses ITD: Abril, Mayo, Junio
                //   3° Jul–Sep  → meses ITD: Julio, Agosto, Septiembre
                //   4° Oct–Dic  → meses ITD: Octubre, Noviembre, Diciembre
                const hoy = new Date();
                const mesActual = hoy.getMonth() + 1; // 1-12
                const anioActual = hoy.getFullYear();

                let numTrim, nombreTrim, mesesTrim, mesesKeys;
                if (mesActual <= 3) {
                    numTrim = 1; nombreTrim = "1er Trimestre";
                    mesesTrim = ["Enero", "Febrero", "Marzo"];
                } else if (mesActual <= 6) {
                    numTrim = 2; nombreTrim = "2° Trimestre";
                    mesesTrim = ["Abril", "Mayo", "Junio"];
                } else if (mesActual <= 9) {
                    numTrim = 3; nombreTrim = "3er Trimestre";
                    mesesTrim = ["Julio", "Agosto", "Septiembre"];
                } else {
                    numTrim = 4; nombreTrim = "4° Trimestre";
                    mesesTrim = ["Octubre", "Noviembre", "Diciembre"];
                }
                // Claves de periodTrend para este trimestre y año
                mesesKeys = mesesTrim.map(m => `${anioActual}-${m}`);

                const pTrend = statsData.periodTrend || {};

                // Filtrar solo los periodos del trimestre actual (los que existan en los datos)
                const mesesDelTrimestre = mesesTrim
                    .map((m, i) => ({ label: `${m} ${anioActual}`, key: mesesKeys[i] }))
                    .filter(m => pTrend[m.key]);

                // Calcular totales SOLO sumando los periodos del trimestre actual
                // Si no hay desglose por periodo se usan los datos globales de statsData
                // (que el servidor ya filtra según el periodo seleccionado)
                let totalInscTrim = 0, totalDocTrim = 0;
                if (mesesDelTrimestre.length > 0) {
                    mesesDelTrimestre.forEach(m => {
                        totalInscTrim += pTrend[m.key]?.registros ?? 0;
                        totalDocTrim  += pTrend[m.key]?.cursos   ?? 0;
                    });
                }

                // KPIs globales del periodo (el servidor ya devuelve solo el periodo ACTUAL)
                const trimData = {
                    totalInscripciones: statsData.totalInscripciones ?? "—",
                    actualizados:       statsData.coberturaDocente?.actualizados ?? "—",
                    porcentaje:         statsData.coberturaDocente?.porcentaje   ?? "—",
                    hombres:  statsData.distribucionGenero?.Hombres  ?? statsData.distribucionGenero?.hombres  ?? "—",
                    mujeres:  statsData.distribucionGenero?.Mujeres  ?? statsData.distribucionGenero?.mujeres  ?? "—",
                    profesional: statsData.distribucionTipo?.Profesional ?? statsData.distribucionTipo?.profesional ?? "—",
                    docente:     statsData.distribucionTipo?.Docente     ?? statsData.distribucionTipo?.docente     ?? "—",
                    sinTotal:    statsData.docentesNoParticiparon?.total   ?? "—",
                    sinHombres:  statsData.docentesNoParticiparon?.hombres ?? "—",
                    sinMujeres:  statsData.docentesNoParticiparon?.mujeres ?? "—",
                };

                const tituloTrim   = `${nombreTrim} ${anioActual}`;
                const mesesRango   = `${mesesTrim[0]}–${mesesTrim[2]} ${anioActual}`;
                const nombreArchivo = `Informe_Trimestral_${numTrim}T_${anioActual}.docx`;

                const children = [];

                // ── MEMBRETE ───────────────────────────────────────────────
                children.push(para("Instituto Tecnológico de Durango", { bold: true, size: 28, color: "1B396A", align: AlignmentType.CENTER, before: 0, after: 40 }));
                children.push(para("Departamento de Desarrollo Académico", { size: 22, color: "555555", align: AlignmentType.CENTER, before: 0, after: 40 }));
                children.push(sep());

                // ── DATOS DEL OFICIO ──────────────────────────────────────
                children.push(para(`Durango, Dgo., ${dateStr}`, { align: AlignmentType.RIGHT, before: 80, after: 40 }));
                children.push(para("C. MÓNICA ROSALES PÉREZ", { bold: true }));
                children.push(para("JEFA DEL DEPTO. DESARROLLO ACADÉMICO", { bold: true }));
                children.push(para("PRESENTE", { bold: true, after: 200 }));

                // ── CUERPO DEL OFICIO ─────────────────────────────────────
                children.push(para(
                    `Sirva la presente para informarle que durante el ${tituloTrim} (${mesesRango}), el programa de Formación y Actualización Docente presenta los siguientes resultados:`,
                    { after: 200 }
                ));

                // ── SECCIÓN 1: KPIs del trimestre ─────────────────────────
                children.push(heading(`1. Resumen de Indicadores — ${tituloTrim}`));
                children.push(kpiTable([
                    ["Total de Inscripciones",        trimData.totalInscripciones],
                    ["Docentes Únicos Actualizados",   trimData.actualizados],
                    ["Cobertura de Plantilla Docente", trimData.porcentaje !== "—" ? `${trimData.porcentaje}%` : "—"],
                ]));
                children.push(new Paragraph({ spacing: { before: 80, after: 80 } }));

                // ── SECCIÓN 2: Periodos del trimestre (solo los 3 meses) ──
                if (mesesDelTrimestre.length > 0) {
                    children.push(heading(`2. Distribución por Periodo (${mesesRango})`));
                    children.push(dataTable(
                        ["Periodo", "Cursos Ofertados", "Participantes"],
                        mesesDelTrimestre.map(m => [
                            m.label,
                            pTrend[m.key]?.cursos    ?? "—",
                            pTrend[m.key]?.registros ?? "—"
                        ]),
                        [3000, 3180, 3180]
                    ));
                    children.push(new Paragraph({ spacing: { before: 80, after: 80 } }));
                }

                // ── SECCIÓN 3: Género y Tipo de Curso ─────────────────────
                children.push(heading("3. Distribución por Género y Tipo de Curso"));
                children.push(dataTable(
                    ["Categoría", "Hombres", "Mujeres", "Total"],
                    [["Inscripciones por género", String(trimData.hombres), String(trimData.mujeres), String(trimData.totalInscripciones)]],
                    [3600, 1920, 1920, 1920]
                ));
                children.push(new Paragraph({ spacing: { before: 120, after: 80 } }));
                children.push(dataTable(
                    ["Tipo de Curso", "Cantidad"],
                    [
                        ["Profesional", String(trimData.profesional)],
                        ["Docente",     String(trimData.docente)],
                        ["Total",       String(trimData.totalInscripciones)],
                    ],
                    [6480, 2880]
                ));
                children.push(new Paragraph({ spacing: { before: 80, after: 80 } }));

                // ── SECCIÓN 4: Top 10 Cursos del trimestre ─────────────────
                if (statsData.topCursos?.length) {
                    children.push(heading(`4. Cursos Más Demandados — ${tituloTrim}`));
                    children.push(dataTable(
                        ["#", "Nombre del Curso", "Inscripciones"],
                        statsData.topCursos.slice(0, 10).map(([nombre, n], i) => [`${i+1}`, nombre, n]),
                        [600, 6960, 1800]
                    ));
                    children.push(new Paragraph({ spacing: { before: 80, after: 80 } }));
                }

                // ── SECCIÓN 5: Docentes sin participación (solo cifras) ───
                children.push(heading("5. Docentes sin Participación"));
                children.push(kpiTable([
                    ["Total sin participación", trimData.sinTotal],
                    ["Hombres",                 trimData.sinHombres],
                    ["Mujeres",                 trimData.sinMujeres],
                ]));
                children.push(new Paragraph({ spacing: { before: 80, after: 80 } }));

                // ── CIERRE ─────────────────────────────────────────────────
                children.push(para(
                    `Los indicadores muestran una participación relevante en las actividades de actualización docente, alcanzando una cobertura del ${trimData.porcentaje}%. No obstante, se identifican ${trimData.sinTotal} docentes sin participación, lo que representa una oportunidad para fortalecer estrategias de inclusión y ampliar la cobertura en próximos periodos.`,
                    { after: 320 }
                ));
                children.push(para("A T E N T A M E N T E", { bold: true, align: AlignmentType.CENTER, before: 200, after: 40 }));
                children.push(para("Excelencia en Educación Tecnológica®", { italic: true, align: AlignmentType.CENTER, after: 40 }));
                children.push(para("La Técnica al Servicio de la Patria", { italic: true, align: AlignmentType.CENTER, after: 400 }));
                children.push(para("C. ALEJANDRO CALDERÓN RENTERÍA", { bold: true, align: AlignmentType.CENTER, after: 40 }));
                children.push(para("COORDINACIÓN DE ACTUALIZACIÓN DOCENTE", { bold: true, align: AlignmentType.CENTER, after: 40 }));
                children.push(sep());
                children.push(para("M.C. Alejandro Calderón Rentería — Coordinación de Actualización Docente", { align: AlignmentType.CENTER, color: "888888", size: 18 }));

                const doc = new Document({
                    creator: "ITD - Desarrollo Académico",
                    title: `Informe Trimestral de Actualización Docente — ${tituloTrim}`,
                    styles: { default: { document: { run: { font: "Arial", size: 22 } } } },
                    sections: [{ properties: { page: { size: { width: 12240, height: 15840 }, margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 } } }, children }]
                });

                const blob = await Packer.toBlob(doc);
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = nombreArchivo;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a); URL.revokeObjectURL(url);

            } catch (err) {
                console.error("Error generando Informe Trimestral:", err);
                alert("Error al generar el documento:\n" + err.message);
            } finally {
                setGeneratingPDF(false);
            }
        };

        // ── NUEVO: Word Completo (todos los cursos) ─────────────────────
        const generateWordCompleto = async () => {
            if (!statsData) { alert("No hay datos cargados aún."); return; }
            setGeneratingPDF(true);
            try {
                const docxLib = window.docx;
                if (!docxLib) throw new Error("Librería docx no cargada.");
                const {
                    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
                    AlignmentType, WidthType, BorderStyle, ShadingType
                } = docxLib;

                const dateStr = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });
                const cellBorder = { style: BorderStyle.SINGLE, size: 1, color: "CCCCCC" };
                const borders = { top: cellBorder, bottom: cellBorder, left: cellBorder, right: cellBorder, insideH: cellBorder, insideV: cellBorder };

                const sep = () => new Paragraph({ border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: "9D2449", space: 1 } }, spacing: { before: 60, after: 180 } });
                const title = (text) => new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 120 }, children: [new TextRun({ text, bold: true, color: "1B396A", font: "Arial", size: 32 })] });
                const subtitle = (text) => new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 80 }, children: [new TextRun({ text, bold: true, color: "9D2449", font: "Arial", size: 26 })] });
                const caption = (text) => new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 0, after: 320 }, children: [new TextRun({ text, color: "888888", font: "Arial", size: 20 })] });
                const heading = (text) => new Paragraph({ spacing: { before: 320, after: 120 }, children: [new TextRun({ text, bold: true, color: "1B396A", font: "Arial", size: 28 })], border: { bottom: { style: BorderStyle.SINGLE, size: 2, color: "D5E8F0", space: 1 } } });
                const spacer = () => new Paragraph({ spacing: { before: 40, after: 40 } });

                const kpiTable = (rows) => new Table({
                    width: { size: 9360, type: WidthType.DXA }, columnWidths: [5760, 3600],
                    rows: rows.map(([label, value]) => new TableRow({ children: [
                        new TableCell({ borders, width: { size: 5760, type: WidthType.DXA }, shading: { fill: "EEF4FB", type: ShadingType.CLEAR }, margins: { top: 100, bottom: 100, left: 160, right: 160 }, children: [new Paragraph({ children: [new TextRun({ text: String(label), font: "Arial", size: 22, color: "374151" })] })] }),
                        new TableCell({ borders, width: { size: 3600, type: WidthType.DXA }, shading: { fill: "FFFFFF", type: ShadingType.CLEAR }, margins: { top: 100, bottom: 100, left: 160, right: 160 }, children: [new Paragraph({ alignment: AlignmentType.RIGHT, children: [new TextRun({ text: String(value), font: "Arial", size: 24, bold: true, color: "9D2449" })] })] })
                    ]}))
                });

                const dataTable = (headers, rows, colWidths) => new Table({
                    width: { size: colWidths.reduce((a,b)=>a+b,0), type: WidthType.DXA }, columnWidths: colWidths,
                    rows: [
                        new TableRow({ tableHeader: true, children: headers.map((h,i) => new TableCell({ borders, width: { size: colWidths[i], type: WidthType.DXA }, shading: { fill: "1B396A", type: ShadingType.CLEAR }, margins: { top: 100, bottom: 100, left: 160, right: 160 }, children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, color: "FFFFFF", font: "Arial", size: 20 })] })] })) }),
                        ...rows.map((row, ri) => new TableRow({ children: row.map((cell,i) => new TableCell({ borders, width: { size: colWidths[i], type: WidthType.DXA }, shading: { fill: ri%2===0?"FFFFFF":"F8F9FA", type: ShadingType.CLEAR }, margins: { top: 80, bottom: 80, left: 160, right: 160 }, children: [new Paragraph({ children: [new TextRun({ text: String(cell), font: "Arial", size: 20, color: "374151" })] })] })) }))
                    ]
                });

                const children = [];

                // Portada
                children.push(spacer(), spacer(), spacer());
                children.push(title("INSTITUTO TECNOLÓGICO DE DURANGO"));
                children.push(subtitle("Coordinación de Actualización Docente"));
                children.push(spacer());
                children.push(sep());
                children.push(subtitle("Reporte Estadístico Completo"));
                children.push(caption(`Generado el ${dateStr}`));

                // 1. KPIs
                children.push(heading("1. Indicadores Clave de Desempeño"));
                children.push(kpiTable([
                    ["Total de Inscripciones", statsData.totalInscripciones ?? "—"],
                    ["Docentes Únicos Actualizados", statsData.coberturaDocente?.actualizados ?? "—"],
                    ["Cobertura de Plantilla Docente", statsData.coberturaDocente?.porcentaje != null ? `${statsData.coberturaDocente.porcentaje}%` : "—"],
                ]));
                children.push(spacer());

                // 2. TODOS LOS CURSOS con participantes
                if (statsData.topCursos?.length) {
                    children.push(heading(`2. Todos los Cursos y Número de Participantes (${statsData.topCursos.length} cursos)`));
                    children.push(dataTable(
                        ["#", "Nombre del Curso", "Participantes"],
                        statsData.topCursos.map(([nombre, n], i) => [`${i+1}`, nombre, n]),
                        [600, 6960, 1800]
                    ));
                    children.push(spacer());
                }

                // 3. Departamentos
                if (statsData.topDepartamentos?.length) {
                    children.push(heading("3. Participación por Departamento"));
                    children.push(dataTable(
                        ["#", "Departamento", "Total"],
                        statsData.topDepartamentos.map(([dept, n], i) => [`${i+1}`, dept, n]),
                        [600, 6960, 1800]
                    ));
                    children.push(spacer());
                }

                // 4. Género
                if (statsData.distribucionGenero) {
                    children.push(heading("4. Distribución por Género"));
                    children.push(kpiTable(Object.entries(statsData.distribucionGenero)));
                    children.push(spacer());
                }

                // 5. Tipo de Curso
                if (statsData.distribucionTipo) {
                    children.push(heading("5. Tipo de Curso"));
                    children.push(kpiTable(Object.entries(statsData.distribucionTipo)));
                    children.push(spacer());
                }

                // 6. Frecuencia
                if (statsData.frecuenciaParticipacion) {
                    children.push(heading("6. Cursos por Docente (Frecuencia de Participación)"));
                    children.push(dataTable(
                        ["Cursos Tomados", "Número de Docentes"],
                        Object.entries(statsData.frecuenciaParticipacion),
                        [4680, 4680]
                    ));
                    children.push(spacer());
                }

                // 7. Histórico
                if (statsData.historicalTrend) {
                    children.push(heading("7. Evolución Histórica por Año"));
                    const years = Object.keys(statsData.historicalTrend).sort();
                    children.push(dataTable(
                        ["Año", "Cursos Ofertados", "Total Docentes"],
                        years.map(y => [y, statsData.historicalTrend[y]?.cursos ?? 0, statsData.historicalTrend[y]?.registros ?? 0]),
                        [2340, 3510, 3510]
                    ));
                    children.push(spacer());
                }

                // 8. Docentes sin participación
                if (statsData.docentesNoParticiparon?.total > 0) {
                    const np = statsData.docentesNoParticiparon;
                    children.push(heading("8. Docentes que No Participaron en el Periodo"));
                    children.push(kpiTable([
                        ["Total de docentes sin participación", np.total],
                        ["Hombres", np.hombres],
                        ["Mujeres", np.mujeres],
                    ]));
                    children.push(spacer());
                    if (np.lista?.length > 0) {
                        children.push(new Paragraph({ spacing: { before: 160, after: 100 }, children: [new TextRun({ text: "Listado de docentes sin participación:", bold: true, font: "Arial", size: 22, color: "374151" })] }));
                        children.push(dataTable(
                            ["#", "Nombre del Docente", "Departamento"],
                            np.lista.map((d, i) => [`${i+1}`, d.nombre, d.departamento]),
                            [500, 5500, 3360]
                        ));
                    }
                    children.push(spacer());
                }

                // Pie
                children.push(sep());
                children.push(new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "M.C. Alejandro Calderón Rentería — Coordinación de Actualización Docente", font: "Arial", size: 18, color: "888888" })] }));

                const doc = new Document({
                    creator: "ITD - Desarrollo Académico",
                    title: "Reporte Estadístico Completo de Actualización Docente",
                    styles: { default: { document: { run: { font: "Arial", size: 22 } } } },
                    sections: [{ properties: { page: { size: { width: 12240, height: 15840 }, margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 } } }, children }]
                });

                const blob = await Packer.toBlob(doc);
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = `Reporte_Completo_Todos_Los_Cursos_${period}.docx`;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a); URL.revokeObjectURL(url);

            } catch (err) {
                console.error("Error generando Reporte Completo:", err);
                alert("Error al generar el documento:\n" + err.message);
            } finally {
                setGeneratingPDF(false);
            }
        };

        const generateCourseEvolutionData = () => {
            if (!statsData || !statsData.periodTrend || !statsData.historicalTrend) return { labels: [], datasets: [] };
            
            const pTrend = statsData.periodTrend;
            const hTrend = statsData.historicalTrend;
            
            const sortedYears = Object.keys(hTrend).sort();
            
            const labels = [];
            const dataValues = [];
            const bgColors = [];

            sortedYears.forEach(year => {
                const total = hTrend[year]?.cursos || 0;
                const ene = pTrend[`${year}-Enero`]?.cursos || 0;
                const jun = pTrend[`${year}-Junio`]?.cursos || 0;
                const ago = pTrend[`${year}-Agosto`]?.cursos || 0;

                labels.push(`Total '${year.substring(2)}`, 'Ene', 'Jun', 'Ago');
                dataValues.push(total, ene, jun, ago);
                
                bgColors.push('#1e3a8a'); // Navy para Total
                bgColors.push('#f472b6'); // Pink para Ene
                bgColors.push('#3b82f6'); // Blue para Jun
                bgColors.push('#fbbf24'); // Yellow para Ago
            });

            return {
                labels: labels,
                datasets: [{
                    label: 'Cursos Ofertados',
                    data: dataValues,
                    backgroundColor: bgColors,
                    borderRadius: 4,
                    barPercentage: 0.6,
                    categoryPercentage: 0.8
                }]
            };
        };

        const generateTeacherEvolutionData = () => {
            if (!statsData || !statsData.historicalTrend) return { labels: [], datasets: [] };
            
            const years = Object.keys(statsData.historicalTrend).sort();
            const colors = ['#4f46e5', '#06b6d4', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981']; 
            
            return {
                labels: years,
                datasets: [{
                    label: 'Total Docentes',
                    data: years.map(y => statsData.historicalTrend[y].registros),
                    backgroundColor: years.map((_, i) => colors[i % colors.length]),
                    borderRadius: 6,
                    barPercentage: 0.5,
                    maxBarThickness: 50
                }]
            };
        };

        // --- RELOJ DE CARGA (LOADER) ---
        if (loading) {
            return (
                <div className="flex justify-center items-center h-full flex-col">
                    <div className="loader-spinner"></div>
                    <p className="text-[#1B396A] font-bold text-lg animate-pulse">Cargando estadísticas...</p>
                </div>
            );
        }

        return (
            <div className="p-6 max-w-7xl mx-auto animate-fadeIn relative">
                {/* Modal de Generando PDF */}
                {generatingPDF && (
                    <div className="pdf-overlay">
                        <div className="pdf-modal">
                            <div className="loader-spinner"></div>
                            <h3 className="text-xl font-bold text-gray-800 mb-2">Generando Reporte</h3>
                            <p className="text-gray-500">Por favor espere, procesando datos...</p>
                        </div>
                    </div>
                )}

                {/* Encabezado del Dashboard */}
                <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-xl shadow-md border-l-4 border-[#1B396A]">
                    <div>
                        <h2 className="text-2xl md:text-3xl font-bold text-gray-800">
                            Dashboard Estratégico
                        </h2>
                        <p className="text-gray-500 mt-1">
                            Análisis de datos de actualización docente. Usuario: <span className="font-semibold text-[#1B396A]">{user.name}</span>
                        </p>
                    </div>
                    <div className="flex gap-3">
                        <div className="relative">
                            <select 
                                value={period} 
                                onChange={(e) => setPeriod(e.target.value)}
                                className="appearance-none bg-gray-50 border border-gray-300 text-gray-700 py-2 px-4 pr-8 rounded-lg leading-tight focus:outline-none focus:bg-white focus:border-[#1B396A] font-bold cursor-pointer hover:bg-gray-100 transition-colors shadow-sm"
                            >
                                <option value="ACTUAL">🟢 Periodo Actual</option>
                                {availableYears.map(y => <option key={y} value={y}>📅 Año {y}</option>)}
                            </select>
                            <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                                <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                            </div>
                        </div>
                        <button onClick={generatePDF} className="bg-[#9D2449] hover:bg-[#801d3a] text-white font-bold py-2 px-6 rounded-lg shadow transition-all transform hover:scale-105 flex items-center gap-2">
                            <span>📄</span> PDF
                        </button>
                        <button onClick={generateWord} className="bg-[#1B396A] hover:bg-[#142b52] text-white font-bold py-2 px-6 rounded-lg shadow transition-all transform hover:scale-105 flex items-center gap-2">
                            <span>📝</span> Word
                        </button>
                        <button onClick={generateWordTrimestral} className="bg-[#7B3F00] hover:bg-[#5c2f00] text-white font-bold py-2 px-6 rounded-lg shadow transition-all transform hover:scale-105 flex items-center gap-2" title="Informe formal trimestral Ene-Mar 2026">
                            <span>📋</span> Informe Trimestral
                        </button>
                        <button onClick={generateWordCompleto} className="bg-[#2E7D32] hover:bg-[#1b5e20] text-white font-bold py-2 px-6 rounded-lg shadow transition-all transform hover:scale-105 flex items-center gap-2" title="Todos los cursos con participantes">
                            <span>📊</span> Word Completo
                        </button>
                        <button onClick={onLogout} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg transition-colors">
                            Salir
                        </button>
                    </div>
                </div>

                {/* KPIs */}
                <div id="kpi-section" className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div className="bg-white p-6 rounded-xl shadow-md border-b-4 border-blue-600 flex items-center justify-between">
                        <div>
                            <p className="text-gray-500 text-xs font-bold uppercase tracking-wider">Total Inscripciones</p>
                            <p className="text-3xl font-bold text-gray-800 mt-1">{statsData.totalInscripciones}</p>
                        </div>
                        <div className="text-3xl bg-blue-100 p-3 rounded-full text-blue-600">📝</div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-md border-b-4 border-green-500 flex items-center justify-between">
                        <div>
                            <p className="text-gray-500 text-xs font-bold uppercase tracking-wider">Docentes Únicos</p>
                            <p className="text-3xl font-bold text-gray-800 mt-1">{statsData.coberturaDocente.actualizados}</p>
                        </div>
                        <div className="text-3xl bg-green-100 p-3 rounded-full text-green-600">👥</div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-md border-b-4 border-yellow-500 flex items-center justify-between">
                        <div>
                            <p className="text-gray-500 text-xs font-bold uppercase tracking-wider">Cobertura Plantilla</p>
                            <p className="text-3xl font-bold text-gray-800 mt-1">{statsData.coberturaDocente.porcentaje}%</p>
                        </div>
                        <div className="text-3xl bg-yellow-100 p-3 rounded-full text-yellow-600">🏫</div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-md border-b-4 border-red-500 flex items-center justify-between">
                        <div>
                            <p className="text-gray-500 text-xs font-bold uppercase tracking-wider">Sin Participar</p>
                            <p className="text-3xl font-bold text-gray-800 mt-1">{statsData.docentesNoParticiparon?.total ?? '—'}</p>
                            {statsData.docentesNoParticiparon?.total > 0 && (
                                <p className="text-xs text-gray-400 mt-1">
                                    H: {statsData.docentesNoParticiparon.hombres} &nbsp;|&nbsp; M: {statsData.docentesNoParticiparon.mujeres}
                                </p>
                            )}
                        </div>
                        <div className="text-3xl bg-red-100 p-3 rounded-full text-red-500">🚫</div>
                    </div>
                </div>

                {/* Sección Principal de Gráficas: AHORA CADA UNA EN SU PROPIA FILA (Full Width) */}
                <div className="mb-8 space-y-8">
                    {/* Top Cursos - ANCHO COMPLETO */}
                    <div className="w-full">
                        <ChartBox 
                            id="topCursos"
                            type="bar" 
                            title="📚 Cursos Más Demandados" 
                            data={Object.fromEntries(statsData.topCursos.slice(0, 10))} 
                            horizontal={true}
                            minHeight={getChartHeight(10)}
                        />
                    </div>
                    
                    {/* Top Departamentos - ANCHO COMPLETO */}
                    <div className="w-full">
                        <ChartBox 
                            id="topDeptos"
                            type="bar" 
                            title="🏢 Participación por Departamento" 
                            data={Object.fromEntries(statsData.topDepartamentos)} 
                            shortenLabels={true}
                            horizontal={true}
                            minHeight={getChartHeight(statsData.topDepartamentos.length)}
                        />
                    </div>
                </div>

                {/* Sección Secundaria */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                    <div className="md:col-span-1">
                        <ChartBox 
                            id="genero" 
                            type="doughnut" 
                            title="👥 Distribución por Género" 
                            data={statsData.distribucionGenero}
                            customColors={['#36A2EB', '#FF6384']} // Azul y Rosa
                        />
                    </div>
                    <div className="md:col-span-1">
                        <ChartBox 
                            id="tipo" 
                            type="pie" 
                            title="📋 Tipo de Curso" 
                            data={statsData.distribucionTipo}
                            customColors={['#10b981', '#f59e0b']} // Esmeralda y Ámbar
                        />
                    </div>
                    <div className="md:col-span-1">
                        <ChartBox id="frecuencia" type="bar" title="📈 Cursos por Docente" data={statsData.frecuenciaParticipacion} />
                    </div>
                </div>

                {/* Evolución Histórica */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                    <ChartBox 
                        id="historico"
                        type="bar" 
                        title="📅 Cursos Ofertados (Periodos vs Total Anual)" 
                        data={generateCourseEvolutionData()} 
                        isHistory={true}
                    />
                    <ChartBox 
                        id="docentesYear"
                        type="bar" 
                        title="👨‍🏫 Total Docentes por Año" 
                        data={generateTeacherEvolutionData()} 
                        isHistory={true}
                    />
                </div>
            </div>
        );
    };

    // ====================================================================
    // COMPONENTE PRINCIPAL: App
    // ====================================================================
    const App = () => {
        const [user, setUser] = React.useState(null);
        const [loginError, setLoginError] = React.useState('');

        const handleLogin = (response) => {
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                if (['alejandro.calderon@itdurango.edu.mx', 'desarrollo.academico@itdurango.edu.mx'].includes(payload.email)) {
                    setUser({ name: payload.name, email: payload.email, picture: payload.picture });
                } else {
                    setLoginError("Acceso denegado: Cuenta no autorizada para ver estadísticas.");
                }
            } catch (error) {
                setLoginError("Error de autenticación.");
            }
        };

        const handleLogout = () => {
            setUser(null);
            setLoginError('');
            if (window.google) window.google.accounts.id.disableAutoSelect();
        };

        if (!user) return <Login onLogin={handleLogin} loginError={loginError} />;
        return <Dashboard user={user} onLogout={handleLogout} />;
    };

    // Renderizado
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
