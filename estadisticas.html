    .loader-spinner {
        width: 64px; height: 64px;

        background: rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .loader-spinner::before {
        content: '';
        position: absolute;
        width: 8px; height: 8px;
        background: #1B396A;
        border-radius: 50%;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
    }

    .loader-spinner::after {
        content: '';
        position: absolute;
        width: 4px; height: 24px;
        background: #9D2449;
        top: 50%; left: 50%;
        margin-left: -2px;
        margin-top: -24px;
        transform-origin: bottom center;
        border-radius: 2px;
        animation: spin 2s linear infinite;

    var shortenLabel = function(label) {
        if (!label) return '';
        return label
            .replace(/DEPARTAMENTO DE /gi, 'DEPTO. ')
            .replace(/DEPARTAMENTO/gi, 'DEPTO.')
            .replace(/DIVISION DE ESTUDIOS DE /gi, 'DIV. ')
            .replace(/DIVISION DE /gi, 'DIV. ')
            .replace(/CENTRO DE INFORMACIÓN/gi, 'C. Información')
            .replace(/CENTRO DE /gi, 'C. ')
            .replace(/INGENIERÍA/gi, 'ING.')
            .replace(/CIENCIAS/gi, 'CIENCIAS.')
            .replace(/ECONOMICO-ADMINISTRATIVAS/gi, 'ECO-ADMIN')
            .trim();
    };

    var getChartHeight = function(count) {
        return Math.max(400, count * 35) + "px";
    };

    var getImageDataFromURL = function(url) {
        return new Promise(function(resolve) {
            var img = new Image(); 
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                var canvas = document.createElement('canvas'); 
                canvas.width = img.width; 
                canvas.height = img.height;
                var ctx = canvas.getContext('2d'); 
                ctx.drawImage(img, 0, 0);
                try { resolve(canvas.toDataURL('image/png')); } 
                catch (e) { resolve(null); }
            };
            img.onerror = function() { resolve(null); }; 
            img.src = url;
        });
    };

    // --- GENERAR PDF COMPLETO ---
    var generatePDF = function(statsData, period, setGeneratingPDF) {
        setGeneratingPDF(true);
        setTimeout(function() {
            try {
                var jsPDF = window.jspdf.jsPDF;
                var pdf = new jsPDF('p', 'mm', 'letter');
                var pdfWidth = pdf.internal.pageSize.getWidth();
                var margin = 12;
                
                // Encabezado
                pdf.setFillColor(27, 57, 106);
                pdf.rect(0, 0, pdfWidth, 20, 'F');
                pdf.setFontSize(14);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(255, 255, 255);
                pdf.text('INSTITUTO TECNOLÓGICO DE DURANGO', pdfWidth / 2, 12, { align: 'center' });
                pdf.setFontSize(9);
                pdf.setFont('helvetica', 'normal');
                pdf.text('Coordinación de Actualización Docente', pdfWidth / 2, 18, { align: 'center' });
                
                // Título
                pdf.setFontSize(16);
                pdf.setTextColor(157, 36, 73);
                pdf.text('REPORTE ESTADÍSTICO', pdfWidth / 2, 35, { align: 'center' });
                pdf.setFontSize(10);
                pdf.setTextColor(80, 80, 80);
                pdf.text('Periodo: ' + period, pdfWidth / 2, 42, { align: 'center' });
                
                // Fecha
                var today = new Date().toLocaleDateString('es-MX');
                pdf.setFontSize(8);
                pdf.setTextColor(120, 120, 120);
                pdf.text('Generado: ' + today, pdfWidth - margin, 50, { align: 'right' });
                
                // KPIs
                var y = 60;
                pdf.setFontSize(10);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(27, 57, 106);
                pdf.text('INDICADORES CLAVE', margin, y);
                y += 6;
                
                var kpis = [
                    ['Total Inscripciones', statsData.totalInscripciones || 0],
                    ['Docentes Únicos', statsData.coberturaDocente?.actualizados || 0],
                    ['Cobertura', (statsData.coberturaDocente?.porcentaje || 0) + '%'],
                    ['Sin Participar', statsData.docentesNoParticiparon?.total || 0]
                ];
                
                pdf.setFontSize(9);
                pdf.setFont('helvetica', 'normal');
                pdf.setTextColor(60, 60, 60);
                kpis.forEach(function(kpi) {
                    pdf.text(kpi[0] + ':', margin + 10, y);
                    pdf.setFont('helvetica', 'bold');
                    pdf.setTextColor(157, 36, 73);
                    pdf.text(String(kpi[1]), margin + 60, y);
                    pdf.setFont('helvetica', 'normal');
                    pdf.setTextColor(60, 60, 60);
                    y += 6;
                });
                
                // Top Cursos
                y += 6;
                pdf.setFontSize(10);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(27, 57, 106);
                pdf.text('CURSOS MÁS DEMANDADOS', margin, y);
                y += 6;
                
                pdf.setFontSize(8);
                pdf.setFont('helvetica', 'normal');
                pdf.setTextColor(60, 60, 60);
                var topCursos = statsData.topCursos || [];
                topCursos.slice(0, 10).forEach(function(curso, i) {
                    pdf.text((i + 1) + '. ' + curso[0], margin + 10, y);
                    pdf.setFont('helvetica', 'bold');
                    pdf.setTextColor(157, 36, 73);
                    pdf.text(String(curso[1]), margin + 130, y);
                    pdf.setFont('helvetica', 'normal');
                    pdf.setTextColor(60, 60, 60);
                    y += 5;
                });
                
                // Departamento
                y += 6;
                pdf.setFontSize(10);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(27, 57, 106);
                pdf.text('PARTICIPACIÓN POR DEPARTAMENTO', margin, y);
                y += 6;
                
                pdf.setFontSize(8);
                pdf.setFont('helvetica', 'normal');
                pdf.setTextColor(60, 60, 60);
                var deptos = statsData.topDepartamentos || [];
                deptos.slice(0, 10).forEach(function(depto) {
                    pdf.text(depto[0], margin + 10, y);
                    pdf.setFont('helvetica', 'bold');
                    pdf.setTextColor(157, 36, 73);
                    pdf.text(String(depto[1]), margin + 130, y);
                    pdf.setFont('helvetica', 'normal');
                    pdf.setTextColor(60, 60, 60);
                    y += 5;
                });
                
                // Pie de página
                var pageCount = pdf.internal.getNumberOfPages();
                for (var i = 1; i <= pageCount; i++) {
                    pdf.setPage(i);
                    pdf.setFontSize(7);
                    pdf.setTextColor(150, 150, 150);
                    pdf.text('Página ' + i + ' de ' + pageCount, pdfWidth / 2, pdf.internal.pageSize.getHeight() - 8, { align: 'center' });
                }
                
                pdf.save('Reporte_Estadistico_' + period + '.pdf');
                alert('✅ PDF generado correctamente');
            } catch (error) {
                console.error('Error:', error);
                alert('Error al generar PDF: ' + error.message);
            }
            setGeneratingPDF(false);
        }, 600);
    };

    // --- GENERAR WORD (Informe Completo) ---
    var generateWord = function(statsData, period) {
        try {
            var docxLib = window.docx;
            if (!docxLib) throw new Error('Librería docx no cargada');
            
            var Document = docxLib.Document;
            var Packer = docxLib.Packer;
            var Paragraph = docxLib.Paragraph;
            var TextRun = docxLib.TextRun;
            var Table = docxLib.Table;
            var TableRow = docxLib.TableRow;
            var TableCell = docxLib.TableCell;
            var AlignmentType = docxLib.AlignmentType;
            var WidthType = docxLib.WidthType;
            var BorderStyle = docxLib.BorderStyle;
            
            var cellBorder = { style: BorderStyle.SINGLE, size: 1, color: 'CCCCCC' };
            var borders = { top: cellBorder, bottom: cellBorder, left: cellBorder, right: cellBorder, insideH: cellBorder, insideV: cellBorder };
            
            var children = [];
            
            // Título
            children.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { before: 200, after: 100 },
                children: [new TextRun({ text: 'INSTITUTO TECNOLÓGICO DE DURANGO', bold: true, color: '1B396A', font: 'Arial', size: 32 })]
            }));
            children.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { before: 0, after: 80 },
                children: [new TextRun({ text: 'Coordinación de Actualización Docente', bold: true, color: '9D2449', font: 'Arial', size: 24 })]
            }));
            
            // Fecha
            var today = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });
            children.push(new Paragraph({
                alignment: AlignmentType.RIGHT,
                spacing: { before: 40, after: 80 },
                children: [new TextRun({ text: 'Generado: ' + today, color: '888888', font: 'Arial', size: 18 })]
            }));
            
            // KPIs
            children.push(new Paragraph({
                spacing: { before: 120, after: 80 },
                children: [new TextRun({ text: '1. INDICADORES CLAVE', bold: true, color: '1B396A', font: 'Arial', size: 24 })]
            }));
            
            var kpiRows = [
                ['Total Inscripciones', String(statsData.totalInscripciones || 0)],
                ['Docentes Únicos', String(statsData.coberturaDocente?.actualizados || 0)],
                ['Cobertura de Plantilla', (statsData.coberturaDocente?.porcentaje || 0) + '%'],
                ['Sin Participar', String(statsData.docentesNoParticiparon?.total || 0)]
            ];
            
            children.push(new Table({
                width: { size: 9360, type: WidthType.DXA },
                columnWidths: [5760, 3600],
                rows: kpiRows.map(function(row) {
                    return new TableRow({
                        children: [
                            new TableCell({
                                borders: borders,
                                width: { size: 5760, type: WidthType.DXA },
                                shading: { fill: 'EEF4FB' },
                                margins: { top: 100, bottom: 100, left: 160, right: 160 },
                                children: [new Paragraph({ children: [new TextRun({ text: row[0], font: 'Arial', size: 20 })] })]
                            }),
                            new TableCell({
                                borders: borders,
                                width: { size: 3600, type: WidthType.DXA },
                                margins: { top: 100, bottom: 100, left: 160, right: 160 },
                                children: [new Paragraph({
                                    alignment: AlignmentType.RIGHT,
                                    children: [new TextRun({ text: row[1], font: 'Arial', size: 20, bold: true, color: '9D2449' })]
                                })]
                            })
                        ]
                    });
                })
            }));
            
            // Top Cursos
            children.push(new Paragraph({
                spacing: { before: 200, after: 80 },
                children: [new TextRun({ text: '2. CURSOS MÁS DEMANDADOS', bold: true, color: '1B396A', font: 'Arial', size: 24 })]
            }));
            
            var topCursos = statsData.topCursos || [];
            var cursoRows = topCursos.slice(0, 10).map(function(curso, i) {
                return [(i + 1) + '.', curso[0], String(curso[1])];
            });
            
            children.push(new Table({
                width: { size: 9360, type: WidthType.DXA },
                columnWidths: [600, 6960, 1800],
                rows: [
                    new TableRow({
                        tableHeader: true,
                        children: ['#', 'Nombre del Curso', 'Inscripciones'].map(function(h) {
                            return new TableCell({
                                borders: borders,
                                shading: { fill: '1B396A' },
                                margins: { top: 100, bottom: 100, left: 160, right: 160 },
                                children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, color: 'FFFFFF', font: 'Arial', size: 18 })] })]
                            });
                        })
                    })
                ].concat(cursoRows.map(function(row, ri) {
                    return new TableRow({
                        children: row.map(function(cell) {
                            return new TableCell({
                                borders: borders,
                                shading: { fill: ri % 2 === 0 ? 'FFFFFF' : 'F8F9FA' },
                                margins: { top: 80, bottom: 80, left: 160, right: 160 },

                            });

            var deptos = statsData.topDepartamentos || [];
            var deptoRows = deptos.map(function(depto, i) {
                return [(i + 1) + '.', depto[0], String(depto[1])];

            children.push(new Table({
                width: { size: 9360, type: WidthType.DXA },
                columnWidths: [600, 6960, 1800],
                rows: [
                    new TableRow({
                        tableHeader: true,
                        children: ['#', 'Departamento', 'Total'].map(function(h) {
                            return new TableCell({
                                borders: borders,
                                shading: { fill: '1B396A' },
                                margins: { top: 100, bottom: 100, left: 160, right: 160 },
                                children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, color: 'FFFFFF', font: 'Arial', size: 18 })] })]
                            });
                        })
                    })
                ].concat(deptoRows.map(function(row, ri) {
                    return new TableRow({
                        children: row.map(function(cell) {
                            return new TableCell({
                                borders: borders,
                                shading: { fill: ri % 2 === 0 ? 'FFFFFF' : 'F8F9FA' },
                                margins: { top: 80, bottom: 80, left: 160, right: 160 },
                                children: [new Paragraph({ children: [new TextRun({ text: String(cell), font: 'Arial', size: 18 })] })]
                            });

                    });
                }))
            }));
            
            // Pie
            children.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { before: 400, after: 80 },
                children: [new TextRun({ text: 'M.C. Alejandro Calderón Rentería — Coordinación de Actualización Docente', font: 'Arial', size: 16, color: '888888' })]
            }));
            
            var doc = new Document({
                creator: 'ITD - Desarrollo Académico',
                title: 'Reporte Estadístico de Actualización Docente',
                styles: { default: { document: { run: { font: 'Arial', size: 20 } } } },
                sections: [{ properties: { page: { margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 } } }, children: children }]
            });
            
            Packer.toBlob(doc).then(function(blob) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'Reporte_Estadistico_' + period + '.docx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                alert('✅ Word generado correctamente');
            });
            
        } catch (error) {
            console.error('Error:', error);
            alert('Error al generar Word: ' + error.message);
        }
    };

    // --- GENERAR INFORME TRIMESTRAL ---
    var generateWordTrimestral = function(statsData, period) {
        try {
            var docxLib = window.docx;
            if (!docxLib) throw new Error('Librería docx no cargada');

            // Encabezado

                alignment: AlignmentType.CENTER,
                spacing: { before: 200, after: 40 },

            children.push(new Paragraph({

    // ============================================================
    // 6. COMPONENTE: CHART BOX
    // ============================================================
    var ChartBox = function(props) {
        var type = props.type;
        var data = props.data;
        var title = props.title;
        var id = props.id;
        var horizontal = props.horizontal || false;
        var shortenLabels = props.shortenLabels || false;
        var minHeight = props.minHeight || "350px";
        var isHistory = props.isHistory || false;
        var customColors = props.customColors || null;
        
        var chartRef = useRef(null);
        var canvasRef = useRef(null);
        var _menuOpen = useState(false);
        var menuOpen = _menuOpen[0];
        var setMenuOpen = _menuOpen[1];
        var menuRef = useRef(null);

        useEffect(function() {
            var handleClickOutside = function(event) {
                if (menuRef.current && !menuRef.current.contains(event.target)) {
                    setMenuOpen(false);
                }
            };
            document.addEventListener("mousedown", handleClickOutside);
            return function() {
                document.removeEventListener("mousedown", handleClickOutside);
            };
        }, []);

        useEffect(function() {
            if (!canvasRef.current || !data) return;
            if (typeof window.Chart === 'undefined') return;
            
            if (chartRef.current) chartRef.current.destroy();

            var ctx = canvasRef.current.getContext('2d');
            var isPie = type === 'pie' || type === 'doughnut';
            
            var chartDataConfig = {};

            if (isHistory) {
                chartDataConfig = data;
            } else {
                var rawLabels = Object.keys(data);
                var displayLabels = rawLabels.map(function(l) { return shortenLabels ? shortenLabel(l) : l; });
                
                var bgColors = customColors || (isPie ? INSTITUTIONAL_COLORS : VIBRANT_COLORS);
                var borderColors = isPie ? '#ffffff' : (customColors || VIBRANT_COLORS);

                chartDataConfig = {
                    labels: displayLabels,
                    datasets: [{ 
                        label: title.replace(/[📚👥🏢📋📈🏫👨‍🏫]/g, '').trim(), 
                        data: Object.values(data), 
                        backgroundColor: bgColors,
                        borderColor: borderColors,
                        borderWidth: isPie ? 2 : 1,
                        borderRadius: isPie ? 0 : 6,
                        barPercentage: 0.6,
                        maxBarThickness: 50
                    }]
                };
            }

            var totalValues = isPie ? chartDataConfig.datasets[0].data.reduce(function(acc, curr) { return acc + (typeof curr === 'number' ? curr : 0); }, 0) : 0;

            var config = {
                type: type,
                data: chartDataConfig,
                plugins: window.ChartDataLabels ? [window.ChartDataLabels] : [],
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    indexAxis: horizontal ? 'y' : 'x',
                    animation: { duration: 600, easing: 'easeOutQuart' },
                    scales: isPie ? {} : { 
                        y: { 
                            beginAtZero: true, 
                            ticks: { 
                                color: '#374151',
                                font: { size: 11, weight: '600' },
                                autoSkip: false,
                                padding: 10,
                                callback: function(value) { 
                                    if (this.getLabelForValue && !isHistory && horizontal) {
                                        var label = this.getLabelForValue(value);
                                        var charLimit = 80; 
                                        if (typeof label === 'string' && label.length > charLimit) {
                                            var words = label.split(' ');
                                            var lines = [];
                                            var currentLine = words[0];
                                            for (var i = 1; i < words.length; i++) {
                                                if (currentLine.length + words[i].length < charLimit) {
                                                    currentLine += ' ' + words[i];
                                                } else {
                                                    lines.push(currentLine);
                                                    currentLine = words[i];
                                                }
                                            }
                                            lines.push(currentLine);
                                            return lines;
                                        }
                                        return label;
                                    }
                                    if (value % 1 === 0) return value; 
                                } 
                            },
                            grid: { color: '#e5e7eb', borderDash: [5, 5], display: !horizontal }
                        },
                        x: {
                            beginAtZero: true, 
                            ticks: { 
                                color: '#374151',
                                font: { size: 11, weight: '600' }
                            },
                            grid: { display: false }
                        }
                    },
                    plugins: { 
                        datalabels: {
                            display: true, 
                            align: isHistory ? 'top' : (horizontal ? 'end' : 'top'),
                            anchor: isHistory ? 'center' : (horizontal ? 'end' : 'end'),
                            backgroundColor: isHistory ? 'white' : (isPie ? 'rgba(0,0,0,0.6)' : 'transparent'),
                            borderRadius: 4,
                            color: isHistory ? '#1B396A' : (isPie ? '#fff' : '#374151'),
                            font: { weight: 'bold', size: 10 },
                            padding: 2,
                            formatter: function(value) {
                                if (isHistory) return value > 0 ? value : '';
                                if (totalValues > 0) {
                                    var percentage = ((value / totalValues) * 100).toFixed(1);
                                    if(percentage < 3 && !horizontal) return value;
                                    return value + ' (' + percentage + '%)';
                                }
                                return value;
                            },
                            offset: 4,
                            clip: false
                        },
                        legend: { 
                            display: isPie || isHistory, 
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 8
                            }
                        }
                    },
                    layout: { padding: { top: 25, right: 25, left: horizontal ? 10 : 10, bottom: 10 } }
                }
            };

            if (!isPie && horizontal) {
                config.options.scales.x.display = false;
            }
            if (isPie) config.options.layout.padding = 20;

            chartRef.current = new window.Chart(ctx, config);
            return function() { if (chartRef.current) chartRef.current.destroy(); };
        }, [data, type, title, horizontal, id, shortenLabels, isHistory, customColors]);

        return h('div', { id: 'chartBox-' + id, className: 'bg-white p-5 rounded-xl shadow-md h-full flex flex-col border border-gray-100 transition-all hover:shadow-lg relative', style: { minHeight: minHeight } },
            h('div', { className: 'flex justify-between items-center border-b border-gray-100 pb-3 mb-4' },
                h('div', { className: 'w-8' }),
                h('h3', { className: 'text-gray-700 font-bold text-center text-base flex items-center justify-center gap-2 flex-grow' }, title)
            ),
            h('div', { className: 'flex-1 relative w-full h-full', style: { minHeight: '200px' } },
                h('canvas', { ref: canvasRef, id: id })
            )
        );
    };

                        data: statsData ? Object.fromEntries(statsData.topCursos.slice(0, 10)) : {},
                        horizontal: true,
                        minHeight: getChartHeight(10)
                    })
                ),
                h('div', { className: 'w-full' },
                    h(ChartBox, { 
                        id: 'topDeptos',
                        type: 'bar', 
                        title: '🏢 Participación por Departamento', 
                        data: statsData ? Object.fromEntries(statsData.topDepartamentos) : {},
                        shortenLabels: true,
                        horizontal: true,
                        minHeight: statsData ? getChartHeight(statsData.topDepartamentos.length) : '400px'
                    })
                )
            ),

            // Sección Secundaria
            h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-8 mb-8' },
                h('div', { className: 'md:col-span-1' },
                    h(ChartBox, { 
                        id: 'genero', 
                        type: 'doughnut', 
                        title: '👥 Distribución por Género', 
                        data: statsData ? statsData.distribucionGenero : {},
                        customColors: ['#36A2EB', '#FF6384']
                    })
                ),
                h('div', { className: 'md:col-span-1' },
                    h(ChartBox, { 
                        id: 'tipo', 
                        type: 'pie', 
                        title: '📋 Tipo de Curso', 
                        data: statsData ? statsData.distribucionTipo : {},
                        customColors: ['#10b981', '#f59e0b']
                    })
                ),
                h('div', { className: 'md:col-span-1' },
                    h(ChartBox, { id: 'frecuencia', type: 'bar', title: '📈 Cursos por Docente', data: statsData ? statsData.frecuenciaParticipacion : {} })
                )
            ),

            // Evolución Histórica
            h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8' },
                h(ChartBox, { 
                    id: 'historico',
                    type: 'bar', 
                    title: '📅 Cursos Ofertados (Periodos vs Total Anual)', 
                    data: generateCourseEvolutionData(), 
                    isHistory: true
                }),
                h(ChartBox, { 
                    id: 'docentesYear',
                    type: 'bar', 
                    title: '👨‍🏫 Total Docentes por Año', 
                    data: generateTeacherEvolutionData(), 
                    isHistory: true
                })
            )
        );
    };

    // ============================================================
    // 8. COMPONENTE: APP
    // ============================================================
    var App = function() {
        var _user = useState(null);
        var user = _user[0];
        var setUser = _user[1];
        
        var _loginError = useState('');
        var loginError = _loginError[0];
        var setLoginError = _loginError[1];

        var ADMIN_EMAILS = ['alejandro.calderon@itdurango.edu.mx', 'desarrollo.academico@itdurango.edu.mx'];

        var handleLogin = function(response) {
            try {
                var payload = JSON.parse(atob(response.credential.split('.')[1]));
                var email = payload.email || '';
                if (email.endsWith('@itdurango.edu.mx') || ADMIN_EMAILS.includes(email)) {
                    var isAdmin = ADMIN_EMAILS.includes(email);
                    setUser({ name: payload.name, email: email, picture: payload.picture, isAdmin: isAdmin });
                } else {
                    setLoginError("Acceso denegado: Se requiere cuenta institucional @itdurango.edu.mx.");
                }
            } catch (error) {
                setLoginError("Error de autenticación.");
            }
        };

        var handleLogout = function() {
            setUser(null);
            setLoginError('');
            if (window.google) window.google.accounts.id.disableAutoSelect();
        };

        if (!user) return h(Login, { onLogin: handleLogin, loginError: loginError });
        return h(Dashboard, { user: user, isAdmin: user.isAdmin, onLogout: handleLogout });
    };

    // ============================================================
    // 9. MONTAJE
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        var rootEl = document.getElementById('root');
        if (rootEl) {
            try {
                var root = createRoot(rootEl);
                root.render(h(App, null));
                console.log('✅ Estadísticas ITD - App montada correctamente');
            } catch(e) {
                console.error('❌ Error al montar la app:', e);
                rootEl.innerHTML = 
                    '<div class="container mx-auto px-4 py-10 max-w-3xl">' +
                        '<div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm">' +
                            '<h3 class="text-lg font-bold text-red-800">⚠️ Error de carga</h3>' +
                            '<p class="text-red-700">No se pudo cargar la aplicación. Error: ' + e.message + '</p>' +
                            '<button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">Recargar página</button>' +
                        '</div>' +
                    '</div>';
            }
        } else {
            console.error('❌ No se encontró el elemento root');
        }
    });
</script>
