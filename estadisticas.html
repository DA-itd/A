<style>
    @keyframes fadeIn { 
        from { opacity: 0; transform: translateY(10px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
    .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .pdf-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        display: flex; justify-content: center; align-items: center;
        z-index: 9999; backdrop-filter: blur(4px);
    }
    
    .pdf-modal {
        background: white; padding: 40px 60px; border-radius: 16px;
        text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        max-width: 400px; border-top: 6px solid #1B396A;
    }
    
    .loader-spinner {
        width: 64px; height: 64px;
        border: 4px solid #1B396A;
        border-radius: 50%;
        position: relative;
        margin: 0 auto 20px;
        background: rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .loader-spinner::before {
        content: '';
        position: absolute;
        width: 8px; height: 8px;
        background: #1B396A;
        border-radius: 50%;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
    }

    .loader-spinner::after {
        content: '';
        position: absolute;
        width: 4px; height: 24px;
        background: #9D2449;
        top: 50%; left: 50%;
        margin-left: -2px;
        margin-top: -24px;
        transform-origin: bottom center;
        border-radius: 2px;
        animation: spin 2s linear infinite;
    }
</style>
</head>
<body class="bg-gradient-to-br from-orange-50 via-amber-50 to-yellow-50 min-h-screen text-gray-800 flex flex-col">

        <img src="https://raw.githubusercontent.com/DA-itd/web/main/TecNM_logo.jpg" alt="TecNM" class="h-12 sm:h-16 md:h-20 object-contain">

            <h1 class="text-sm sm:text-xl md:text-2xl lg:text-3xl font-bold text-[#1B396A] leading-tight">PANEL DE ESTADÍSTICAS</h1>
            <p class="text-xs sm:text-sm md:text-base text-[#9D2449] mt-1 font-semibold">Desarrollo Académico</p>

        <img src="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png" alt="ITD" class="h-12 sm:h-16 md:h-20 object-contain">

</header>

<!-- ENLACE DE NAVEGACIÓN -->

<script>
    // ============================================================
    // 1. REACT
    // ============================================================
    var React = window.React;
    var ReactDOM = window.ReactDOM;
    var useState = React.useState;
    var useEffect = React.useEffect;
    var useRef = React.useRef;
    var createRoot = ReactDOM.createRoot;
    var h = React.createElement;

    // ============================================================
    // 2. CONFIGURACIÓN
    // ============================================================
    var CONFIG = {
        GOOGLE_CLIENT_ID: '524996225715-5l95j3lces5hi49c19rfgotdrfo2seq1.apps.googleusercontent.com',
        APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwFO97VhIEO2ke2p-ZvYpXMWHP_LAxqmR0U5CmhPvOoQAH24FUAOt2rqGtoUhU-MKQauw/exec'
    };

    var INSTITUTIONAL_COLORS = ['#1B396A', '#9D2449', '#B0BEC5', '#D4AF37', '#546E7A', '#455A64'];
    var VIBRANT_COLORS = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8AC926', '#1982C4', '#E91E63', '#009688'];
    var ITD_LOGO_URL = 'https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png';
    var GUINDA_COLOR = '#9D2449';
    var BLUE_COLOR = '#1B396A';

    // ============================================================
    // 3. UTILIDADES
    // ============================================================
    var shortenLabel = function(label) {
        if (!label) return '';
        return label
            .replace(/DEPARTAMENTO DE /gi, 'DEPTO. ')
            .replace(/DEPARTAMENTO/gi, 'DEPTO.')
            .replace(/DIVISION DE ESTUDIOS DE /gi, 'DIV. ')
            .replace(/DIVISION DE /gi, 'DIV. ')
            .replace(/CENTRO DE INFORMACIÓN/gi, 'C. Información')
            .replace(/CENTRO DE /gi, 'C. ')
            .replace(/INGENIERÍA/gi, 'ING.')
            .replace(/CIENCIAS/gi, 'CIENCIAS.')
            .replace(/ECONOMICO-ADMINISTRATIVAS/gi, 'ECO-ADMIN')
            .trim();
    };

    var getChartHeight = function(count) {
        return Math.max(400, count * 35) + "px";
    };

    var getImageDataFromURL = function(url) {
        return new Promise(function(resolve) {
            var img = new Image(); 
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                var canvas = document.createElement('canvas'); 
                canvas.width = img.width; 
                canvas.height = img.height;
                var ctx = canvas.getContext('2d'); 
                ctx.drawImage(img, 0, 0);
                try { resolve(canvas.toDataURL('image/png')); } 
                catch (e) { resolve(null); }
            };
            img.onerror = function() { resolve(null); }; 
            img.src = url;
        });
    };

    // ============================================================
    // 4. COMPONENTE: LOGIN
    // ============================================================
    var Login = function(props) {
        var onLogin = props.onLogin;
        var loginError = props.loginError;
        var googleButtonRef = useRef(null);

        useEffect(function() {
            var intervalId;
            var initGoogle = function() {
                if (window.google && window.google.accounts && googleButtonRef.current) {
                    try {
                        window.google.accounts.id.initialize({ 
                            client_id: CONFIG.GOOGLE_CLIENT_ID, 
                            callback: onLogin 
                        });
                        window.google.accounts.id.renderButton(googleButtonRef.current, { 
                            theme: "outline", size: "large", text: "signin_with", shape: "rectangular", logo_alignment: "left"
                        });
                        return true;
                    } catch (e) { return false; }
                }
                return false;
            };
            
            if (!initGoogle()) { 
                intervalId = setInterval(function() { if (initGoogle()) clearInterval(intervalId); }, 500); 
            }
            return function() { if(intervalId) clearInterval(intervalId); };
        }, [onLogin]);

        return h('div', { className: 'flex flex-col justify-center items-center py-20 animate-fadeIn px-4 flex-grow' },
            h('div', { className: 'bg-white p-10 rounded-2xl shadow-2xl text-center max-w-md w-full border-t-8 border-[#9D2449]' },
                h('img', { src: ITD_LOGO_URL, alt: 'Logo ITD', className: 'h-24 mx-auto mb-6 object-contain' }),
                h('h2', { className: 'text-3xl font-bold text-[#1B396A] mb-2' }, 'Acceso Restringido'),
                h('p', { className: 'text-gray-500 mb-8 text-sm font-medium uppercase tracking-wide' }, 'Estadísticas Institucionales'),
                loginError ? h('div', { className: 'mb-6 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-sm font-bold' }, loginError) : null,
                h('div', { className: 'flex justify-center min-h-[50px]', ref: googleButtonRef })
            )
        );
    };

    // ============================================================
    // 5. COMPONENTE: CHART BOX (VERSIÓN COMPLETA)
    // ============================================================
    var ChartBox = function(props) {
        var type = props.type;
        var data = props.data;
        var title = props.title;
        var id = props.id;
        var horizontal = props.horizontal || false;
        var shortenLabels = props.shortenLabels || false;
        var minHeight = props.minHeight || "350px";
        var isHistory = props.isHistory || false;
        var customColors = props.customColors || null;
        
        var chartRef = useRef(null);
        var canvasRef = useRef(null);
        var _menuOpen = useState(false);
        var menuOpen = _menuOpen[0];
        var setMenuOpen = _menuOpen[1];
        var menuRef = useRef(null);

        useEffect(function() {
            var handleClickOutside = function(event) {
                if (menuRef.current && !menuRef.current.contains(event.target)) {
                    setMenuOpen(false);
                }
            };
            document.addEventListener("mousedown", handleClickOutside);
            return function() {
                document.removeEventListener("mousedown", handleClickOutside);
            };
        }, []);

        useEffect(function() {
            if (!canvasRef.current || !data) return;
            if (typeof window.Chart === 'undefined') return;
            
            if (chartRef.current) chartRef.current.destroy();

            var ctx = canvasRef.current.getContext('2d');
            var isPie = type === 'pie' || type === 'doughnut';
            
            var chartDataConfig = {};

            if (isHistory) {
                chartDataConfig = data;
            } else {
                var rawLabels = Object.keys(data);
                var displayLabels = rawLabels.map(function(l) { return shortenLabels ? shortenLabel(l) : l; });
                
                var bgColors = customColors || (isPie ? INSTITUTIONAL_COLORS : VIBRANT_COLORS);
                var borderColors = isPie ? '#ffffff' : (customColors || VIBRANT_COLORS);

                chartDataConfig = {
                    labels: displayLabels,
                    datasets: [{ 
                        label: title.replace(/[📚👥🏢📋📈🏫👨‍🏫]/g, '').trim(), 
                        data: Object.values(data), 
                        backgroundColor: bgColors,
                        borderColor: borderColors,
                        borderWidth: isPie ? 2 : 1,
                        borderRadius: isPie ? 0 : 6,
                        barPercentage: 0.6,
                        maxBarThickness: 50
                    }]
                };
            }

            var totalValues = isPie ? chartDataConfig.datasets[0].data.reduce(function(acc, curr) { return acc + (typeof curr === 'number' ? curr : 0); }, 0) : 0;

            var config = {
                type: type,
                data: chartDataConfig,
                plugins: window.ChartDataLabels ? [window.ChartDataLabels] : [],
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    indexAxis: horizontal ? 'y' : 'x',
                    animation: { duration: 600, easing: 'easeOutQuart' },
                    scales: isPie ? {} : { 
                        y: { 
                            beginAtZero: true, 
                            ticks: { 
                                color: '#374151',
                                font: { size: 11, weight: '600' },
                                autoSkip: false,
                                padding: 10,
                                callback: function(value) { 
                                    if (this.getLabelForValue && !isHistory && horizontal) {
                                        var label = this.getLabelForValue(value);
                                        var charLimit = 80; 
                                        if (typeof label === 'string' && label.length > charLimit) {
                                            var words = label.split(' ');
                                            var lines = [];
                                            var currentLine = words[0];
                                            for (var i = 1; i < words.length; i++) {
                                                if (currentLine.length + words[i].length < charLimit) {
                                                    currentLine += ' ' + words[i];
                                                } else {
                                                    lines.push(currentLine);
                                                    currentLine = words[i];
                                                }
                                            }
                                            lines.push(currentLine);
                                            return lines;
                                        }
                                        return label;
                                    }
                                    if (value % 1 === 0) return value; 
                                } 
                            },
                            grid: { color: '#e5e7eb', borderDash: [5, 5], display: !horizontal }
                        },
                        x: {
                            beginAtZero: true, 
                            ticks: { 
                                color: '#374151',
                                font: { size: 11, weight: '600' }
                            },
                            grid: { display: false }
                        }
                    },
                    plugins: { 
                        datalabels: {
                            display: true, 
                            align: isHistory ? 'top' : (horizontal ? 'end' : 'top'),
                            anchor: isHistory ? 'center' : (horizontal ? 'end' : 'end'),
                            backgroundColor: isHistory ? 'white' : (isPie ? 'rgba(0,0,0,0.6)' : 'transparent'),
                            borderRadius: 4,
                            color: isHistory ? '#1B396A' : (isPie ? '#fff' : '#374151'),
                            font: { weight: 'bold', size: 10 },
                            padding: 2,
                            formatter: function(value) {
                                if (isHistory) return value > 0 ? value : '';
                                if (totalValues > 0) {
                                    var percentage = ((value / totalValues) * 100).toFixed(1);
                                    if(percentage < 3 && !horizontal) return value;
                                    return value + ' (' + percentage + '%)';
                                }
                                return value;
                            },
                            offset: 4,
                            clip: false
                        },
                        legend: { 
                            display: isPie || isHistory, 
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 8
                            }
                        }
                    },
                    layout: { padding: { top: 25, right: 25, left: horizontal ? 10 : 10, bottom: 10 } }
                }
            };

            if (!isPie && horizontal) {
                config.options.scales.x.display = false;
            }
            if (isPie) config.options.layout.padding = 20;

            chartRef.current = new window.Chart(ctx, config);
            return function() { if (chartRef.current) chartRef.current.destroy(); };
        }, [data, type, title, horizontal, id, shortenLabels, isHistory, customColors]);

        var downloadSingleChart = function(format) {
            setMenuOpen(false);
            setTimeout(function() {
                var element = document.getElementById('chartBox-' + id);
                if (!element) return;

                try {
                    html2canvas(element, { 
                        scale: 4, 
                        useCORS: true, 
                        backgroundColor: '#ffffff',
                        logging: false,
                        allowTaint: false,
                        imageTimeout: 20000,
                        removeContainer: true,
                        ignoreElements: function(el) { return el.id === 'menu-btn-' + id; }
                    }).then(function(canvas) {
                        var logoData = getImageDataFromURL(ITD_LOGO_URL);
                        var cleanTitle = title.replace(/[\u{1F300}-\u{1FFFF}]/gu, '').replace(/[📚👥🏢📋📈🏫👨‍🏫]/g, '').trim();

                        if (format === 'png') {
                            logoData.then(function(logoDataResult) {
                                var scale = canvas.width / 1200;
                                var headerHeight = Math.round(260 * scale);
                                var margin = Math.round(40 * scale);
                                var finalCanvas = document.createElement('canvas');
                                var ctx = finalCanvas.getContext('2d');
                                finalCanvas.width = canvas.width;
                                finalCanvas.height = canvas.height + headerHeight;

                                ctx.fillStyle = '#ffffff';
                                ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

                                ctx.fillStyle = BLUE_COLOR;
                                ctx.fillRect(0, 0, finalCanvas.width, Math.round(headerHeight * 0.68));

                                if (logoDataResult) {
                                    var img = new Image();
                                    img.src = logoDataResult;
                                    img.onload = function() {
                                        var lh = Math.round(100 * scale);
                                        var lw = Math.round((img.width / img.height) * lh);
                                        var yLogo = Math.round(((headerHeight * 0.68) - lh) / 2);
                                        ctx.drawImage(img, margin, yLogo, lw, lh);
                                        ctx.drawImage(img, finalCanvas.width - margin - lw, yLogo, lw, lh);

                                        ctx.textAlign = 'center';
                                        ctx.fillStyle = '#ffffff';
                                        ctx.font = 'bold ' + Math.round(36 * scale) + 'px Helvetica, Arial, sans-serif';
                                        ctx.fillText('INSTITUTO TECNOLÓGICO DE DURANGO', finalCanvas.width / 2, Math.round(70 * scale));

                                        ctx.font = Math.round(22 * scale) + 'px Helvetica, Arial, sans-serif';
                                        ctx.fillText('Coordinación de Actualización Docente', finalCanvas.width / 2, Math.round(110 * scale));

                                        ctx.strokeStyle = GUINDA_COLOR;
                                        ctx.lineWidth = Math.round(4 * scale);
                                        ctx.beginPath();
                                        ctx.moveTo(margin, Math.round(headerHeight * 0.68) + Math.round(4 * scale));
                                        ctx.lineTo(finalCanvas.width - margin, Math.round(headerHeight * 0.68) + Math.round(4 * scale));
                                        ctx.stroke();

                                        ctx.fillStyle = BLUE_COLOR;
                                        ctx.font = 'bold ' + Math.round(28 * scale) + 'px Helvetica, Arial, sans-serif';
                                        ctx.fillText(cleanTitle, finalCanvas.width / 2, Math.round(headerHeight * 0.68) + Math.round(48 * scale));

                                        ctx.drawImage(canvas, 0, headerHeight);

                                        var link = document.createElement('a');
                                        link.download = cleanTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.png';
                                        link.href = finalCanvas.toDataURL('image/png');
                                        link.click();
                                    };
                                }
                            });
                        } else if (format === 'pdf') {
                            var jsPDF = window.jspdf.jsPDF;
                            var pdf = new jsPDF('landscape', 'mm', 'letter');
                            var pdfWidth = pdf.internal.pageSize.getWidth();
                            var pdfHeight = pdf.internal.pageSize.getHeight();
                            var marginPdf = 10;
                            var headerEnd = 32;
                            var footerStart = pdfHeight - 12;

                            pdf.setFillColor(255, 255, 255);
                            pdf.rect(0, 0, pdfWidth, headerEnd, 'F');

                            logoData.then(function(logoDataResult) {
                                if (logoDataResult) {
                                    var imgProps = pdf.getImageProperties(logoDataResult);
                                    var lh = headerEnd - 4;
                                    var lw = (imgProps.width / imgProps.height) * lh;
                                    pdf.addImage(logoDataResult, 'PNG', marginPdf, 2, lw, lh);
                                    pdf.addImage(logoDataResult, 'PNG', pdfWidth - marginPdf - lw, 2, lw, lh);
                                }

                                pdf.setFontSize(15);
                                pdf.setFont('helvetica', 'bold');
                                pdf.setTextColor(27, 57, 106);
                                pdf.text('INSTITUTO TECNOLÓGICO DE DURANGO', pdfWidth / 2, 14, { align: 'center' });
                                pdf.setFontSize(9);
                                pdf.setFont('helvetica', 'normal');
                                pdf.setTextColor(100, 100, 100);
                                pdf.text('Coordinación de Actualización Docente', pdfWidth / 2, 21, { align: 'center' });

                                pdf.setDrawColor(157, 36, 73);
                                pdf.setLineWidth(1.5);
                                pdf.line(0, headerEnd, pdfWidth, headerEnd);

                                pdf.setLineWidth(0.5);
                                pdf.setFontSize(13);
                                pdf.setFont('helvetica', 'bold');
                                pdf.setTextColor(27, 57, 106);
                                pdf.text(cleanTitle, pdfWidth / 2, headerEnd + 9, { align: 'center' });

                                var imgData = canvas.toDataURL('image/jpeg', 1.0);
                                var imgProps2 = pdf.getImageProperties(imgData);
                                var ratio = imgProps2.width / imgProps2.height;
                                var availW = pdfWidth - marginPdf * 2;
                                var availH = footerStart - headerEnd - 14;
                                var fw = availW, fh = fw / ratio;
                                if (fh > availH) { fh = availH; fw = fh * ratio; }
                                var fx = (pdfWidth - fw) / 2;
                                var fy = headerEnd + 13 + (availH - fh) / 2;
                                pdf.addImage(imgData, 'JPEG', fx, fy, fw, fh);

                                pdf.setFillColor(27, 57, 106);
                                pdf.rect(0, footerStart, pdfWidth, 12, 'F');
                                pdf.setFontSize(8);
                                pdf.setTextColor(255, 255, 255);
                                var dateStr = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });
                                pdf.text('Generado: ' + dateStr, marginPdf, footerStart + 7);
                                pdf.text('Generado en: Coordinación de Actualización Docente — ITD', pdfWidth - marginPdf, footerStart + 7, { align: 'right' });

                                pdf.save(cleanTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.pdf');
                            });
                        }
                    });
                } catch (err) {
                    console.error("Error descargando gráfica", err);
                    alert("Error al generar la descarga.");
                }
            }, 100);
        };

        return h('div', { id: 'chartBox-' + id, className: 'bg-white p-5 rounded-xl shadow-md h-full flex flex-col border border-gray-100 transition-all hover:shadow-lg relative', style: { minHeight: minHeight } },
            h('div', { className: 'flex justify-between items-center border-b border-gray-100 pb-3 mb-4' },
                h('div', { className: 'w-8' }),
                h('h3', { className: 'text-gray-700 font-bold text-center text-base flex items-center justify-center gap-2 flex-grow' }, title),
                h('div', { className: 'relative', ref: menuRef },
                    h('button', {
                        id: 'menu-btn-' + id,
                        onClick: function() { setMenuOpen(!menuOpen); },
                        className: 'text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-100 focus:outline-none transition-colors',
                        title: 'Opciones de descarga'
                    },
                        h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: '20', height: '20', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' },
                            h('circle', { cx: '12', cy: '12', r: '1' }),
                            h('circle', { cx: '19', cy: '12', r: '1' }),
                            h('circle', { cx: '5', cy: '12', r: '1' })
                        )
                    ),
                    menuOpen ? h('div', { className: 'absolute right-0 mt-2 w-48 bg-white rounded-md shadow-xl z-50 border border-gray-200 animate-fadeIn' },
                        h('div', { className: 'py-1' },
                            h('button', { 
                                onClick: function() { downloadSingleChart('png'); },
                                className: 'flex items-center w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-[#1B396A]'
                            },
                                h('span', { className: 'mr-2' }, '🖼️'),
                                ' Descargar PNG'
                            ),
                            h('button', { 
                                onClick: function() { downloadSingleChart('pdf'); },
                                className: 'flex items-center w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-[#1B396A]'
                            },
                                h('span', { className: 'mr-2' }, '📄'),
                                ' Descargar PDF'
                            )
                        )
                    ) : null
                )
            ),
            h('div', { className: 'flex-1 relative w-full h-full', style: { minHeight: '200px' } },
                h('canvas', { ref: canvasRef, id: id })
            )
        );
    };

    // ============================================================
    // 6. FUNCIONES DE GENERACIÓN DE REPORTES
    // ============================================================
    var generateWordCompleto = function(statsData, period) {
        // Implementación simplificada - genera un informe básico en Word
        // En la versión completa, esto genera un documento con todos los cursos
        alert('📊 Función Word Completo en desarrollo.\nGenerará un informe con todos los cursos y participantes.');
    };

    var generateWordTrimestral = function(statsData, period) {
        alert('📋 Función Informe Trimestral en desarrollo.\nGenerará un informe formal del trimestre actual.');
    };

    // ============================================================
    // 7. COMPONENTE: DASHBOARD
    // ============================================================
    var Dashboard = function(props) {
        var user = props.user;
        var isAdmin = props.isAdmin;
        var onLogout = props.onLogout;
        
        var _statsData = useState(null);
        var statsData = _statsData[0];
        var setStatsData = _statsData[1];
        
        var _loading = useState(true);
        var loading = _loading[0];
        var setLoading = _loading[1];
        
        var _generatingPDF = useState(false);
        var generatingPDF = _generatingPDF[0];
        var setGeneratingPDF = _generatingPDF[1];
        
        var _period = useState("ACTUAL");
        var period = _period[0];
        var setPeriod = _period[1];
        
        var _availableYears = useState([]);
        var availableYears = _availableYears[0];
        var setAvailableYears = _availableYears[1];

        useEffect(function() {
            fetchData();
        }, [period]);

        var fetchData = function() {
            setLoading(true);
            var url = CONFIG.APPS_SCRIPT_URL + '?action=getStatisticsData&period=' + period + '&t=' + Date.now();
            fetch(url)
                .then(function(response) { return response.json(); })
                .then(function(result) {
                    if (result.success) {
                        setStatsData(result.data);
                        if(result.availableYears) setAvailableYears(result.availableYears);
                    } else {
                        alert("Error obteniendo datos: " + result.message);
                    }
                })
                .catch(function(error) {
                    console.error("Error:", error);
                })
                .finally(function() {
                    setLoading(false);
                });
        };

        // Función para generar PDF completo del dashboard
        var generatePDF = function() {
            setGeneratingPDF(true);
            setTimeout(function() {
                alert('📄 Función PDF en desarrollo.\nGenerará un reporte completo con todas las gráficas y KPIs.');
                setGeneratingPDF(false);
            }, 600);
        };

        var generateWord = function() {
            alert('📝 Función Word en desarrollo.\nGenerará un documento con las estadísticas completas.');
        };

        var generateCourseEvolutionData = function() {
            if (!statsData || !statsData.periodTrend || !statsData.historicalTrend) return { labels: [], datasets: [] };
            
            var pTrend = statsData.periodTrend;
            var hTrend = statsData.historicalTrend;
            
            var sortedYears = Object.keys(hTrend).sort();
            
            var labels = [];
            var dataValues = [];
            var bgColors = [];

            sortedYears.forEach(function(year) {
                var total = hTrend[year]?.cursos || 0;
                var ene = pTrend[year + '-Enero']?.cursos || 0;
                var jun = pTrend[year + '-Junio']?.cursos || 0;
                var ago = pTrend[year + '-Agosto']?.cursos || 0;

                labels.push('Total \'' + year.substring(2), 'Ene', 'Jun', 'Ago');
                dataValues.push(total, ene, jun, ago);
                
                bgColors.push('#1e3a8a');
                bgColors.push('#f472b6');
                bgColors.push('#3b82f6');
                bgColors.push('#fbbf24');
            });

            return {
                labels: labels,
                datasets: [{
                    label: 'Cursos Ofertados',
                    data: dataValues,
                    backgroundColor: bgColors,
                    borderRadius: 4,
                    barPercentage: 0.6,
                    categoryPercentage: 0.8
                }]
            };
        };

        var generateTeacherEvolutionData = function() {
            if (!statsData || !statsData.historicalTrend) return { labels: [], datasets: [] };
            
            var years = Object.keys(statsData.historicalTrend).sort();
            var colors = ['#4f46e5', '#06b6d4', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981']; 
            
            return {
                labels: years,
                datasets: [{
                    label: 'Total Docentes',
                    data: years.map(function(y) { return statsData.historicalTrend[y].registros; }),
                    backgroundColor: years.map(function(_, i) { return colors[i % colors.length]; }),
                    borderRadius: 6,
                    barPercentage: 0.5,
                    maxBarThickness: 50
                }]
            };
        };

        // RENDER LOADING
        if (loading) {
            return h('div', { className: 'flex justify-center items-center h-full flex-col' },
                h('div', { className: 'loader-spinner' }),
                h('p', { className: 'text-[#1B396A] font-bold text-lg animate-pulse' }, 'Cargando estadísticas...')
            );
        }

        // RENDER DASHBOARD
        return h('div', { className: 'p-6 max-w-7xl mx-auto animate-fadeIn relative' },
            // Modal de Generando PDF
            generatingPDF ? h('div', { className: 'pdf-overlay' },
                h('div', { className: 'pdf-modal' },
                    h('div', { className: 'loader-spinner' }),
                    h('h3', { className: 'text-xl font-bold text-gray-800 mb-2' }, 'Generando Reporte'),
                    h('p', { className: 'text-gray-500' }, 'Por favor espere, procesando datos...')
                )
            ) : null,

            // Encabezado
            h('div', { className: 'flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-xl shadow-md border-l-4 border-[#1B396A]' },
                h('div', null,
                    h('h2', { className: 'text-2xl md:text-3xl font-bold text-gray-800' },
                        isAdmin ? 'Dashboard Estratégico' : 'Estadísticas de Actualización Docente'
                    ),
                    h('p', { className: 'text-gray-500 mt-1' },
                        isAdmin ? 'Análisis de datos de actualización docente. Usuario: ' + h('span', { className: 'font-semibold text-[#1B396A]' }, user.name) : 'Bienvenido/a, ' + h('span', { className: 'font-semibold text-[#1B396A]' }, user.name) + '. Aquí puedes consultar los indicadores del programa.'
                    )
                ),
                h('div', { className: 'flex gap-3 flex-wrap' },
                    h('div', { className: 'relative' },
                        h('select', { 
                            value: period, 
                            onChange: function(e) { setPeriod(e.target.value); },
                            className: 'appearance-none bg-gray-50 border border-gray-300 text-gray-700 py-2 px-4 pr-8 rounded-lg leading-tight focus:outline-none focus:bg-white focus:border-[#1B396A] font-bold cursor-pointer hover:bg-gray-100 transition-colors shadow-sm'
                        },
                            h('option', { value: 'ACTUAL' }, '🟢 Periodo Actual'),
                            availableYears.map(function(y) { return h('option', { key: y, value: y }, '📅 Año ' + y); })
                        ),
                        h('div', { className: 'pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700' },
                            h('svg', { className: 'fill-current h-4 w-4', xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20' },
                                h('path', { d: 'M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z' })
                            )
                        )
                    ),
                    h('button', { onClick: generatePDF, className: 'bg-[#9D2449] hover:bg-[#801d3a] text-white font-bold py-2 px-6 rounded-lg shadow transition-all transform hover:scale-105 flex items-center gap-2' },
                        h('span', null, '📄'),
                        ' PDF'
                    ),
                    isAdmin ? h('button', { onClick: generateWord, className: 'bg-[#1B396A] hover:bg-[#142b52] text-white font-bold py-2 px-6 rounded-lg shadow transition-all transform hover:scale-105 flex items-center gap-2' },
                        h('span', null, '📝'),
                        ' Word'
                    ) : null,
                    isAdmin ? h('button', { onClick: function() { generateWordTrimestral(statsData, period); }, className: 'bg-[#7B3F00] hover:bg-[#5c2f00] text-white font-bold py-2 px-6 rounded-lg shadow transition-all transform hover:scale-105 flex items-center gap-2' },
                        h('span', null, '📋'),
                        ' Informe Trimestral'
                    ) : null,
                    isAdmin ? h('button', { onClick: function() { generateWordCompleto(statsData, period); }, className: 'bg-[#2E7D32] hover:bg-[#1b5e20] text-white font-bold py-2 px-6 rounded-lg shadow transition-all transform hover:scale-105 flex items-center gap-2' },
                        h('span', null, '📊'),
                        ' Word Completo'
                    ) : null,
                    h('button', { onClick: onLogout, className: 'bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg transition-colors' }, 'Salir')
                )
            ),

            // KPIs
            h('div', { id: 'kpi-section', className: 'grid grid-cols-1 md:grid-cols-4 gap-6 mb-8' },
                h('div', { className: 'bg-white p-6 rounded-xl shadow-md border-b-4 border-blue-600 flex items-center justify-between' },
                    h('div', null,
                        h('p', { className: 'text-gray-500 text-xs font-bold uppercase tracking-wider' }, 'Total Inscripciones'),
                        h('p', { className: 'text-3xl font-bold text-gray-800 mt-1' }, statsData ? statsData.totalInscripciones : '—')
                    ),
                    h('div', { className: 'text-3xl bg-blue-100 p-3 rounded-full text-blue-600' }, '📝')
                ),
                h('div', { className: 'bg-white p-6 rounded-xl shadow-md border-b-4 border-green-500 flex items-center justify-between' },
                    h('div', null,
                        h('p', { className: 'text-gray-500 text-xs font-bold uppercase tracking-wider' }, 'Docentes Únicos'),
                        h('p', { className: 'text-3xl font-bold text-gray-800 mt-1' }, statsData ? statsData.coberturaDocente.actualizados : '—')
                    ),
                    h('div', { className: 'text-3xl bg-green-100 p-3 rounded-full text-green-600' }, '👥')
                ),
                h('div', { className: 'bg-white p-6 rounded-xl shadow-md border-b-4 border-yellow-500 flex items-center justify-between' },
                    h('div', null,
                        h('p', { className: 'text-gray-500 text-xs font-bold uppercase tracking-wider' }, 'Cobertura Plantilla'),
                        h('p', { className: 'text-3xl font-bold text-gray-800 mt-1' }, statsData ? statsData.coberturaDocente.porcentaje + '%' : '—')
                    ),
                    h('div', { className: 'text-3xl bg-yellow-100 p-3 rounded-full text-yellow-600' }, '🏫')
                ),
                h('div', { className: 'bg-white p-6 rounded-xl shadow-md border-b-4 border-red-500 flex items-center justify-between' },
                    h('div', null,
                        h('p', { className: 'text-gray-500 text-xs font-bold uppercase tracking-wider' }, 'Sin Participar'),
                        h('p', { className: 'text-3xl font-bold text-gray-800 mt-1' }, statsData && statsData.docentesNoParticiparon ? statsData.docentesNoParticiparon.total : '—')
                    ),
                    h('div', { className: 'text-3xl bg-red-100 p-3 rounded-full text-red-500' }, '🚫')
                )
            ),

            // Gráficas
            h('div', { className: 'mb-8 space-y-8' },
                h('div', { className: 'w-full' },
                    h(ChartBox, { 
                        id: 'topCursos',
                        type: 'bar', 
                        title: '📚 Cursos Más Demandados', 
                        data: statsData ? Object.fromEntries(statsData.topCursos.slice(0, 10)) : {},
                        horizontal: true,
                        minHeight: getChartHeight(10)
                    })
                ),
                h('div', { className: 'w-full' },
                    h(ChartBox, { 
                        id: 'topDeptos',
                        type: 'bar', 
                        title: '🏢 Participación por Departamento', 
                        data: statsData ? Object.fromEntries(statsData.topDepartamentos) : {},
                        shortenLabels: true,
                        horizontal: true,
                        minHeight: statsData ? getChartHeight(statsData.topDepartamentos.length) : '400px'
                    })
                )
            ),

            // Sección Secundaria
            h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-8 mb-8' },
                h('div', { className: 'md:col-span-1' },
                    h(ChartBox, { 
                        id: 'genero', 
                        type: 'doughnut', 
                        title: '👥 Distribución por Género', 
                        data: statsData ? statsData.distribucionGenero : {},
                        customColors: ['#36A2EB', '#FF6384']
                    })
                ),
                h('div', { className: 'md:col-span-1' },
                    h(ChartBox, { 
                        id: 'tipo', 
                        type: 'pie', 
                        title: '📋 Tipo de Curso', 
                        data: statsData ? statsData.distribucionTipo : {},
                        customColors: ['#10b981', '#f59e0b']
                    })
                ),
                h('div', { className: 'md:col-span-1' },
                    h(ChartBox, { id: 'frecuencia', type: 'bar', title: '📈 Cursos por Docente', data: statsData ? statsData.frecuenciaParticipacion : {} })
                )
            ),

            // Evolución Histórica
            h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8' },
                h(ChartBox, { 
                    id: 'historico',
                    type: 'bar', 
                    title: '📅 Cursos Ofertados (Periodos vs Total Anual)', 
                    data: generateCourseEvolutionData(), 
                    isHistory: true
                }),
                h(ChartBox, { 
                    id: 'docentesYear',
                    type: 'bar', 
                    title: '👨‍🏫 Total Docentes por Año', 
                    data: generateTeacherEvolutionData(), 
                    isHistory: true
                })
            )
        );
    };

    // ============================================================
    // 8. COMPONENTE: APP
    // ============================================================
    var App = function() {
        var _user = useState(null);
        var user = _user[0];
        var setUser = _user[1];
        
        var _loginError = useState('');
        var loginError = _loginError[0];
        var setLoginError = _loginError[1];

        var ADMIN_EMAILS = ['alejandro.calderon@itdurango.edu.mx', 'desarrollo.academico@itdurango.edu.mx'];

        var handleLogin = function(response) {
            try {
                var payload = JSON.parse(atob(response.credential.split('.')[1]));
                var email = payload.email || '';
                if (email.endsWith('@itdurango.edu.mx') || ADMIN_EMAILS.includes(email)) {
                    var isAdmin = ADMIN_EMAILS.includes(email);
                    setUser({ name: payload.name, email: email, picture: payload.picture, isAdmin: isAdmin });
                } else {
                    setLoginError("Acceso denegado: Se requiere cuenta institucional @itdurango.edu.mx.");
                }
            } catch (error) {
                setLoginError("Error de autenticación.");
            }
        };

        var handleLogout = function() {
            setUser(null);
            setLoginError('');
            if (window.google) window.google.accounts.id.disableAutoSelect();
        };

        if (!user) return h(Login, { onLogin: handleLogin, loginError: loginError });
        return h(Dashboard, { user: user, isAdmin: user.isAdmin, onLogout: handleLogout });
    };

    // ============================================================
    // 9. MONTAJE
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        var rootEl = document.getElementById('root');
        if (rootEl) {
            try {
                var root = createRoot(rootEl);
                root.render(h(App, null));
                console.log('✅ Estadísticas ITD - App montada correctamente');
            } catch(e) {
                console.error('❌ Error al montar la app:', e);
                rootEl.innerHTML = 
                    '<div class="container mx-auto px-4 py-10 max-w-3xl">' +
                        '<div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm">' +
                            '<h3 class="text-lg font-bold text-red-800">⚠️ Error de carga</h3>' +
                            '<p class="text-red-700">No se pudo cargar la aplicación. Error: ' + e.message + '</p>' +
                            '<button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">Recargar página</button>' +
                        '</div>' +
                    '</div>';
            }
        } else {
            console.error('❌ No se encontró el elemento root');
        }
    });
</script>
</body>
