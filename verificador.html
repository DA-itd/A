<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validador de Constancias ITD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<body>
    <div id="root"></div>
    <script>
    // ============================================================
    // 1. CONFIGURACIÓN
    // ============================================================
    const SPREADSHEET_ID = '1CVXtvWAQSSL2efNBxfJH6SrLE2McmNXLlS-58-beScQ';
    const ITD_LOGO_URL = 'https://raw.githubusercontent.com/DA-itd/web2/main/image.jpg';
    const TECNM_LOGO_URL = 'https://raw.githubusercontent.com/DA-itd/web2/main/TecNM_logo.jpg';
    const VALIDATION_URL = 'https://da-itd.github.io/web2/verificador-3.html';

    // ============================================================
    // 2. REACT
    // ============================================================
    const React = window.React;
    const ReactDOM = window.ReactDOM;
    const { useState, useEffect } = React;
    const { createRoot } = ReactDOM;
    const h = React.createElement;

    // ============================================================
    // 3. SONIDOS
    // ============================================================
    const playSuccessSound = function() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const notas = [
                { frecuencia: 523.25, duracion: 0.3 },
                { frecuencia: 659.25, duracion: 0.3 },
                { frecuencia: 783.99, duracion: 0.3 },
                { frecuencia: 1046.50, duracion: 0.5 }
            ];
            notas.forEach(function(nota, index) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = nota.frecuencia;
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime + index * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + index * 0.15 + nota.duracion);
                osc.start(audioCtx.currentTime + index * 0.15);
                osc.stop(audioCtx.currentTime + index * 0.15 + nota.duracion);
            });
        } catch(e) { console.warn('Audio no disponible:', e); }
    };

    const playErrorSound = function() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.5);
        } catch(e) { console.warn('Audio no disponible:', e); }
    };

    // ============================================================
    // 4. FUNCIONES DE UTILIDAD
    // ============================================================
    const getProperty = function(obj, keyName) {
        if (!obj || typeof obj !== 'object' || !keyName) return undefined;
        const keyToFind = keyName.toLowerCase().trim();
        const keys = Object.keys(obj);
        for (let i = 0; i < keys.length; i++) {
            if (keys[i].toLowerCase().trim() === keyToFind) {
                return obj[keys[i]];
            }
        }
        return undefined;
    };

    const getFlexibleProperty = function(obj, keys) {
        if (!obj || typeof obj !== 'object' || !Array.isArray(keys)) return undefined;
        for (let i = 0; i < keys.length; i++) {
            const value = getProperty(obj, keys[i]);
            if (value !== undefined && value !== null && String(value).trim() !== '') {
                return value;
            }
        }
        return undefined;
    };

    const formatDate = function(dateValue) {
        if (dateValue === undefined || dateValue === null) return 'N/A';
        return String(dateValue).trim().toUpperCase();
    };

    const generateVerificationHash = function(data) {
        const folio = data.folio || '';
        const nombre = data.nombre || '';
        const fecha = data.fecha || '';
        const dataString = (folio + nombre + fecha).toUpperCase().replace(/\s/g, '');
        let hash = 0;
        for (let i = 0; i < dataString.length; i++) {
            const char = dataString.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
    };

    const formatVerificationCode = function(hash, folio) {
        const folioShort = folio.replace('TNM-054-', '').replace(/-/g, '');
        return hash.slice(0, 4) + '-' + hash.slice(4, 8) + '-' + folioShort;
    };

    // ============================================================
    // 5. BÚSQUEDA EXACTA CON NORMALIZACIÓN
    // ============================================================
    const limpiarFolio = function(folio) {
        if (!folio) return '';
        return String(folio).toUpperCase().trim().replace(/^TNM-054-/, '');
    };

    const normalizarNumero = function(num) {
        if (!num) return '';
        return String(parseInt(num, 10));
    };

    const extraerPartes = function(folioLimpio) {
        const match = folioLimpio.match(/^(\d+)-(\d{4})(?:-(.+))?$/);
        if (!match) return null;
        return {
            numero: normalizarNumero(match[1]),
            año: match[2],
            sufijo: match[3] ? match[3].toUpperCase() : ''
        };
    };

    const buscarFolio = function(dataSource, queryStr) {
        if (!queryStr || dataSource.length === 0) return null;
        
        const query = queryStr.trim().toUpperCase();
        const queryPartes = extraerPartes(query);
        
        if (!queryPartes) {
            console.log('⚠️ Formato de búsqueda no reconocido:', query);
            return null;
        }
        
        console.log('🔍 Buscando:', query);
        console.log('📋 Partes:', queryPartes);
        
        for (let i = 0; i < dataSource.length; i++) {
            const record = dataSource[i];
            const folio = getFlexibleProperty(record, ['folio']);
            const statusVal = getFlexibleProperty(record, ['status']) || '';
            
            if (!folio || String(statusVal).trim().toUpperCase() !== 'VALIDO') continue;
            
            const folioLimpio = limpiarFolio(folio);
            const folioPartes = extraerPartes(folioLimpio);
            
            if (!folioPartes) continue;
            
            console.log('📋 Comparando:', folioLimpio);
            
            // Coincidencia exacta (folio completo)
            if (folioLimpio === query) {
                console.log('✅ Coincidencia exacta:', folioLimpio);
                return record;
            }
            
            // Coincidencia por número y año (normalizado)
            if (folioPartes.numero === queryPartes.numero && folioPartes.año === queryPartes.año) {
                // Si el query tiene sufijo, debe coincidir
                if (queryPartes.sufijo && folioPartes.sufijo) {
                    if (folioPartes.sufijo === queryPartes.sufijo) {
                        console.log('✅ Coincidencia con sufijo:', folioLimpio);
                        return record;
                    }
                    continue;
                }
                // Si el query NO tiene sufijo, aceptar cualquier sufijo
                console.log('✅ Coincidencia por número y año:', folioLimpio);
                return record;
            }
            
            // Coincidencia con prefijo completo
            if (folio === query) {
                console.log('✅ Coincidencia con prefijo:', folio);
                return record;
            }
        }
        
        console.log('❌ No se encontró coincidencia');
        return null;
    };

    // ============================================================
    // 6. GENERACIÓN DE PDF
    // ============================================================
    const getImageDataFromURL = function(url) {
        return new Promise(function(resolve, reject) {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                if (ctx) {
                    ctx.drawImage(img, 0, 0);
                    const dataURL = canvas.toDataURL('image/jpeg');
                    resolve({ dataURL: dataURL, width: img.width, height: img.height });
                } else {
                    reject(new Error('Could not get canvas context.'));
                }
            };
            img.onerror = function() { reject(new Error('Error loading image')); };
            img.src = url;
        });
    };

    const generatePdf = function(result, query) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const addLogos = function() {
            return Promise.all([
                getImageDataFromURL(ITD_LOGO_URL).catch(function() { return null; }),
                getImageDataFromURL(TECNM_LOGO_URL).catch(function() { return null; })
            ]).then(function(results) {
                const itdLogo = results[0];
                const tecNmLogo = results[1];
                if (itdLogo) {
                    const aspectRatio = itdLogo.width / itdLogo.height;
                    const height = 25;
                    const width = height * aspectRatio;
                    doc.addImage(itdLogo.dataURL, 'JPEG', 15, 12, width, height);
                } else {
                    doc.setFontSize(14);
                    doc.setTextColor(0, 0, 139);
                    doc.text('ITD', 15, 30);
                }
                if (tecNmLogo) {
                    const aspectRatio = tecNmLogo.width / tecNmLogo.height;
                    const height = 20;
                    const width = height * aspectRatio;
                    const x = doc.internal.pageSize.getWidth() - 15 - width;
                    doc.addImage(tecNmLogo.dataURL, 'JPEG', x, 12, width, height);
                } else {
                    doc.setFontSize(12);
                    doc.setTextColor(0, 0, 0);
                    doc.text('TecNM', doc.internal.pageSize.getWidth() - 40, 27);
                }
            });
        };

        return addLogos().then(function() {
            doc.setFontSize(80);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(200, 200, 200);
            doc.setGState(new doc.GState({ opacity: 0.3 }));
            doc.text('VALIDO', 105, 160, { align: 'center', angle: 45 });
            doc.setGState(new doc.GState({ opacity: 1 }));

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(11);
            doc.setTextColor(0, 0, 0);
            doc.text('TECNOLÓGICO NACIONAL DE MÉXICO', 105, 20, { align: 'center' });
            doc.text('INSTITUTO TECNOLÓGICO DE DURANGO', 105, 27, { align: 'center' });
            
            const tipo = getFlexibleProperty(result, ['tipo']) || 'Documento';
            const titleText = tipo.toUpperCase() === 'PROFESIONAL' ? 'Constancia de Validez' : 'Documento de Validez';
            
            doc.setFontSize(18);
            doc.text(titleText, 105, 45, { align: 'center' });
            
            let folioExacto = getFlexibleProperty(result, ['folio']) || 'TNM-054-' + query;
            
            const data = {
                'Folio': folioExacto,
                'Nombre del Titular': getFlexibleProperty(result, ['nombre']) || 'N/A',
                'Curso/Taller': getFlexibleProperty(result, ['curso']) || 'N/A',
                'Fecha': formatDate(getFlexibleProperty(result, ['fecha'])) || 'N/A',
                'Departamento': getFlexibleProperty(result, ['departamento']) || 'N/A',
                'Duración': getFlexibleProperty(result, ['duracion']) || 'N/A',
            };
            
            let y = 65;
            doc.setFontSize(11);
            Object.keys(data).forEach(function(key) {
                const value = data[key];
                if (value === undefined || value === null) return;
                doc.setFont('helvetica', 'bold');
                doc.text(key + ':', 20, y);
                doc.setFont('helvetica', 'normal');
                const lines = doc.splitTextToSize(String(value).toUpperCase(), 120);
                doc.text(lines, 70, y);
                y += (lines.length * 7) + 5;
            });

            y += 5;
            doc.setLineWidth(0.2);
            doc.line(20, y, 190, y);
            y += 7;

            try {
                const fullFolio = data['Folio'] || 'TNM-054-' + query;
                const folioShort = fullFolio.replace('TNM-054-', '');
                const qrContent = VALIDATION_URL + '?folio=' + encodeURIComponent(folioShort);
                
                const qr = new QRious({
                    value: qrContent,
                    level: 'M',
                    size: 150
                });
                const qrDataURL = qr.toDataURL();

                const qrSize = 30;
                const qrX = 20;
                const qrY = y + 3;
                doc.addImage(qrDataURL, 'PNG', qrX, qrY, qrSize, qrSize);

                const verificationData = {
                    folio: fullFolio,
                    nombre: data['Nombre del Titular'] || '',
                    fecha: data['Fecha'] || ''
                };
                const hash = generateVerificationHash(verificationData);
                const verificationCode = formatVerificationCode(hash, fullFolio);
                
                const textX = qrX + qrSize + 5;
                let textY = qrY + 5;
                
                doc.setFontSize(8);
                doc.setTextColor(100, 100, 100);
                doc.setFont('helvetica', 'normal');
                
                doc.text('Este documento ha sido verificado digitalmente', textX, textY);
                doc.text('por el Instituto Tecnológico de Durango.', textX, textY + 4);
                
                const now = new Date();
                doc.text('Generado: ' + now.toLocaleDateString('es-ES'), textX, textY + 10);
                doc.text('Hora: ' + now.toLocaleTimeString('es-ES'), textX, textY + 14);
                
                textY += 20;
                doc.setFontSize(7);
                doc.setTextColor(80, 80, 80);
                doc.setFont('helvetica', 'bold');
                doc.text('CÓDIGO DE VERIFICACIÓN:', textX, textY);
                
                doc.setFontSize(10);
                doc.setTextColor(0, 0, 139);
                doc.setFont('courier', 'bold');
                doc.text(verificationCode, textX, textY + 5);
                
                doc.setFontSize(7);
                doc.setTextColor(120, 120, 120);
                doc.setFont('helvetica', 'italic');
                doc.text('Valide este documento escaneando el QR.', textX, textY + 10);
                
            } catch (error) {
                console.error('Error al generar QR:', error);
                doc.setFontSize(8);
                doc.setTextColor(255, 0, 0);
                doc.text('Error al crear sello digital.', 20, y + 15);
            }

            const filename = 'Validacion-' + (data['Folio'] || query) + '.pdf';
            doc.save(filename);
        });
    };

    // ============================================================
    // 7. PARSEO DE CSV
    // ============================================================
    const parseCsv = function(text) {
        const lines = text.split(/\r?\n/).filter(function(l) { return l.trim() !== ''; });
        if (lines.length === 0) return [];

        const parseRow = function(line) {
            const cols = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (ch === ',' && !inQuotes) {
                    cols.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            cols.push(current.trim());
            return cols;
        };

        return lines.map(parseRow);
    };

    const aoa2json = function(dataAoA) {
        if (!dataAoA || dataAoA.length === 0) return [];

        let headerRowIndex = -1;
        for (let i = 0; i < dataAoA.length; i++) {
            if (Array.isArray(dataAoA[i])) {
                const row = dataAoA[i].map(function(c) { return String(c || '').toLowerCase().trim(); });
                for (let j = 0; j < row.length; j++) {
                    if (row[j] === 'folio' || row[j] === 'nombre' || row[j] === 'status' || row[j] === 'año') {
                        headerRowIndex = i;
                        break;
                    }
                }
                if (headerRowIndex !== -1) break;
            }
        }

        if (headerRowIndex === -1) {
            headerRowIndex = 0;
        }

        const headers = dataAoA[headerRowIndex].map(function(h) { return String(h || '').trim(); });
        const dataRows = dataAoA.slice(headerRowIndex + 1);

        return dataRows
            .filter(function(row) { return Array.isArray(row) && row.some(function(cell) { return String(cell || '').trim() !== ''; }); })
            .map(function(row) {
                const obj = {};
                headers.forEach(function(header, idx) {
                    if (header && idx < row.length && row[idx] !== undefined && row[idx] !== null) {
                        const value = String(row[idx]).trim();
                        if (value !== '') {
                            obj[header] = value;
                        }
                    }
                });
                return obj;
            })
            .filter(function(obj) { return Object.keys(obj).length > 0; });
    };

    // ============================================================
    // 8. CARGA DE DATOS
    // ============================================================
    const loadDatabase = function() {
        console.log('🚀 Iniciando carga de datos...');
        const sheets = [
            { gid: '1849431809', name: 'validation 2025' },
            { gid: '0', name: 'validation 2026' }
        ];
        
        const allData = [];
        
        return sheets.reduce(function(promise, sheet) {
            return promise.then(function() {
                const csvUrl = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/export?format=csv&gid=' + sheet.gid + '&t=' + Date.now();
                console.log('📥 Cargando ' + sheet.name + '...');
                
                return fetch(csvUrl)
                    .then(function(res) {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.text();
                    })
                    .then(function(text) {
                        if (!text || text.trim() === '') {
                            console.warn('⚠️ ' + sheet.name + ' está vacía');
                            return;
                        }
                        const aoa = parseCsv(text);
                        const records = aoa2json(aoa);
                        console.log('📊 ' + sheet.name + ': ' + records.length + ' registros');
                        records.forEach(function(r) { allData.push(r); });
                    })
                    .catch(function(err) {
                        console.warn('❌ Error en ' + sheet.name + ':', err.message);
                    });
            });
        }, Promise.resolve())
        .then(function() {
            console.log('📊 Total registros:', allData.length);
            return allData;
        });
    };

    // ============================================================
    // 9. COMPONENTES
    // ============================================================
    const Spinner = function() {
        return h('div', { className: 'animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4' });
    };

    const Header = function() {
        return h('header', { className: 'bg-white shadow-sm' },
            h('div', { className: 'container mx-auto px-6 py-4 flex items-center' },
                h('img', { src: ITD_LOGO_URL, alt: 'Logo ITD', className: 'h-16 mr-4' }),
                h('h1', { className: 'text-lg sm:text-xl font-bold text-gray-800' }, 'Validador de Constancias ITD')
            )
        );
    };

    const Footer = function() {
        return h('footer', { className: 'bg-gradient-to-r from-blue-900 to-indigo-900 text-white text-center py-6 mt-auto' },
            h('div', { className: 'container mx-auto px-4' },
                h('p', { className: 'font-semibold text-sm' }, '© Coordinación de Actualización Docente'),
                h('p', { className: 'text-xs opacity-90' }, 'M.C. Alejandro Calderón Rentería')
            )
        );
    };

    // ============================================================
    // SEARCH FORM
    // ============================================================
    const SearchForm = function(props) {
        const query = props.query;
        const setQuery = props.setQuery;
        const onSearch = props.onSearch;
        const onClear = props.onClear;
        const onReload = props.onReload;
        const loading = props.loading;

        const handleKeyDown = function(e) {
            if (e.key === 'Enter') onSearch();
        };

        return h('div', { className: 'bg-white p-6 sm:p-8 rounded-xl shadow-md w-full max-w-2xl' },
            h('div', { className: 'flex justify-between items-center mb-2' },
                h('h2', { className: 'text-xl font-bold text-gray-800' }, 'Buscar Constancia'),
                h('button', {
                    onClick: onReload,
                    disabled: loading,
                    className: 'text-xs text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1 disabled:opacity-50'
                },
                    loading ? '⏳ Cargando...' : '🔄 Recargar datos'
                )
            ),
            h('p', { className: 'text-gray-600 mb-4 text-sm' }, 
                'Ingrese exactamente el número de folio (ej: 1-2025, 23-2025-II)'
            ),
            
            h('div', { className: 'flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-4' },
                h('div', { className: 'flex-grow w-full' },
                    h('div', { className: 'flex w-full border border-gray-300 rounded-md focus-within:ring-2 focus-within:ring-blue-500 overflow-hidden' },
                        h('span', { className: 'px-3 text-gray-500 bg-gray-50 border-r border-gray-300 flex items-center whitespace-nowrap text-sm' }, 'TNM-054-'),
                        h('input', {
                            type: 'text',
                            className: 'w-full pl-4 pr-4 py-2 border-none focus:outline-none bg-transparent uppercase',
                            placeholder: '1-2025',
                            value: query,
                            onChange: function(e) { setQuery(e.target.value.toUpperCase()); },
                            onKeyDown: handleKeyDown,
                            autoFocus: true,
                            disabled: loading
                        })
                    )
                ),
                h('div', { className: 'flex space-x-2 w-full sm:w-auto flex-shrink-0' },
                    h('button', {
                        onClick: onSearch,
                        disabled: loading || !query,
                        className: 'flex-1 sm:flex-none px-6 py-2 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed'
                    }, loading ? 'Buscando...' : 'Verificar'),
                    h('button', {
                        onClick: onClear,
                        disabled: loading,
                        className: 'flex-1 sm:flex-none px-6 py-2 bg-gray-200 text-gray-700 font-semibold rounded-md hover:bg-gray-300 disabled:opacity-50'
                    }, 'Borrar')
                )
            ),
            h('p', { className: 'text-xs text-gray-400 mt-3 text-center' },
                'Los datos se cargan al abrir la página. Usa "Recargar datos" para actualizar cambios.'
            )
        );
    };

    // ============================================================
    // RESULTADO
    // ============================================================
    const Resultado = function(props) {
        const status = props.status;
        const result = props.result;
        const query = props.query;
        const [generating, setGenerating] = useState(false);

        const handleDownload = function() {
            if (!result) return;
            setGenerating(true);
            generatePdf(result, query)
                .catch(function(error) {
                    console.error('Error al generar PDF:', error);
                    alert('Error al generar el PDF. Intente nuevamente.');
                })
                .finally(function() {
                    setGenerating(false);
                });
        };

        if (status === 'idle') return null;

        if (status === 'not_found') {
            return h('div', { className: 'mt-6 p-6 bg-red-50 border-l-4 border-red-500 rounded-r-lg shadow w-full max-w-2xl' },
                h('div', { className: 'flex items-center gap-3' },
                    h('span', { className: 'text-3xl' }, '❌'),
                    h('div', null,
                        h('h3', { className: 'text-lg font-bold text-red-800' }, 'Documento no Encontrado'),
                        h('p', { className: 'text-red-700' }, 'El folio TNM-054-' + query + ' no fue encontrado o no está vigente.')
                    )
                ),
                h('div', { className: 'mt-4 pt-4 border-t border-red-200 text-center' },
                    h('a', { href: 'index.html', className: 'text-sm text-blue-600 hover:underline' }, '← Volver al Portal Principal')
                )
            );
        }

        if (status === 'success' && result) {
            let folioDisplay = getFlexibleProperty(result, ['folio']);
            if (!folioDisplay) {
                folioDisplay = 'TNM-054-' + query;
            }
            const folioLimpio = folioDisplay;

            const fields = [
                { key: 'folio', label: 'Folio' },
                { key: 'nombre', label: 'Nombre' },
                { key: 'curso', label: 'Curso' },
                { key: 'fecha', label: 'Fecha' },
                { key: 'departamento', label: 'Departamento' },
                { key: 'duracion', label: 'Duración' },
                { key: 'tipo', label: 'Tipo' },
            ];

            const items = fields.map(function(field) {
                let value = getFlexibleProperty(result, [field.key]);
                if (!value) return null;
                if (field.key === 'folio') {
                    return h('div', { key: field.key },
                        h('p', { className: 'text-gray-500' }, field.label),
                        h('p', { className: 'font-bold text-gray-800 break-words' }, folioLimpio)
                    );
                }
                return h('div', { key: field.key },
                    h('p', { className: 'text-gray-500' }, field.label),
                    h('p', { className: 'font-bold text-gray-800 break-words' }, String(value).toUpperCase())
                );
            }).filter(function(item) { return item !== null; });

            const fullFolio = folioLimpio;
            const nombre = getFlexibleProperty(result, ['nombre']) || '';
            const fecha = getFlexibleProperty(result, ['fecha']) || '';
            const hash = generateVerificationHash({ folio: fullFolio, nombre: nombre, fecha: fecha });
            const verificationCode = formatVerificationCode(hash, fullFolio);

            return h('div', { className: 'mt-6 bg-green-50 border-l-4 border-green-500 rounded-r-lg shadow w-full max-w-2xl' },
                h('div', { className: 'p-6' },
                    h('div', { className: 'flex items-center gap-3' },
                        h('span', { className: 'text-3xl' }, '✅'),
                        h('div', { className: 'flex-1' },
                            h('h3', { className: 'text-lg font-bold text-green-800' }, 'Documento Válido'),
                            h('p', { className: 'text-green-700 text-sm' }, 'Folio: ' + folioLimpio)
                        ),
                        h('button', {
                            onClick: handleDownload,
                            disabled: generating,
                            className: 'px-4 py-2 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 disabled:bg-blue-400 text-sm flex items-center gap-2'
                        },
                            generating ? '⏳ Generando...' : '📄 Descargar PDF'
                        )
                    ),
                    h('div', { className: 'mt-3 p-3 bg-blue-50 rounded-lg border border-blue-200' },
                        h('p', { className: 'text-xs text-gray-600' }, 'Código de Verificación:'),
                        h('p', { className: 'font-mono font-bold text-blue-800 text-sm' }, verificationCode)
                    ),
                    h('p', { className: 'text-green-600 text-sm mt-2' }, 'Este documento ha sido verificado en la base de datos oficial del ITD.')
                ),
                h('div', { className: 'bg-white p-6 grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4 text-sm border-t border-green-200' },
                    items
                ),
                h('div', { className: 'bg-white p-4 text-center border-t border-gray-100 rounded-b-lg' },
                    h('a', { href: 'index.html', className: 'text-sm text-blue-600 hover:underline' }, '← Volver al Portal Principal')
                )
            );
        }

        return null;
    };

    // ============================================================
    // 10. APP PRINCIPAL
    // ============================================================
    const App = function() {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [data, setData] = useState([]);
        const [query, setQuery] = useState('');
        const [status, setStatus] = useState('idle');
        const [result, setResult] = useState(null);
        const [searching, setSearching] = useState(false);

        const recargarDatos = function() {
            setLoading(true);
            setStatus('idle');
            setResult(null);
            
            loadDatabase()
                .then(function(db) {
                    console.log('✅ Datos recargados:', db.length);
                    setData(db);
                    setLoading(false);
                    const msg = document.createElement('div');
                    msg.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded shadow-lg z-50';
                    msg.textContent = '✅ Datos recargados correctamente';
                    document.body.appendChild(msg);
                    setTimeout(function() { msg.remove(); }, 3000);
                })
                .catch(function(err) {
                    console.error('❌ Error al recargar:', err);
                    setError(err.message);
                    setLoading(false);
                });
        };

        useEffect(function() {
            console.log('🔍 Componente montado');
            
            const params = new URLSearchParams(window.location.search);
            const folioFromUrl = params.get('folio');
            
            loadDatabase()
                .then(function(db) {
                    console.log('✅ Datos cargados:', db.length);
                    setData(db);
                    setLoading(false);
                    
                    if (folioFromUrl) {
                        const folioQuery = folioFromUrl.trim().toUpperCase();
                        setQuery(folioQuery);
                        setTimeout(function() {
                            const found = buscarFolio(db, folioQuery);
                            if (found) {
                                let folioValue = getFlexibleProperty(found, ['folio']);
                                if (folioValue && !String(folioValue).toUpperCase().startsWith('TNM-054-')) {
                                    folioValue = 'TNM-054-' + String(folioValue);
                                }
                                const resultObj = Object.assign({}, found);
                                resultObj.folio = folioValue || 'TNM-054-' + folioQuery;
                                setResult(resultObj);
                                setStatus('success');
                                playSuccessSound();
                            } else {
                                setResult(null);
                                setStatus('not_found');
                                playErrorSound();
                            }
                        }, 500);
                    }
                })
                .catch(function(err) {
                    console.error('❌ Error:', err);
                    setError(err.message);
                    setLoading(false);
                });
        }, []);

        const handleSearch = function() {
            if (!query || data.length === 0 || searching) return;
            setSearching(true);
            setTimeout(function() {
                const found = buscarFolio(data, query);
                if (found) {
                    let folioValue = getFlexibleProperty(found, ['folio']);
                    if (folioValue && !String(folioValue).toUpperCase().startsWith('TNM-054-')) {
                        folioValue = 'TNM-054-' + String(folioValue);
                    }
                    const resultObj = Object.assign({}, found);
                    resultObj.folio = folioValue || 'TNM-054-' + query;
                    setResult(resultObj);
                    setStatus('success');
                    playSuccessSound();
                } else {
                    setResult(null);
                    setStatus('not_found');
                    playErrorSound();
                }
                setSearching(false);
            }, 300);
        };

        const handleClear = function() {
            setQuery('');
            setStatus('idle');
            setResult(null);
            if (window.history && window.history.pushState) {
                window.history.pushState({}, '', window.location.pathname);
            }
        };

        if (loading) {
            return h('div', { className: 'flex flex-col items-center justify-center min-h-screen bg-slate-100' },
                h(Spinner, null),
                h('p', { className: 'text-gray-600 mt-4' }, 'Cargando base de datos...'),
                h('p', { className: 'text-xs text-gray-400 mt-2' }, 'Revisa la consola (F12) para ver logs')
            );
        }

        if (error) {
            return h('div', { className: 'flex items-center justify-center min-h-screen bg-slate-100 p-4' },
                h('div', { className: 'bg-white rounded-xl shadow-lg p-8 max-w-lg w-full text-center' },
                    h('div', { className: 'text-red-500 text-6xl mb-4' }, '❌'),
                    h('h2', { className: 'text-xl font-bold text-red-700 mb-2' }, 'Error al cargar datos'),
                    h('p', { className: 'text-gray-600' }, error),
                    h('p', { className: 'text-xs text-gray-400 mt-4' }, 'Revisa la consola (F12) para más detalles')
                )
            );
        }

        return h('div', { className: 'min-h-screen bg-slate-100 flex flex-col' },
            h(Header, null),
            
            h('main', { className: 'flex-grow container mx-auto p-4 sm:p-6 flex flex-col items-center' },
                h('div', { className: 'w-full max-w-2xl mb-4' },
                    h('a', { href: 'index.html', className: 'inline-flex items-center text-sm text-blue-600 hover:text-blue-800 hover:underline' },
                        '← Volver al Portal Principal'
                    )
                ),
                h(SearchForm, {
                    query: query,
                    setQuery: setQuery,
                    onSearch: handleSearch,
                    onClear: handleClear,
                    onReload: recargarDatos,
                    loading: searching || loading
                }),
                h(Resultado, {
                    status: status,
                    result: result,
                    query: query
                })
            ),
            
            h(Footer, null)
        );
    };

    // ============================================================
    // 11. MONTAJE
    // ============================================================
    const rootElement = document.getElementById('root');
    if (rootElement) {
        const root = createRoot(rootElement);
        root.render(h(App, null));
        console.log('✅ React montado');
    } else {
        console.error('❌ No se encontró #root');
    }
    </script>
</body>
</html>
