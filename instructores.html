    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const CONFIG = {
            APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwFO97VhIEO2ke2p-ZvYpXMWHP_LAxqmR0U5CmhPvOoQAH24FUAOt2rqGtoUhU-MKQauw/exec',
            COURSES_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSAe4dmVN4CArjEy_lvI5qrXf16naxZLO1lAxGm2Pj4TrdnoebBg03Vv4-DCXciAkHJFiZaBMKletUs/pub?gid=0&single=true&output=csv',
            TEACHERS_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSAe4dmVN4CArjEy_lvI5qrXf16naxZLO1lAxGm2Pj4TrdnoebBg03Vv4-DCXciAkHJFiZaBMKletUs/pub?gid=987931491&single=true&output=csv'
        };

        // ============================================================
        // UTILIDADES
        // ============================================================
        function removeAccents(text) {
            if (!text) return '';
            return text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function cleanCSVValue(val) {
            let cleaned = val.trim();
            if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
                cleaned = cleaned.substring(1, cleaned.length - 1).replace(/""/g, '"');
            }
            return cleaned;
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const result = reader.result;
                    resolve(result.includes(',') ? result.split(',')[1] : result);
                };
                reader.onerror = reject;
            });
        }

        function formatCourseDates(dates) {
            if (!dates) return '';
            return dates.split(',').map(d => d.trim()).join(' | ');
        }

        // ============================================================
        // API
        // ============================================================
        async function getTeachers() {
            try {
                const resp = await fetch(`${CONFIG.TEACHERS_CSV_URL}&_=${Date.now()}`);
                if (!resp.ok) throw new Error('Error al cargar docentes');
                const text = await resp.text();
                const lines = text.trim().split(/\r?\n/);
                return lines.slice(1)
                    .filter(line => line.trim())
                    .map(line => {
                        const vals = parseCSVLine(line);
                        if (vals.length < 3) return null;
                        return {
                            nombreCompleto: cleanCSVValue(vals[0]),
                            curp: cleanCSVValue(vals[1]),
                            email: cleanCSVValue(vals[2])
                        };
                    })
                    .filter(t => t !== null);
            } catch (e) {
                console.error('Error getTeachers:', e);
                return [];
            }
        }

        async function getCourses() {
            try {
                const resp = await fetch(`${CONFIG.COURSES_CSV_URL}&_=${Date.now()}`);
                if (!resp.ok) throw new Error('Error al cargar cursos');
                const text = await resp.text();
                const lines = text.trim().split(/\r?\n/);
                return lines.slice(1)
                    .filter(line => line.trim())
                    .map(line => {
                        const vals = parseCSVLine(line);
                        if (vals.length < 8) return null;
                        const hours = parseInt(cleanCSVValue(vals[4]), 10);
                        return {
                            id: cleanCSVValue(vals[0]),
                            name: cleanCSVValue(vals[1]),
                            dates: cleanCSVValue(vals[2]),
                            period: cleanCSVValue(vals[3]),
                            hours: isNaN(hours) ? 30 : hours,
                            location: cleanCSVValue(vals[5]),
                            schedule: cleanCSVValue(vals[6]),
                            type: cleanCSVValue(vals[7])
                        };
                    })
                    .filter(c => c !== null);
            } catch (e) {
                console.error('Error getCourses:', e);
                return [];
            }
        }

        async function submitProposal(data) {
            const resp = await fetch(CONFIG.APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'submitInstructorProposal', ...data })
            });
            const text = await resp.text();
            try { return JSON.parse(text); } catch { throw new Error('Error en el servidor'); }
        }

        async function submitEvidence(data) {
            const resp = await fetch(CONFIG.APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'submitInstructorEvidence', ...data })
            });
            const text = await resp.text();
            try { return JSON.parse(text); } catch { throw new Error('Error en el servidor'); }
        }

        // ============================================================
        // COMPONENTES (DOM puro)
        // ============================================================
        function renderFormProposal(teachers, courses) {
            const grouped = courses.reduce((acc, c) => {
                const period = c.period || 'Sin Periodo';
                if (!acc[period]) acc[period] = { courses: [], dates: '' };
                acc[period].courses.push(c);
                if (!acc[period].dates && c.dates) acc[period].dates = formatCourseDates(c.dates);
                return acc;
            }, {});

            const periodColors = [
                'from-violet-600 to-indigo-600',
                'from-emerald-600 to-teal-600',
                'from-amber-500 to-orange-500',
                'from-rose-600 to-pink-600'
            ];

            let coursesHtml = '';
            let pIdx = 0;
            for (const [period, data] of Object.entries(grouped)) {
                const color = periodColors[pIdx % periodColors.length];
                coursesHtml += `
                    <div class="mb-4">
                        <div class="inline-flex items-center gap-2 bg-gradient-to-r ${color} text-white text-xs font-bold px-4 py-1.5 rounded-full mb-3 shadow-sm">
                            ${data.dates ? `${period.replace(/_/g, ' ')} · ${data.dates}` : period.replace(/_/g, ' ')}
                        </div>
                        <div class="flex flex-col gap-1.5">
                            ${data.courses.map(c => `

                `;

            }

            return `
                <form id="proposalForm" novalidate>

                        </p>
                        <a href="formatos.html" target="_blank" class="block w-full text-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors shadow-md text-sm">
                            Ir a la Página de Formatos ↗️
                        </a>
                        <div class="mt-3 flex items-start gap-2 bg-yellow-50 border-l-4 border-yellow-400 p-2.5 rounded">
                            <span class="text-xl">⚠️</span>
                            <p class="text-xs text-yellow-800"><strong>Importante:</strong> Los archivos deben ser convertidos a PDF.</p>
                        </div>
                    </div>

                    <!-- Mensaje de error -->
                    <div id="proposalError" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 rounded text-sm"></div>
                    <div id="proposalProgress" class="hidden bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-3 mb-4 rounded text-sm animate-pulse"></div>
                    <div id="proposalSuccess" class="hidden bg-green-100 border-l-4 border-green-500 text-green-700 p-3 mb-4 rounded text-sm"></div>

                    <!-- Campos -->
                    <div class="space-y-5">
                        <!-- Instructor -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">👤 Nombre del Instructor *</label>
                            <input type="text" id="propInstructor" list="teacherList" 
                                   class="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400 outline-none text-sm transition-all"
                                   placeholder="Escriba su nombre completo" required autocomplete="off">
                            <datalist id="teacherList">
                                ${teachers.map(t => `<option value="${t.nombreCompleto}">`).join('')}
                            </datalist>
                        </div>

                        <!-- Curso -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">📚 Selecciona el Curso a Ofrecer *</label>
                            ${courses.length === 0 ? 
                                '<p class="text-center py-6 text-slate-400 text-sm">No hay cursos disponibles.</p>' : 
                                coursesHtml
                            }
                        </div>

                        <!-- Archivos -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">📄 CV (PDF) *</label>
                                <input type="file" id="propCvu" accept=".pdf,application/pdf" 
                                       class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                                <p class="text-xs text-gray-400 mt-1">Máx 1MB</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">📋 Ficha Técnica (PDF) *</label>
                                <input type="file" id="propFicha" accept=".pdf,application/pdf" 
                                       class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                                <p class="text-xs text-gray-400 mt-1">Máx 1MB</p>

                    <div class="mt-6 flex justify-end">
                        <button type="submit" id="propSubmitBtn"

            `;
        }

        function renderFormEvidence(teachers, courses) {
            const grouped = courses.reduce((acc, c) => {
                const period = c.period || 'Sin Periodo';
                if (!acc[period]) acc[period] = { courses: [], dates: '' };
                acc[period].courses.push(c);
                if (!acc[period].dates && c.dates) acc[period].dates = formatCourseDates(c.dates);
                return acc;
            }, {});

            const periodColors = [
                'from-violet-600 to-indigo-600',
                'from-emerald-600 to-teal-600',
                'from-amber-500 to-orange-500',
                'from-rose-600 to-pink-600'
            ];

            let coursesHtml = '';
            let pIdx = 0;
            for (const [period, data] of Object.entries(grouped)) {
                const color = periodColors[pIdx % periodColors.length];
                coursesHtml += `

                            ${data.dates ? `${period.replace(/_/g, ' ')} · ${data.dates}` : period.replace(/_/g, ' ')}
                        </div>

                pIdx++;
            }

            return `
                <form id="evidenceForm" novalidate>
                    <!-- Info -->
                    <div class="bg-blue-50 border-l-4 border-blue-500 text-blue-800 p-3 rounded-lg mb-5 text-sm">
                        <p>Suba hasta 6 archivos (máx 1MB cada uno). Formatos: PDF o imágenes.</p>
                    </div>

                    <!-- Mensajes -->
                    <div id="evidenceError" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 rounded text-sm"></div>
                    <div id="evidenceProgress" class="hidden bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-3 mb-4 rounded text-sm animate-pulse"></div>
                    <div id="evidenceSuccess" class="hidden bg-green-100 border-l-4 border-green-500 text-green-700 p-3 mb-4 rounded text-sm"></div>

                    <!-- Campos -->

                            <input type="text" id="evInstructor" list="teacherListEv" 
                                   class="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400 outline-none text-sm transition-all"

                            <datalist id="teacherListEv">
                                ${teachers.map(t => `<option value="${t.nombreCompleto}">`).join('')}

                            ${courses.length === 0 ? 
                                '<p class="text-center py-6 text-slate-400 text-sm">No hay cursos disponibles.</p>' : 
                                coursesHtml
                            }
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">📎 Archivos de Evidencia (hasta 6) *</label>

                                <div class="text-4xl mb-2">📁</div>

                                       class="block w-full text-sm text-gray-500 file:mr-3 file:py-2.5 file:px-5 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 file:cursor-pointer cursor-pointer">
                                <p class="text-xs text-gray-500 mt-2">PDF o imágenes (JPG, PNG) • Máximo 1MB por archivo</p>

                        🚪 Salir
                    </button>
                </div>
            `;
        }

        // ============================================================
        // CONTROLADOR PRINCIPAL
        // ============================================================
        let teachersData = [];
        let coursesData = [];
        let currentTab = 'proposal';

        async function initApp() {
            const loading = document.getElementById('loadingState');
            const content = document.getElementById('dynamicContent');

            try {
                [teachersData, coursesData] = await Promise.all([getTeachers(), getCourses()]);
                loading.style.display = 'none';
                content.style.display = 'block';
                renderTab('proposal');
            } catch (e) {
                loading.innerHTML = `
                    <div class="text-center py-8">
                        <p class="text-red-500">Error al cargar los datos. Por favor recarga la página.</p>
                        <p class="text-sm text-gray-500 mt-2">${e.message}</p>
                    </div>
                `;
            }
        }

        function renderTab(tab) {
            currentTab = tab;
            const content = document.getElementById('dynamicContent');
            const tabProposal = document.getElementById('tabProposal');
            const tabEvidence = document.getElementById('tabEvidence');

            // Actualizar tabs
            tabProposal.className = `px-4 sm:px-6 py-3 text-sm sm:text-base transition-colors rounded-t-lg ${tab === 'proposal' ? 'tab-active' : 'tab-inactive'}`;
            tabEvidence.className = `px-4 sm:px-6 py-3 text-sm sm:text-base transition-colors rounded-t-lg ${tab === 'evidence' ? 'tab-active' : 'tab-inactive'}`;

            if (tab === 'proposal') {
                content.innerHTML = renderFormProposal(teachersData, coursesData);
                attachProposalEvents();
            } else {
                content.innerHTML = renderFormEvidence(teachersData, coursesData);
                attachEvidenceEvents();
            }

            // Animación
            content.className = 'fade-in';
        }

        // ============================================================
        // EVENTOS - PROPUESTA
        // ============================================================
        function attachProposalEvents() {
            const form = document.getElementById('proposalForm');
            if (!form) return;

            // Seleccionar curso automáticamente
            document.querySelectorAll('input[name="proposalCourse"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    document.querySelectorAll('input[name="proposalCourse"]').forEach(r => {
                        r.closest('label').style.borderColor = '#e2e8f0';
                    });
                    if (this.checked) {
                        this.closest('label').style.borderColor = '#4f46e5';
                        this.closest('label').style.background = '#eef2ff';
                    }
                });
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const errorDiv = document.getElementById('proposalError');
                const progressDiv = document.getElementById('proposalProgress');
                const successDiv = document.getElementById('proposalSuccess');
                const submitBtn = document.getElementById('propSubmitBtn');

                // Reset
                errorDiv.classList.add('hidden');
                progressDiv.classList.add('hidden');
                successDiv.classList.add('hidden');

                // Obtener datos
                const instructor = document.getElementById('propInstructor').value.trim();
                const courseRadio = document.querySelector('input[name="proposalCourse"]:checked');
                const cvuFile = document.getElementById('propCvu').files[0];
                const fichaFile = document.getElementById('propFicha').files[0];

                // Validar
                if (!instructor) {
                    errorDiv.textContent = '⚠️ Ingresa tu nombre completo.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                if (!courseRadio) {
                    errorDiv.textContent = '⚠️ Selecciona un curso.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                if (!cvuFile) {
                    errorDiv.textContent = '⚠️ Sube tu CV en PDF.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                if (cvuFile.size > 1024 * 1024) {
                    errorDiv.textContent = '⚠️ El CV no debe exceder 1MB.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                if (!fichaFile) {
                    errorDiv.textContent = '⚠️ Sube la ficha técnica en PDF.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                if (fichaFile.size > 1024 * 1024) {
                    errorDiv.textContent = '⚠️ La ficha técnica no debe exceder 1MB.';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviando...';
                progressDiv.textContent = '⏳ Subiendo documentación...';
                progressDiv.classList.remove('hidden');

                try {
                    const [cvuBase64, fichaBase64] = await Promise.all([
                        fileToBase64(cvuFile),
                        fileToBase64(fichaFile)
                    ]);

                    const result = await submitProposal({
                        instructorName: instructor.toUpperCase(),
                        courseName: courseRadio.dataset.name,
                        courseId: courseRadio.value,
                        cvuFile: cvuBase64,
                        cvuFileName: cvuFile.name,
                        fichaFile: fichaBase64,
                        fichaFileName: fichaFile.name
                    });

                    progressDiv.classList.add('hidden');
                    if (result.success || result.ok) {
                        document.getElementById('dynamicContent').innerHTML = renderSuccessScreen(
                            '¡Propuesta enviada con éxito! ✅',
                            true
                        );
                    } else {
                        errorDiv.textContent = '❌ ' + (result.message || 'Error al enviar');
                        errorDiv.classList.remove('hidden');
                    }
                } catch (err) {
                    progressDiv.classList.add('hidden');
                    errorDiv.textContent = '❌ ' + (err.message || 'Error de conexión');
                    errorDiv.classList.remove('hidden');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar Documentación';
                }
            });
        }

        // ============================================================
        // EVENTOS - EVIDENCIAS
        // ============================================================
        function attachEvidenceEvents() {
            const form = document.getElementById('evidenceForm');
            if (!form) return;

            // Lista de archivos
            const fileInput = document.getElementById('evFiles');
            const fileList = document.getElementById('fileList');
            const fileListItems = document.getElementById('fileListItems');

            fileInput.addEventListener('change', function() {
                const files = Array.from(this.files);
                if (files.length > 6) {
                    alert('No puedes seleccionar más de 6 archivos.');
                    this.value = '';
                    fileList.classList.add('hidden');
                    return;
                }
                const oversized = files.filter(f => f.size > 1024 * 1024);
                if (oversized.length > 0) {
                    alert(`Los siguientes archivos superan 1MB: ${oversized.map(f => f.name).join(', ')}`);
                    this.value = '';
                    fileList.classList.add('hidden');
                    return;
                }
                if (files.length > 0) {
                    fileList.classList.remove('hidden');
                    fileListItems.innerHTML = files.map(f => `
                        <li class="text-xs text-green-700 flex items-center gap-2">
                            <span>📄</span>
                            <span>${f.name}</span>
                            <span class="text-gray-500">(${(f.size / 1024).toFixed(1)} KB)</span>
                        </li>
                    `).join('');
                } else {
                    fileList.classList.add('hidden');
                }
            });

            // Seleccionar curso
            document.querySelectorAll('input[name="evidenceCourse"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    document.querySelectorAll('input[name="evidenceCourse"]').forEach(r => {
                        r.closest('label').style.borderColor = '#e2e8f0';
                        r.closest('label').style.background = '';
                    });
                    if (this.checked) {
                        this.closest('label').style.borderColor = '#4f46e5';
                        this.closest('label').style.background = '#eef2ff';
                    }
                });
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const errorDiv = document.getElementById('evidenceError');
                const progressDiv = document.getElementById('evidenceProgress');
                const successDiv = document.getElementById('evidenceSuccess');
                const submitBtn = document.getElementById('evSubmitBtn');

                // Reset
                errorDiv.classList.add('hidden');
                progressDiv.classList.add('hidden');
                successDiv.classList.add('hidden');

                const instructor = document.getElementById('evInstructor').value.trim();
                const courseRadio = document.querySelector('input[name="evidenceCourse"]:checked');
                const files = document.getElementById('evFiles').files;

                if (!instructor) {
                    errorDiv.textContent = '⚠️ Ingresa tu nombre completo.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                if (!courseRadio) {
                    errorDiv.textContent = '⚠️ Selecciona un curso.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                if (files.length === 0) {
                    errorDiv.textContent = '⚠️ Sube al menos un archivo de evidencia.';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviando...';
                progressDiv.textContent = '⏳ Subiendo evidencias...';
                progressDiv.classList.remove('hidden');

                try {
                    const filesData = await Promise.all(
                        Array.from(files).map(async f => ({
                            base64: await fileToBase64(f),
                            mimeType: f.type || 'application/octet-stream',
                            fileName: f.name
                        }))
                    );

                    const result = await submitEvidence({
                        instructorName: instructor.toUpperCase(),
                        courseName: courseRadio.dataset.name,
                        courseId: courseRadio.value,
                        evidenceFiles: filesData
                    });

                    progressDiv.classList.add('hidden');
                    if (result.success || result.ok) {
                        document.getElementById('dynamicContent').innerHTML = renderSuccessScreen(
                            '¡Evidencias enviadas con éxito! ✅',
                            false
                        );
                    } else {
                        errorDiv.textContent = '❌ ' + (result.message || 'Error al enviar');
                        errorDiv.classList.remove('hidden');
                    }
                } catch (err) {
                    progressDiv.classList.add('hidden');
                    errorDiv.textContent = '❌ ' + (err.message || 'Error de conexión');
                    errorDiv.classList.remove('hidden');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '📤 Enviar Evidencia(s)';
                }
            });
        }

        // ============================================================
        // EVENTOS DE TABS
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('tabProposal').addEventListener('click', () => renderTab('proposal'));
            document.getElementById('tabEvidence').addEventListener('click', () => renderTab('evidence'));

            // Año
            document.getElementById('year').textContent = new Date().getFullYear();

            // Iniciar app
            initApp();
        });
    </script>

</body>
</html>
