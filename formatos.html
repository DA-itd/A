<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V2V4CT2C69"></script>
<script src="ga.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatos Oficiales - ITD</title>
    <meta name="description" content="Descarga los formatos oficiales del área de Desarrollo Académico del ITD, incluyendo CVU, ficha técnica, lista de asistencia y más.">
    <meta name="keywords" content="formatos ITD, descargar CVU, ficha técnica curso, lista de asistencia, documentos oficiales">
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Identity Services para la función de Admin -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JH1X2720VL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JH1X2720VL');
    </script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fadeIn {
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .format-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .format-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        .card-hero {
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 40%, #7c3aed 100%);
            position: relative;
            overflow: hidden;
        }
        .card-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }
        .card-hero-disabled {
            background: linear-gradient(135deg, #6b7280 0%, #9ca3af 100%);
        }
        .badge-open {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 2px 8px rgba(245,158,11,0.5);
        }
        .badge-closed {
            background: #6b7280;
        }
        .btn-hero {
            background: rgba(255,255,255,0.18);
            border: 1.5px solid rgba(255,255,255,0.35);
            backdrop-filter: blur(4px);
            transition: all 0.25s;
        }
        .btn-hero:hover {
            background: rgba(255,255,255,0.28);
            border-color: rgba(255,255,255,0.6);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow-xl sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 sm:py-6">
            <div class="flex items-center justify-between gap-4">
                <img src="https://raw.githubusercontent.com/DA-itd/web/main/TecNM_logo.jpg" 
                     alt="TecNM" 
                     class="h-12 sm:h-16 md:h-20 object-contain">
                
                <div class="text-center flex-1 px-2 sm:px-4">
                    <h1 class="text-sm sm:text-xl md:text-2xl lg:text-3xl font-bold text-blue-900 leading-tight">
                        FORMATOS OFICIALES
                    </h1>
                    <p class="text-xs sm:text-sm md:text-base text-blue-700 mt-1 font-semibold">
                        Desarrollo Académico
                    </p>
                    <p class="text-xs sm:text-sm text-blue-600">
                        TecNM - Instituto Tecnológico de Durango
                    </p>
                </div>
                
                <img src="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png" 
                     alt="ITD" 
                     class="h-12 sm:h-16 md:h-20 object-contain">
            </div>
        </div>
    </header>

    <!-- Contenido Principal (React lo renderizará aquí) -->
    <div id="root"></div>

    <!-- Footer -->
    <footer class="bg-gradient-to-r from-blue-900 to-indigo-900 text-white text-center py-6 sm:py-8 mt-12">
        <div class="container mx-auto px-4">
            <p class="font-semibold text-sm sm:text-base mb-2">
                © Coordinación de Actualización Docente
            </p>
            <p class="text-xs sm:text-sm opacity-90">
                M.C. Alejandro Calderón Rentería
            </p>
            <p class="text-xs sm:text-sm opacity-75 mt-1">
                Todos los derechos reservados <span id="copyright-year"></span>
            </p>
        </div>
    </footer>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── CONFIGURACIÓN ───────────────────────────────────────────────────────────
        const ADMIN_EMAIL = 'alejandro.calderon@itdurango.edu.mx';
        // URL del Web App de Google Apps Script (la misma que ya usas en el portal)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwFO97VhIEO2ke2p-ZvYpXMWHP_LAxqmR0U5CmhPvOoQAH24FUAOt2rqGtoUhU-MKQauw/exec';
        // ─────────────────────────────────────────────────────────────────────────────

        const REGISTRO_URL = 'https://script.google.com/macros/s/AKfycbxAkhCTUui7Ii45A9bCQZcxsWb045rRWJwwGSRqCAf_7EWBvTBZwxLBwWSLd-_rsdBaJg/exec';

        const OTROS_FORMATOS = [
            { id: 'criterios_dl',     title: 'Criterios para Seleccionar Instructor', fileType: 'Word (.docx)', icon: '📋', url: 'https://raw.githubusercontent.com/DA-itd/A/main/ITD-AD-FO-06%20Formatos%20de%20Criterios%20para%20Seleccionar%20Instructores.docx' },
            { id: 'oficio_dl',        title: 'Oficio de Registro de Cursos',          fileType: 'Word (.docx)', icon: '📄', url: 'https://raw.githubusercontent.com/DA-itd/A/main/ITD-AD-FO-07-Oficio%20de%20registro%20de%20cursos%202025.docx' },
            { id: 'cvu',              title: 'CVU — Curriculum del Instructor',        fileType: 'Word (.doc)',  icon: '📘', url: 'https://raw.githubusercontent.com/DA-itd/A/main/TecNM-AC-PO-005-11%20CVU%20curriculum%20del%20instructor%20(1).doc' },
            { id: 'ficha_tecnica',    title: 'Ficha Técnica del Curso',                fileType: 'Word (.doc)',  icon: '📗', url: 'https://raw.githubusercontent.com/DA-itd/A/main/TecNM-AC-PO-005-12%20FICHA%20TECNICA%20(1).doc' },
            { id: 'deteccion',        title: 'Detección de Necesidades',               fileType: 'Word (.docx)', icon: '🔍', url: 'https://raw.githubusercontent.com/DA-itd/A/main/ITD-AC-PO-10-01%20Deteccion%20de%20necesidades.docx' },
            { id: 'lista_asistencia', title: 'Lista de Asistencia',                    fileType: 'Excel (.xlsx)',icon: '📝', url: 'https://raw.githubusercontent.com/DA-itd/A/main/ITD-AD-FO-08%20Formato%20de%20Lista%20de%20Asistencia_.xlsx' },
        ];

        const FormatosApp = () => {
            const [downloadingId, setDownloadingId]   = useState(null);
            const [isRegistryOpen, setIsRegistryOpen] = useState(true);
            const [loadingStatus, setLoadingStatus]   = useState(true); // spinner mientras carga estado
            const [savingStatus, setSavingStatus]     = useState(false); // spinner mientras guarda

            // ── 1. LEER EL ESTADO REAL DEL SERVIDOR AL MONTAR ────────────────────────
            useEffect(() => {
                fetch(`${SCRIPT_URL}?action=getRegistryStatus&t=${Date.now()}`)
                    .then(r => r.text())
                    .then(text => {
                        try {
                            const data = JSON.parse(text);
                            if (data.success) setIsRegistryOpen(data.status === 'OPEN');
                        } catch(e) { console.error("Error parseando estado:", e); }
                    })
                    .catch(err => console.error("Error leyendo estado del registro:", err))
                    .finally(() => setLoadingStatus(false));
            }, []);

            // ── 2. CALLBACK DE GOOGLE: GUARDAR NUEVO ESTADO EN EL SERVIDOR ───────────
            useEffect(() => {
                window.handleCredentialResponse = (response) => {
                    try {
                        // Decodificar token solo para verificar el email en el cliente
                        const base64Url = response.credential.split('.')[1];
                        const base64    = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                        const jsonPayload = decodeURIComponent(
                            atob(base64).split('').map(c =>
                                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                            ).join('')
                        );
                        const payload = JSON.parse(jsonPayload);

                        if (payload.email !== ADMIN_EMAIL) {
                            alert("⛔ Acceso denegado.\nSolo el administrador puede modificar el estado.");
                            return;
                        }

                        // Calcular nuevo estado (toggle)
                        setIsRegistryOpen(prev => {
                            const next       = !prev;
                            const nextStatus = next ? 'OPEN' : 'CLOSED';

                            // ── GUARDAR EN EL SERVIDOR via fetch con JSON ──────
                            setSavingStatus(true);
                            fetch(SCRIPT_URL, {
                                method: 'POST',
                                redirect: 'follow',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({
                                    action:   'setRegistryStatus',
                                    status:   nextStatus,
                                    id_token: response.credential
                                })
                            })
                            .then(r => r.text())
                            .then(text => {
                                try {
                                    const data = JSON.parse(text);
                                    if (data.success) {
                                        const statusText = next ? "ACTIVADO (Disponible)" : "DESACTIVADO (Cerrado)";
                                        alert(`✅ MODO ADMINISTRADOR\n\nCambio guardado en el servidor.\nEl Pre-Registro ahora está: ${statusText}`);
                                    } else {
                                        setIsRegistryOpen(prev2 => !prev2);
                                        alert("⛔ Error al guardar en el servidor:\n" + (data.message || 'Error desconocido'));
                                    }
                                } catch(parseErr) {
                                    // Apps Script a veces responde con redirect, pero el cambio sí se guardó
                                    const statusText = next ? "ACTIVADO (Disponible)" : "DESACTIVADO (Cerrado)";
                                    alert(`✅ MODO ADMINISTRADOR\n\nEl Pre-Registro ahora está: ${statusText}`);
                                }
                            })
                            .catch(err => {
                                setIsRegistryOpen(prev2 => !prev2);
                                console.error("Error de red al guardar estado:", err);
                                alert("⛔ Error de conexión al guardar el estado.\nVerifica tu conexión e intenta de nuevo.");
                            })
                            .finally(() => setSavingStatus(false));
                            // ─────────────────────────────────────────────────────────

                            return next; // actualizar UI inmediatamente (optimistic update)
                        });

                    } catch (e) {
                        console.error("Error al procesar credencial", e);
                        alert("Error de autenticación.");
                    }
                };
            }, []);

            // ── 3. DISPARAR EL PROMPT DE GOOGLE ──────────────────────────────────────
            const handleAdminClick = () => {
                if (savingStatus) return; // evitar doble clic mientras guarda
                if (window.google) {
                    google.accounts.id.initialize({
                        client_id: '524996225715-5l95j3lces5hi49c19rfgotdrfo2seq1.apps.googleusercontent.com',
                        callback: window.handleCredentialResponse
                    });
                    google.accounts.id.prompt();
                } else {
                    alert("El servicio de autenticación de Google no está listo. Intente recargar la página.");
                }
            };

            // ── 4. DESCARGA DE ARCHIVOS ───────────────────────────────────────────────
            const handleDownload = async (event, formato) => {
                event.preventDefault();
                if (downloadingId) return;
                setDownloadingId(formato.id);
                try {
                    const response = await fetch(formato.url);
                    if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                    const blob     = await response.blob();
                    const url      = window.URL.createObjectURL(blob);
                    const a        = document.createElement('a');
                    a.style.display = 'none';
                    a.href          = url;
                    const filename  = decodeURIComponent(formato.url.split('/').pop());
                    a.download      = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } catch (error) {
                    console.error("Fallo la descarga:", error);
                    alert("No se pudo descargar el archivo. Por favor, verifique su conexión e intente de nuevo.");
                } finally {
                    setDownloadingId(null);
                }
            };
            
            // ── 5. RENDER ─────────────────────────────────────────────────────────────
            return (
                <main className="container mx-auto px-4 py-8 sm:py-12">
                    <div className="max-w-4xl mx-auto">
                        <a href="index.html" className="inline-flex items-center text-blue-600 hover:text-blue-800 hover:underline mb-6 text-sm sm:text-base">
                            ← Volver al Portal Principal
                        </a>

                        {/* Banner */}
                        <div className="bg-gradient-to-r from-blue-500 to-indigo-500 rounded-2xl shadow-xl p-6 sm:p-8 text-white mb-8 animate-fadeIn">
                            <div className="flex items-center gap-4">
                                <div className="text-5xl">📋</div>
                                <div>
                                    <h2 className="text-2xl sm:text-3xl font-bold mb-2">Descarga de Formatos</h2>
                                    <p className="text-sm sm:text-base opacity-90">
                                        Documentos oficiales para los procesos de actualización docente.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {loadingStatus && (
                            <div className="text-center py-4 text-blue-600 text-sm animate-pulse mb-4">
                                ⏳ Verificando disponibilidad del registro...
                            </div>
                        )}

                        {/* ── GRID 2 TARJETAS ── */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 items-start">

                            {/* ══ TARJETA 1: Hero — Plataforma de Registro ══ */}
                            <div className="relative animate-fadeIn" style={{animationDelay:'0ms'}}>
                                {/* Badge estado */}
                                <div className={`absolute top-4 right-4 z-10 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md ${!isRegistryOpen ? 'badge-closed' : 'badge-open'}`}>
                                    {!isRegistryOpen ? '🔒 CERRADO' : '⭐ MÁS USADO'}
                                </div>

                                <div className={`format-card rounded-2xl shadow-2xl overflow-hidden ${!isRegistryOpen ? 'card-hero card-hero-disabled opacity-70' : 'card-hero'}`}>

                                    {/* Zona visual superior */}
                                    <div className="relative px-6 pt-8 pb-6 text-white">
                                        {/* Círculo decorativo de fondo */}
                                        <div className="absolute -top-6 -right-6 w-32 h-32 rounded-full bg-white opacity-5"></div>
                                        <div className="absolute bottom-0 -left-4 w-20 h-20 rounded-full bg-white opacity-5"></div>

                                        <div className="text-5xl mb-3">🖥️</div>
                                        <h3 className="text-xl sm:text-2xl font-bold leading-tight mb-2">
                                            Registro a Cursos - Taller
                                        </h3>
                                        <p className="text-sm sm:text-base font-semibold text-blue-200 mb-1">
                                            &amp; Formato de Criterios
                                        </p>
                                        <p className="text-xs sm:text-sm text-blue-100 opacity-80 leading-relaxed mt-2">
                                            Completa el registro de tu curso y la evaluación de criterios del instructor en un solo lugar — sin descargar formatos vacíos.
                                        </p>
                                    </div>

                                    {/* Zona de acción */}
                                    <div className="px-6 pb-6">
                                        <div className="flex items-center gap-2 mb-4">
                                            <span className="text-xs text-blue-200 font-mono bg-white bg-opacity-10 px-2 py-0.5 rounded-full">Plataforma Web</span>
                                            <span className="text-xs text-blue-200 font-mono bg-white bg-opacity-10 px-2 py-0.5 rounded-full">✅ PDF automático</span>
                                        </div>

                                        {isRegistryOpen ? (
                                            <a href={REGISTRO_URL} target="_blank" rel="noopener noreferrer"
                                               className="btn-hero block w-full text-white font-bold py-3.5 px-4 rounded-xl text-center text-base flex items-center justify-center gap-2">
                                                <span>🚀</span> Abrir Plataforma de Registro
                                            </a>
                                        ) : (
                                            <button disabled
                                               className="block w-full bg-white bg-opacity-10 text-white text-opacity-50 font-bold py-3.5 px-4 rounded-xl text-center cursor-not-allowed flex items-center justify-center gap-2">
                                                <span>🔒</span> No Disponible
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* ══ TARJETA 2: Formatos descargables ══ */}
                            <div className="animate-fadeIn" style={{animationDelay:'120ms'}}>
                                <div className="format-card bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden flex flex-col">
                                    {/* Header de tarjeta */}
                                    <div className="bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-4 flex items-center gap-3">
                                        <span className="text-3xl">🗂️</span>
                                        <div>
                                            <h3 className="text-white font-bold text-lg leading-tight">Formatos</h3>
                                            <p className="text-indigo-200 text-xs">Descarga los documentos oficiales</p>
                                        </div>
                                    </div>

                                    {/* Lista de formatos */}
                                    <div className="divide-y divide-gray-50 px-2">
                                        {OTROS_FORMATOS.map((f, i) => (
                                            <div key={f.id} className={`flex items-center justify-between gap-3 px-3 py-3 hover:bg-indigo-50 transition-colors rounded-lg my-0.5 ${i < 2 ? 'bg-amber-50 hover:bg-amber-100' : ''}`}>
                                                <div className="flex items-center gap-2.5 min-w-0">
                                                    <span className="text-xl flex-shrink-0">{f.icon}</span>
                                                    <div className="min-w-0">
                                                        <p className="text-sm font-semibold text-gray-700 leading-tight truncate">{f.title}</p>
                                                        <p className="text-xs text-gray-400 font-mono mt-0.5">{f.fileType}</p>
                                                    </div>
                                                </div>
                                                <a href={f.url}
                                                   onClick={(e) => handleDownload(e, f)}
                                                   className="flex-shrink-0 flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-xs py-1.5 px-3 rounded-lg transition-colors shadow-sm whitespace-nowrap">
                                                    {downloadingId === f.id
                                                        ? <span>⏳</span>
                                                        : <><span>⬇️</span> Descargar</>}
                                                </a>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="px-5 py-3 bg-gray-50 border-t border-gray-100">
                                        <p className="text-xs text-gray-400 text-center">Los primeros 2 formatos corresponden al proceso de registro</p>
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* Botón de administración */}
                        <div className="mt-12 flex justify-center">
                            <button
                                onClick={handleAdminClick}
                                disabled={savingStatus}
                                className="opacity-50 hover:opacity-100 transition-opacity p-2 rounded-full hover:bg-gray-100 disabled:cursor-wait"
                                title="Administración de Pre-Registro"
                            >
                                {savingStatus ? (
                                    <div className="h-16 w-16 flex items-center justify-center text-2xl animate-spin">⏳</div>
                                ) : (
                                    <img
                                        src="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png"
                                        alt="Admin Access"
                                        className="h-16 w-auto grayscale hover:grayscale-0 transition-all"
                                    />
                                )}
                            </button>
                        </div>
                    </div>
                </main>
            );
        };
        window.addEventListener('load', () => {
            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(
                    <React.StrictMode>
                        <FormatosApp />
                    </React.StrictMode>
                );
            } else {
                console.error('No se encontró el elemento root');
            }
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const yearSpan = document.getElementById('copyright-year');
            if (yearSpan) {
                yearSpan.textContent = new Date().getFullYear();
            }
        });
    </script>
</body>
</html>
