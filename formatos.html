    <title>Formatos | ITD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== ESTILOS ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'DM Sans', 'Inter', sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ===== HEADER ===== */
        .header-white {
            background: #ffffff;
            padding: 14px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .header-white .logo {
            height: 44px;
            width: auto;
        }
        
        .header-white .title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1720;
            letter-spacing: -0.5px;
        }
        
        .header-white .subtitle {
            font-size: 12px;
            color: #8a7a6a;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        /* ===== LÍNEA GUINDA ===== */
        .guinda-line {
            height: 4px;
            background: linear-gradient(90deg, #6b1e2e, #a72344, #6b1e2e);
            background-size: 200% 100%;
            animation: shimmer-line 3s linear infinite;
        }
        
        @keyframes shimmer-line {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }
        
        /* ===== CONTENEDOR ===== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 20px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: calc(100vh - 150px);
        }
        
        /* ===== TÍTULO ===== */
        .page-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 24px;
            font-weight: 700;
            color: #3d0a18;
            margin-bottom: 2px;
        }
        
        .page-subtitle {
            font-size: 13px;
            color: #8a7a6a;
            margin-bottom: 20px;
        }
        
        /* ===== TARJETAS ===== */
        .card-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 16px;
            align-items: stretch;
        }
        
        .card-left-col {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        @media (max-width: 768px) {
            .card-wrapper {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid rgba(107,30,46,0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            height: 100%;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(107,30,46,0.08);
            border-color: rgba(167,35,68,0.12);
        }
        
        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2.5px;
            background: linear-gradient(90deg, #6b1e2e, #a72344, #e2be82, #a72344, #6b1e2e);
            background-size: 200% 100%;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .card:hover::after {
            opacity: 1;
            animation: shimmer-bar 2s linear infinite;
        }
        
        @keyframes shimmer-bar {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }
        
        .card-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: #1a1720;
            margin-bottom: 2px;
        }
        
        .card-desc {
            font-size: 13px;
            color: #6b6b7b;
            line-height: 1.5;
            flex: 1;
        }
        
        .card-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 10px;
            align-self: flex-start;
            background: #f0ece6;
            color: #6b6b7b;
        }
        
        .card-status.available {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .card-status.soon {
            background: #fff3e0;
            color: #e65100;
        }
        
        /* ===== TARJETA PRINCIPAL (Registro) ===== */
        .card-main {
            background: linear-gradient(145deg, #6b1e2e, #8f1d3a);
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #ffffff;
        }
        
        .card-main .card-title {
            color: #ffffff;
        }
        
        .card-main .card-desc {
            color: rgba(255,255,255,0.8);
        }
        
        .card-main .card-status {
            background: rgba(255,255,255,0.15);
            color: #ffffff;
        }
        
        .card-main .card-status.available {
            background: rgba(255,255,255,0.2);
            color: #ffffff;
        }
        
        .card-main:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 16px 40px rgba(107,30,46,0.35);
        }
        
        .card-main::after {
            background: linear-gradient(90deg, #ffffff, #e2be82, #ffffff);
            opacity: 0.3;
        }
        
        .card-main:hover::after {
            opacity: 0.6;
        }
        
        .badge-main {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.15);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 0.3px;
        }
        
        .badge-main.closed {
            background: rgba(0,0,0,0.2);
            color: rgba(255,255,255,0.6);
            border-color: rgba(255,255,255,0.05);
        }
        
        .card-main .icon-large {
            font-size: 32px;
        }
        
        /* ===== EFECTO PULSO ===== */
        .card-main.pulse-effect {
            animation: pulse-card 0.6s ease;
        }
        
        @keyframes pulse-card {
            0% { transform: scale(1); }
            30% { transform: scale(1.03); box-shadow: 0 0 0 6px rgba(255,255,255,0.15); }
            60% { transform: scale(0.97); }
            100% { transform: scale(1); }
        }
        
        /* ===== TARJETA FORMATOS - UNA SOLA COLUMNA ===== */
        .card-formatos {
            min-height: 100%;
            height: 100%;
        }
        
        .formatos-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 6px;
            flex: 1;
        }
        
        .formato-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 12px;
            border-radius: 8px;
            background: #f8f6f2;
            transition: background 0.2s, transform 0.15s;
            cursor: pointer;
            font-size: 13px;
        }
        
        .formato-item:hover {
            background: #efeae2;
            transform: scale(1.01);
        }
        
        .formato-item .name {
            font-weight: 500;
            color: #1a1720;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .formato-item .type {
            font-size: 10px;
            color: #8a7a6a;
            font-weight: 400;
            flex-shrink: 0;
            margin-left: 8px;
        }
        
        .formato-item .download-btn {
            font-size: 15px;
            color: #6b6b7b;
            transition: color 0.2s, transform 0.15s;
            flex-shrink: 0;
            margin-left: 6px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
        }
        
        .formato-item .download-btn:hover {
            color: #6b1e2e;
            transform: scale(1.15);
        }
        
        /* ===== BOTÓN ADMIN ===== */
        .admin-btn {
            opacity: 0.25;
            transition: opacity 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 14px;
            padding: 4px 12px;
            border-radius: 8px;
            align-self: center;
        }
        
        .admin-btn:hover {
            opacity: 1;
            background: rgba(0,0,0,0.04);
        }
        
        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26,14,16,0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 32px 36px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 32px 64px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeUp 0.3s cubic-bezier(0.22, 0.68, 0, 1.2);
        }
        
        .modal-box .lock-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        
        .modal-box h3 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 20px;
            font-weight: 700;
            color: #3d0a18;
            margin-bottom: 4px;
        }
        
        .modal-box p {
            font-size: 14px;
            color: #6b6b7b;
            margin-bottom: 20px;
        }
        
        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border 0.2s;
            margin-bottom: 12px;
        }
        
        .modal-box input:focus {
            border-color: #6b1e2e;
        }
        
        .modal-box .btn-toggle {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            color: #fff;
        }
        
        .modal-box .btn-toggle.active {
            background: linear-gradient(135deg, #6b1e2e, #a72344);
        }
        
        .modal-box .btn-toggle.active:hover {
            background: linear-gradient(135deg, #5a1826, #8f1d3a);
        }
        
        .modal-box .btn-toggle.inactive {
            background: #888;
        }
        
        .modal-box .btn-toggle.inactive:hover {
            background: #666;
        }
        
        .modal-box .btn-cancel {
            width: 100%;
            padding: 10px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            background: transparent;
            font-size: 14px;
            color: #9090a0;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        
        .modal-box .btn-cancel:hover {
            background: #f5f5f5;
        }
        
        .modal-box .error-msg {
            font-size: 13px;
            color: #c0392b;
            margin-bottom: 10px;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* ===== FOOTER ===== */
        .footer {
            background: #1a1720;
            color: #8a7a6a;
            text-align: center;
            padding: 14px 20px;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: auto;
        }
        
        .footer strong {
            color: #c4b5a5;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-white .title {
                font-size: 16px;
            }
            .header-white .logo {
                height: 36px;
            }
            .page-title {
                font-size: 20px;
            }
            .card {
                padding: 14px 16px;
            }
            .modal-box {
                padding: 24px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .header-white {
                padding: 10px 16px;
            }
            .header-white .title {
                font-size: 14px;
            }
            .header-white .subtitle {
                font-size: 10px;
            }
            .header-white .logo {
                height: 30px;
            }
            .main-container {
                padding: 12px 12px 8px;
            }
            .page-title {
                font-size: 18px;
            }
            .page-subtitle {
                font-size: 12px;
            }
            .card-title {
                font-size: 14px;
            }
            .card-desc {
                font-size: 12px;
            }
        }
    </style>
    
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

<body>
    <div id="root"></div>
    
    <script>
    // ============================================================
    // 1. CONFIGURACIÓN
    // ============================================================
    const GOOGLE_CLIENT_ID = "524996225715-5l95j3lces5hi49c19rfgotdrfo2seq1.apps.googleusercontent.com";
    const ADMIN_EMAIL = 'alejandro.calderon@itdurango.edu.mx';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwFO97VhIEO2ke2p-ZvYpXMWHP_LAxqmR0U5CmhPvOoQAH24FUAOt2rqGtoUhU-MKQauw/exec';
    const REGISTRO_URL = 'https://script.google.com/macros/s/AKfycbxAkhCTUui7Ii45A9bCQZcxsWb045rRWJwwGSRqCAf_7EWBvTBZwxLBwWSLd-_rsdBaJg/exec';
    const ADMIN_PASSWORD = "X987ela";
    
    const FORMATOS = [
        { id: 'criterios_dl', title: 'Criterios para Seleccionar Instructor', fileType: 'Word (.docx)', icon: '📋', url: 'https://raw.githubusercontent.com/DA-itd/A/main/ITD-AD-FO-06%20Formatos%20de%20Criterios%20para%20Seleccionar%20Instructores.docx' },
        { id: 'oficio_dl', title: 'Oficio de Registro de Cursos', fileType: 'Word (.docx)', icon: '📄', url: 'https://raw.githubusercontent.com/DA-itd/A/main/ITD-AD-FO-07-Oficio%20de%20registro%20de%20cursos%202025.docx' },
        { id: 'cvu', title: 'CVU — Curriculum del Instructor', fileType: 'Word (.doc)', icon: '📘', url: 'https://raw.githubusercontent.com/DA-itd/A/main/TecNM-AC-PO-005-11%20CVU%20curriculum%20del%20instructor%20(1).doc' },
        { id: 'ficha_tecnica', title: 'Ficha Técnica del Curso', fileType: 'Word (.doc)', icon: '📗', url: 'https://raw.githubusercontent.com/DA-itd/A/main/TecNM-AC-PO-005-12%20FICHA%20TECNICA%20(1).doc' },
        { id: 'deteccion', title: 'Detección de Necesidades', fileType: 'Word (.docx)', icon: '🔍', url: 'https://raw.githubusercontent.com/DA-itd/A/main/ITD-AC-PO-10-01%20Deteccion%20de%20necesidades.docx' },
        { id: 'lista_asistencia', title: 'Lista de Asistencia', fileType: 'Excel (.xlsx)', icon: '📝', url: 'https://raw.githubusercontent.com/DA-itd/A/main/ITD-AD-FO-08%20Formato%20de%20Lista%20de%20Asistencia_.xlsx' },
    ];
    
    // ============================================================
    // 2. REACT
    // ============================================================
    const React = window.React;
    const ReactDOM = window.ReactDOM;
    const { useState, useEffect, useRef } = React;
    const { createRoot } = ReactDOM;
    const h = React.createElement;
    
    // ============================================================
    // 3. SONIDO
    // ============================================================
    const playSound = () => {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const notas = [
                { freq: 523.25, duration: 0.15 },
                { freq: 659.25, duration: 0.15 },
                { freq: 783.99, duration: 0.15 },
                { freq: 1046.50, duration: 0.30 },
                { freq: 1318.51, duration: 0.40 }
            ];
            
            notas.forEach((nota, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = nota.freq;
                const startTime = audioCtx.currentTime + index * 0.10;
                gain.gain.setValueAtTime(0.3, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + nota.duration);
                osc.start(startTime);
                osc.stop(startTime + nota.duration);
            });
        } catch(e) {
            console.warn('Audio no disponible:', e);
        }
    };
    
    // ============================================================
    // 4. COMPONENTE PRINCIPAL
    // ============================================================
    const App = () => {
        const [isOpen, setIsOpen] = useState(true);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);
        const [showModal, setShowModal] = useState(false);
        const [adminPass, setAdminPass] = useState('');
        const [adminError, setAdminError] = useState('');
        const [pulsing, setPulsing] = useState(false);
        const googleInitialized = useRef(false);
        const cardRef = useRef(null);
        
        useEffect(() => {
            fetch(`${APPS_SCRIPT_URL}?action=getRegistryStatus&t=${Date.now()}`)
                .then(r => r.text())
                .then(text => {
                    try {
                        const data = JSON.parse(text);
                        if (data.success) setIsOpen(data.status === 'OPEN');
                    } catch(e) { console.error('Error parseando estado:', e); }
                })
                .catch(err => console.error('Error leyendo estado del registro:', err))
                .finally(() => setLoading(false));
        }, []);
        
        const triggerPulse = () => {
            setPulsing(true);
            playSound();
            setTimeout(() => setPulsing(false), 700);
        };
        
        const handleMainCardClick = (e) => {
            if (!isOpen) {
                e.preventDefault();
                return;
            }
            triggerPulse();
            setTimeout(() => {
                window.open(REGISTRO_URL, '_blank');
            }, 250);
        };
        
        const handleDownload = async (formato, e) => {
            e.stopPropagation();
            try {
                const response = await fetch(formato.url);
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const filename = decodeURIComponent(formato.url.split('/').pop() || 'archivo');
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error('Fallo la descarga:', error);
                alert('No se pudo descargar el archivo. Verifica tu conexión.');
            }
        };
        
        // ADMIN
        const handleAdminClick = () => {
            if (saving) return;
            if (window.google && !googleInitialized.current) {
                try {
                    googleInitialized.current = true;
                    window.google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: (response) => {
                            try {
                                const base64Url = response.credential.split('.')[1];
                                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                                const jsonPayload = decodeURIComponent(
                                    atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
                                );
                                const payload = JSON.parse(jsonPayload);
                                
                                if (payload.email !== ADMIN_EMAIL) {
                                    alert('⛔ Acceso denegado.\nSolo el administrador puede modificar el estado.');
                                    return;
                                }
                                
                                const nextState = !isOpen;
                                const nextStatus = nextState ? 'OPEN' : 'CLOSED';
                                
                                setSaving(true);
                                fetch(APPS_SCRIPT_URL, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                    body: JSON.stringify({
                                        action: 'setRegistryStatus',
                                        status: nextStatus,
                                        id_token: response.credential
                                    })
                                })
                                .then(r => r.text())
                                .then(text => {
                                    try {
                                        const data = JSON.parse(text);
                                        if (data.success) {
                                            setIsOpen(nextState);
                                            alert(`✅ Cambio guardado.\nEl Registro ahora está: ${nextState ? 'ACTIVADO' : 'DESACTIVADO'}`);
                                        } else {
                                            alert('⛔ Error al guardar: ' + (data.message || 'Error desconocido'));
                                        }
                                    } catch {
                                        setIsOpen(nextState);
                                        alert(`✅ Cambio aplicado.\nEl Registro ahora está: ${nextState ? 'ACTIVADO' : 'DESACTIVADO'}`);
                                    }
                                })
                                .catch(() => {
                                    alert('⛔ Error de conexión al guardar el estado.');
                                })
                                .finally(() => setSaving(false));
                            } catch (e) {
                                console.error('Error procesando credencial:', e);
                                alert('Error de autenticación.');
                            }
                        }
                    });
                    window.google.accounts.id.prompt();
                } catch (e) {
                    console.error('Error inicializando Google:', e);
                    alert('Error al cargar servicios de Google.');
                }
            } else if (window.google) {
                window.google.accounts.id.prompt();
            } else {
                alert('El servicio de autenticación de Google no está listo. Recarga la página.');
            }
        };
        
        const handlePasswordToggle = () => {
            if (adminPass !== ADMIN_PASSWORD) {
                setAdminError('Clave incorrecta.');
                return;
            }
            const nextState = !isOpen;
            setIsOpen(nextState);
            setShowModal(false);
            setAdminPass('');
            setAdminError('');
            try { localStorage.setItem('registroEstado', String(nextState)); } catch(e) {}
            alert(`✅ Registro ${nextState ? 'ACTIVADO' : 'DESACTIVADO'}`);
        };
        
        // RENDER
        if (loading) {
            return h('div', { className: 'flex justify-center items-center h-64' },
                h('div', { className: 'loader-spinner', style: { width: 48, height: 48, border: '4px solid #6b1e2e', borderRadius: '50%', borderTopColor: 'transparent', animation: 'spin 1s linear infinite' } })
            );
        }
        
        return h('div', { style: { display: 'flex', flexDirection: 'column', minHeight: '100vh' } },
            // HEADER
            h('header', { className: 'header-white' },
                h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', maxWidth: 1100, margin: '0 auto' } },
                    h('img', { 
                        src: 'https://raw.githubusercontent.com/DA-itd/web/main/TecNM_logo.jpg', 
                        alt: 'TecNM', 
                        className: 'logo'
                    }),
                    h('div', { style: { textAlign: 'center' } },
                        h('span', { className: 'title' }, 'Desarrollo Académico'),
                        h('div', { className: 'subtitle' }, 'Actualización Docente ITD')
                    ),
                    h('img', { 
                        src: 'https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png', 
                        alt: 'ITD', 
                        className: 'logo'
                    })
                )
            ),
            
            // LÍNEA GUINDA
            h('div', { className: 'guinda-line' }),
            
            // CONTENIDO
            h('div', { className: 'main-container' },
                h('h1', { className: 'page-title' }, 'Portal Documental'),
                h('p', { className: 'page-subtitle' }, 'Registro de cursos y formatos oficiales para los procesos de actualización docente.'),
                
                // DISTRIBUCIÓN: Izquierda (Registro + Instructores) | Derecha (Formatos)
                h('div', { className: 'card-wrapper' },
                    // COLUMNA IZQUIERDA
                    h('div', { className: 'card-left-col' },
                        // REGISTRO
                        h('a', {
                            ref: cardRef,
                            href: isOpen ? REGISTRO_URL : '#',
                            target: isOpen ? '_blank' : undefined,
                            onClick: handleMainCardClick,
                            className: `card card-main ${pulsing ? 'pulse-effect' : ''}`,
                            style: { 
                                cursor: isOpen ? 'pointer' : 'default',
                                opacity: isOpen ? 1 : 0.6,
                                textDecoration: 'none',
                                display: 'flex',
                                flexDirection: 'column'
                            }
                        },
                            h('span', { className: `badge-main ${isOpen ? '' : 'closed'}` }, 
                                isOpen ? '⭐ DISPONIBLE' : '🔒 CERRADO'
                            ),
                            h('div', { className: 'icon-large' }, '🖥️'),
                            h('div', { className: 'card-title' }, 'Registro Cursos - Taller'),
                            h('p', { className: 'card-desc' }, 
                                isOpen 
                                    ? 'Completa el registro de tu curso y la evaluación de criterios del instructor en un solo lugar.'
                                    : 'El registro se encuentra cerrado. Próximamente se abrirá un nuevo periodo.'
                            ),
                            h('span', { className: `card-status ${isOpen ? 'available' : 'soon'}` },
                                isOpen ? '✓ Disponible' : '✗ No disponible'
                            )
                        ),
                        
                        // INSTRUCTORES
                        h('a', {
                            href: 'instructores.html',
                            className: 'card',
                            style: { textDecoration: 'none', display: 'flex', flexDirection: 'column' }
                        },
                            h('div', { className: 'card-icon' }, '🎓'),
                            h('div', { className: 'card-title' }, 'Área para Instructores'),
                            h('p', { className: 'card-desc' },
                                'Sube tus propuestas de cursos, CV, fichas técnicas y gestiona tus evidencias.'
                            ),
                            h('span', { className: 'card-status available' }, '✓ Disponible')
                        )
                    ),
                    
                    // COLUMNA DERECHA: FORMATOS (UNA SOLA COLUMNA)
                    h('div', { className: 'card card-formatos', style: { display: 'flex', flexDirection: 'column' } },
                        h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 } },
                            h('div', { className: 'card-title' }, 'Documentos y Formatos'),
                            h('span', { style: { fontSize: 11, color: '#8a7a6a', fontWeight: 500 } }, 'Descarga directa')
                        ),
                        h('div', { className: 'formatos-list', style: { flex: 1 } },
                            FORMATOS.map(f => 
                                h('div', { key: f.id, className: 'formato-item' },
                                    h('span', { className: 'name' }, f.icon, ' ', f.title),
                                    h('div', { style: { display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0 } },
                                        h('span', { className: 'type' }, f.fileType),
                                        h('button', { 
                                            className: 'download-btn',
                                            onClick: (e) => handleDownload(f, e),
                                            title: 'Descargar'
                                        }, '⬇️')
                                    )
                                )
                            )
                        )
                    )
                ),
                
                // BOTÓN ADMIN
                h('button', {
                    className: 'admin-btn',
                    onClick: () => {
                        if (window.google) {
                            handleAdminClick();
                        } else {
                            setShowModal(true);
                        }
                    },
                    title: 'Administración del Registro'
                }, '🔒'),
                
                // MODAL
                h('div', { 
                    className: `modal-overlay ${showModal ? 'active' : ''}`,
                    onClick: (e) => { if (e.target === e.currentTarget) { setShowModal(false); setAdminPass(''); setAdminError(''); } }
                },
                    h('div', { className: 'modal-box' },
                        h('div', { className: 'lock-icon' }, isOpen ? '🔓' : '🔒'),
                        h('h3', null, isOpen ? 'Desactivar Registro' : 'Activar Registro'),
                        h('p', null, 'Ingresa la clave de administrador para cambiar el estado del registro.'),
                        h('input', {
                            type: 'password',
                            value: adminPass,
                            onChange: (e) => { setAdminPass(e.target.value); setAdminError(''); },
                            onKeyDown: (e) => { if (e.key === 'Enter') handlePasswordToggle(); },
                            placeholder: '••••••••',
                            autoFocus: true
                        }),
                        adminError && h('div', { className: 'error-msg' }, '⚠️ ', adminError),
                        h('button', {
                            className: `btn-toggle ${isOpen ? 'active' : 'inactive'}`,
                            onClick: handlePasswordToggle
                        }, isOpen ? '🔒 Desactivar' : '✅ Activar'),
                        h('button', {
                            className: 'btn-cancel',
                            onClick: () => { setShowModal(false); setAdminPass(''); setAdminError(''); }
                        }, 'Cancelar')
                    )
                )
            ),
            
            // FOOTER
            h('div', { className: 'footer' },
                h('p', null, '© ', new Date().getFullYear(), ' ', h('strong', null, 'Coordinación de Actualización Docente')),
                h('p', { style: { fontSize: 11, marginTop: 2, opacity: 0.6 } }, 'M.C. Alejandro Calderón Rentería')
            )
        );
    };
    
    // ============================================================
    // 5. MONTAJE
    // ============================================================
    const root = createRoot(document.getElementById('root'));
    root.render(h(App, null));
    
    console.log('✅ Formatos ITD - Una sola columna');
    </script>
</body>
</html>
