<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial Académico - Portal ITD</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
    .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
</style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 pb-20">
<!-- Botón Flotante Volver -->
<div class="fixed top-4 left-4 z-50">
    <a href="index.html" class="bg-white/90 backdrop-blur text-blue-900 px-4 py-2 rounded-full shadow-md font-bold text-sm hover:bg-blue-900 hover:text-white transition-all flex items-center gap-2">
        ← Volver al Portal
    </a>
</div>

<header class="bg-white shadow-xl sticky top-0 z-40 border-b-4 border-orange-500">
    <div class="container mx-auto px-4 py-4 sm:py-6 flex justify-between items-center gap-4">
        <div class="w-16 sm:w-20">
             <img src="https://raw.githubusercontent.com/DA-itd/web/main/TecNM_logo.jpg" class="h-12 sm:h-16 object-contain" alt="TecNM">
        </div>
        <div class="text-center flex-1">
            <h1 class="text-lg sm:text-2xl font-bold text-slate-800">HISTORIAL DE CURSOS</h1>
            <p class="text-xs sm:text-sm text-orange-600 font-bold tracking-wider uppercase">Kardex de Actualización Docente</p>
        </div>
        <div class="w-16 sm:w-20 flex justify-end">
            <img src="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png" class="h-12 sm:h-16 object-contain" alt="ITD">
        </div>
    </div>
</header>

<div id="root"></div>

<footer class="bg-slate-900 text-white text-center py-8 mt-12">
    <div class="container mx-auto px-4">
        <p class="font-bold text-sm mb-1">© Coordinación de Actualización Docente</p>
        <p class="text-xs opacity-60 mb-1">Instituto Tecnológico de Durango</p>
        <p class="text-xs opacity-40">M.C. Alejandro Calderón Rentería</p>
    </div>
</footer>

<script>
    // ============================================================
    // 1. REACT
    // ============================================================
    const React = window.React;
    const ReactDOM = window.ReactDOM;
    const { useState, useEffect, useRef } = React;
    const { createRoot } = ReactDOM;
    const h = React.createElement;

    // ============================================================
    // 2. CONFIGURACIÓN
    // ============================================================
    const CONFIG = {
        GOOGLE_CLIENT_ID: '524996225715-5l95j3lces5hi49c19rfgotdrfo2seq1.apps.googleusercontent.com',
        APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwFO97VhIEO2ke2p-ZvYpXMWHP_LAxqmR0U5CmhPvOoQAH24FUAOt2rqGtoUhU-MKQauw/exec'
    };

    const ITD_LOGO_URL = 'https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png';

    // ============================================================
    // 3. UTILIDADES
    // ============================================================
    const cleanValue = function(val) {
        if (!val) return '';
        var cleaned = val.trim();
        if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
            cleaned = cleaned.substring(1, cleaned.length - 1).replace(/""/g, '"');
        }
        return cleaned;
    };

    const getImageDataFromURL = function(url) {
        return new Promise(function(resolve) {
            var img = new Image(); 
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                var canvas = document.createElement('canvas'); 
                canvas.width = img.width; 
                canvas.height = img.height;
                var ctx = canvas.getContext('2d'); 
                ctx.drawImage(img, 0, 0);
                try { resolve(canvas.toDataURL('image/png')); } 
                catch (e) { resolve(null); }
            };
            img.onerror = function() { resolve(null); }; 
            img.src = url;
        });
    };
    
    var drawLogo = function(doc, logoData, x, y, targetWidth) {
        if (!logoData) return;
        try {
            var props = doc.getImageProperties(logoData);
            var targetHeight = (props.height * targetWidth) / props.width;
            doc.addImage(logoData, 'PNG', x, y, targetWidth, targetHeight);
        } catch (e) { 
            doc.addImage(logoData, 'PNG', x, y, targetWidth, targetWidth); 
        }
    };

    // ============================================================
    // 4. OBTENER HISTORIAL
    // ============================================================
    var getTeacherHistory = function(idToken) {
        return new Promise(function(resolve, reject) {
            var url = CONFIG.APPS_SCRIPT_URL + '?action=getTeacherHistory&id_token=' + encodeURIComponent(idToken) + '&t=' + Date.now();
            console.log('📥 Solicitando historial...');
            
            fetch(url)
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(function(result) {
                    console.log('📊 Respuesta:', result);
                    if (result.success) {
                        resolve(result);
                    } else {
                        reject(new Error(result.message || 'Error al obtener el historial'));
                    }
                })
                .catch(function(error) {
                    console.error('❌ Error:', error);
                    reject(error);
                });
        });
    };

    // ============================================================
    // 5. COMPONENTES
    // ============================================================
    var LoginScreen = function(props) {
        var onLogin = props.onLogin;
        var googleBtnRef = useRef(null);
        
        useEffect(function() {
            var interval = setInterval(function() {
                if (window.google && window.google.accounts && googleBtnRef.current) {
                    clearInterval(interval);
                    try {
                        window.google.accounts.id.initialize({ 
                            client_id: CONFIG.GOOGLE_CLIENT_ID, 
                            callback: onLogin 
                        });
                        window.google.accounts.id.renderButton(googleBtnRef.current, { 
                            theme: "filled_blue", 
                            size: "large", 
                            text: "continue_with", 
                            shape: "pill" 
                        });
                    } catch (e) { 
                        console.error("Error rendering Google Button", e); 
                    }
                }
            }, 500);
            return function() { clearInterval(interval); };
        }, [onLogin]);

        return h('div', { className: 'min-h-[60vh] flex items-center justify-center animate-fadeIn' },
            h('div', { className: 'bg-white p-10 rounded-2xl shadow-2xl text-center max-w-md w-full border-t-4 border-orange-500' },
                h('div', { className: 'text-5xl mb-4' }, '📚'),
                h('h2', { className: 'text-2xl font-bold mb-2 text-slate-800' }, 'Acceso a Historial'),
                h('p', { className: 'text-slate-500 mb-8' }, 'Inicia sesión con tu cuenta institucional para ver tu kardex de cursos.'),
                h('div', { className: 'flex justify-center min-h-[50px]', ref: googleBtnRef })
            )
        );
    };

    // ============================================================
    // 6. DASHBOARD
    // ============================================================
    var Dashboard = function(props) {
        var user = props.user;
        var data = props.data;
        var onLogout = props.onLogout;
        var _exporting = useState(false);
        var exporting = _exporting[0];
        var setExporting = _exporting[1];
        
        if (!data || !data.teacher) {
            return h('div', { className: 'container mx-auto px-4 py-10 max-w-3xl' },
                h('div', { className: 'bg-yellow-50 border-l-4 border-yellow-500 p-6 rounded-r-xl shadow-sm' },
                    h('h3', { className: 'text-lg font-bold text-yellow-800' }, '⏳ Cargando datos...'),
                    h('p', { className: 'text-yellow-700' }, 'Estamos obteniendo tu información académica.')
                )
            );
        }
        
        var teacher = data.teacher;
        var courses = data.courses || [];
        
        var exportToPdf = function() {
            setExporting(true);
            var { jsPDF } = window.jspdf; 
            var doc = new jsPDF('p', 'mm', 'letter');
            var pageWidth = doc.internal.pageSize.getWidth();

            getImageDataFromURL(ITD_LOGO_URL).then(function(itdLogo) {
                if (itdLogo) drawLogo(doc, itdLogo, pageWidth - 35, 10, 25);

                doc.setFont("helvetica", "bold"); 
                doc.setFontSize(14); 
                doc.setTextColor(27, 57, 106);
                doc.text("INSTITUTO TECNOLÓGICO DE DURANGO", pageWidth/2, 20, { align: "center" });
                doc.setFontSize(11); 
                doc.setTextColor(100); 
                doc.text("Coordinación de Actualización Docente", pageWidth/2, 26, { align: "center" });
                doc.setFontSize(14); 
                doc.setTextColor(128, 0, 0);
                doc.text("HISTORIAL DE CURSOS", pageWidth/2, 38, { align: "center" });
                
                doc.setTextColor(0); 
                doc.setFontSize(10); 
                doc.setFont("helvetica", "bold");
                doc.text("Docente:", 14, 50);
                doc.setFont("helvetica", "normal");
                doc.text(teacher.name || 'No especificado', 35, 50);

                var today = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });
                doc.setFont("helvetica", "bold");
                doc.text("Fecha de emisión:", 14, 55);
                doc.setFont("helvetica", "normal");
                doc.text(today, 50, 55);
                
                var tableBody = courses.length > 0 ? courses.map(function(c) {
                    return [
                        c.year || 'N/A', 
                        c.folio || 'N/A', 
                        c.courseName || c.nombre || 'N/A', 
                        c.datesText || c.fecha || 'N/A', 
                        c.hours || c.duracion || 'N/A', 
                        c.type || c.tipo || 'N/A', 
                        c.deptOrigin || c.departamento || teacher.dept || 'N/A'
                    ];
                }) : [['N/A', 'N/A', 'Sin cursos registrados', 'N/A', 'N/A', 'N/A', 'N/A']];

                doc.autoTable({ 
                    head: [['Año', 'Folio', 'Curso', 'Fechas', 'Hrs', 'Tipo', 'Depto. Origen']], 
                    body: tableBody, 
                    startY: 60, 
                    theme: 'striped', 
                    headStyles: { fillColor: [234, 88, 12], textColor: 255, fontSize: 9, halign: 'center' },
                    styles: { fontSize: 8, cellPadding: 3, overflow: 'linebreak' },
                    columnStyles: {
                        0: { cellWidth: 12, halign: 'center', fontStyle: 'bold' },
                        1: { cellWidth: 25, fontStyle: 'bold' },
                        2: { cellWidth: 'auto' },
                        3: { cellWidth: 25 },
                        4: { cellWidth: 10, halign: 'center' },
                        5: { cellWidth: 20, halign: 'center' },
                        6: { cellWidth: 30, halign: 'left' }
                    }
                });
                
                var pageCount = doc.internal.getNumberOfPages();
                doc.setFontSize(8); 
                doc.setTextColor(150);
                doc.text("Página 1 de " + pageCount, pageWidth/2, doc.internal.pageSize.getHeight() - 10, { align: "center" });

                doc.save("Kardex_" + (teacher.name || 'docente') + ".pdf");
                setExporting(false);
            }).catch(function(error) {
                console.error('Error al exportar PDF:', error);
                alert('Error al generar el PDF. Intente nuevamente.');
                setExporting(false);
            });
        };
        
        var years = courses.map(function(c) { return c.year; }).filter(function(v, i, a) { return a.indexOf(v) === i; }).sort().reverse();
        
        return h('div', { className: 'animate-fadeIn container mx-auto px-4 py-8 max-w-5xl' },
            h('div', { className: 'bg-white rounded-2xl shadow-lg p-6 mb-8 border-l-8 border-orange-500 flex flex-col sm:flex-row justify-between items-center gap-4' },
                h('div', null,
                    h('p', { className: 'text-xs font-bold text-gray-400 uppercase tracking-widest' }, 'Bienvenido'),
                    h('h2', { className: 'text-2xl font-bold text-slate-800' }, user.name || 'Usuario'),
                    h('p', { className: 'text-sm text-slate-500' }, user.email)
                ),
                h('button', { 
                    onClick: onLogout, 
                    className: 'bg-slate-100 text-slate-600 px-6 py-2 rounded-full font-bold hover:bg-slate-200 hover:text-slate-800 transition-colors'
                }, 'Cerrar Sesión')
            ),
            
            h('div', { className: 'bg-white rounded-2xl shadow-md p-8 mb-10 relative border border-slate-100' },
                h('div', { className: 'absolute top-0 right-0 p-6' },
                    h('button', { 
                        onClick: exportToPdf, 
                        disabled: exporting || courses.length === 0,
                        className: 'bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-100 transition-colors flex items-center gap-2 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed'
                    },
                        h('span', null, exporting ? '⏳' : '📄'),
                        exporting ? 'Generando...' : 'Descargar PDF'
                    )
                ),
                h('div', { className: 'mt-4 sm:mt-0' },
                    h('p', { className: 'text-xs font-bold text-orange-500 uppercase tracking-wider mb-1' }, 'Historial Académico'),
                    h('h2', { className: 'text-3xl font-bold text-slate-800 mb-1' }, teacher.name || 'Docente'),
                    h('p', { className: 'text-slate-500 font-medium' }, teacher.dept || 'Departamento no especificado'),
                    teacher.curp && teacher.curp !== 'N/A' && h('p', { className: 'text-xs text-slate-400 mt-1' }, 'CURP: ', teacher.curp),
                    h('p', { className: 'text-xs text-slate-400 mt-1' }, 'Total de cursos: ', courses.length)
                )
            ),

            courses.length === 0 ? 
                h('div', { className: 'text-center py-12 bg-white rounded-xl shadow' },
                    h('div', { className: 'text-6xl mb-4' }, '📭'),
                    h('p', { className: 'text-slate-500 font-medium' }, 'No se encontraron cursos registrados.'),
                    h('p', { className: 'text-slate-400 text-sm mt-2' }, 'Si has tomado cursos, verifica que estén registrados en el sistema.')
                ) :
                years.map(function(year) {
                    var yearCourses = courses.filter(function(c) { return String(c.year) === String(year); });
                    return h('div', { key: year, className: 'mb-10' },
                        h('div', { className: 'flex items-center mb-6' },
                            h('div', { className: 'px-6 py-2 rounded-full text-sm font-bold shadow-md ' + (String(year) === '2026' ? 'bg-orange-600 text-white' : 'bg-slate-700 text-white') },
                                String(year) === '2026' ? '📌 Periodo Actual' : year
                            ),
                            h('div', { className: 'h-px bg-slate-200 flex-grow ml-4' }),
                            h('span', { className: 'text-xs text-slate-400 ml-4 font-medium' }, yearCourses.length, ' curso', yearCourses.length !== 1 ? 's' : '')
                        ),
                        h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                            yearCourses.map(function(c, i) {
                                return h('div', { key: i, className: 'bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-all hover:-translate-y-1 group' },
                                    h('div', { className: 'flex justify-between items-start mb-3' },
                                        h('span', { className: 'text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide ' + (c.type && c.type.toUpperCase().includes('PROFESIONAL') ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700') },
                                            c.type || 'Curso'
                                        ),
                                        h('span', { className: 'text-xs font-mono font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded' }, c.folio || 'N/A')
                                    ),
                                    h('h3', { className: 'font-bold text-lg text-slate-800 mb-3 leading-tight group-hover:text-orange-600 transition-colors' }, c.courseName || c.nombre || 'Curso sin nombre'),
                                    h('div', { className: 'space-y-2 pt-3 border-t border-slate-50' },
                                        h('div', { className: 'flex items-center text-sm text-slate-600' },
                                            h('span', { className: 'w-6 text-center mr-2' }, '📅'),
                                            c.datesText || c.fecha || 'Fechas no especificadas'
                                        ),
                                        h('div', { className: 'flex items-center text-sm text-slate-600' },
                                            h('span', { className: 'w-6 text-center mr-2' }, '⏱️'),
                                            c.hours || c.duracion || 'N/A', ' horas'
                                        ),
                                        h('div', { className: 'flex items-center text-sm text-slate-500 italic' },
                                            h('span', { className: 'w-6 text-center mr-2' }, '🏛️'),
                                            c.deptOrigin || c.departamento || teacher.dept || 'Desarrollo Académico'
                                        )
                                    )
                                );
                            })
                        )
                    );
                }),
            
            h('div', { className: 'text-center text-xs text-slate-400 mt-8' },
                h('p', null, 'Los cursos registrados hasta la fecha son mostrados en este historial.'),
                h('p', null, 'Para cualquier corrección, contacta a la Coordinación de Actualización Docente.')
            )
        );
    };

    // ============================================================
    // 7. APP
    // ============================================================
    var App = function() {
        var _user = useState(null);
        var user = _user[0];
        var setUser = _user[1];
        
        var _data = useState(null);
        var data = _data[0];
        var setData = _data[1];
        
        var _loading = useState(false);
        var loading = _loading[0];
        var setLoading = _loading[1];
        
        var _error = useState(null);
        var error = _error[0];
        var setError = _error[1];

        var handleLogin = function(response) {
            setLoading(true);
            setError(null);
            try {
                var payload = JSON.parse(atob(response.credential.split('.')[1]));
                console.log('👤 Usuario autenticado:', payload.email);
                
                getTeacherHistory(response.credential)
                    .then(function(res) {
                        if (res.success) {
                            setUser({ 
                                name: payload.name, 
                                email: payload.email, 
                                picture: payload.picture, 
                                token: response.credential 
                            });
                            setData(res.data);
                            setError(null);
                        } else {
                            setError(res.message || 'Error al obtener el historial');
                        }
                    })
                    .catch(function(err) {
                        console.error('Error:', err);
                        setError(err.message || 'Error al cargar los datos');
                    })
                    .finally(function() { setLoading(false); });
            } catch(e) { 
                console.error('Error en login:', e);
                setLoading(false);
                setError('Error al procesar la autenticación');
            }
        };

        var handleLogout = function() { 
            setUser(null); 
            setData(null);
            setError(null);
        };

        if (loading) {
            return h('div', { className: 'flex flex-col justify-center items-center h-screen bg-slate-50' },
                h('div', { className: 'animate-spin h-12 w-12 border-4 border-orange-500 rounded-full border-t-transparent mb-4' }),
                h('p', { className: 'text-slate-500 font-bold animate-pulse' }, 'Cargando tu historial...')
            );
        }
        
        if (error) {
            return h('div', { className: 'container mx-auto px-4 py-10 max-w-3xl' },
                h('div', { className: 'bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm' },
                    h('h3', { className: 'text-lg font-bold text-red-800' }, '❌ Error'),
                    h('p', { className: 'text-red-700' }, error),
                    h('button', { 
                        onClick: function() { window.location.reload(); }, 
                        className: 'mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors'
                    }, 'Recargar página')
                )
            );
        }
        
        if (!user || !data) {
            return h('div', { className: 'container mx-auto px-4 pt-10' }, 
                h(LoginScreen, { onLogin: handleLogin })
            );
        }
        
        return h(Dashboard, { user: user, data: data, onLogout: handleLogout });
    };

    // ============================================================
    // 8. MONTAJE
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        var rootEl = document.getElementById('root');
        if (rootEl) {
            try {
                var root = createRoot(rootEl);
                root.render(h(App, null));
                console.log('✅ Historial ITD - App montada correctamente');
            } catch(e) {
                console.error('❌ Error al montar la app:', e);
                rootEl.innerHTML = 
                    '<div class="container mx-auto px-4 py-10 max-w-3xl">' +
                        '<div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm">' +
                            '<h3 class="text-lg font-bold text-red-800">⚠️ Error de carga</h3>' +
                            '<p class="text-red-700">No se pudo cargar la aplicación. Error: ' + e.message + '</p>' +
                            '<button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">Recargar página</button>' +
                        '</div>' +
                    '</div>';
            }
        } else {
            console.error('❌ No se encontró el elemento root');
        }
    });
</script>
</body>
</html>
