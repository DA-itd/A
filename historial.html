<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial Académico - Portal ITD</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
    .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    .debug-box { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 12px; margin: 8px 0; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 300px; overflow: auto; }
</style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 pb-20">
<!-- Botón Flotante Volver -->
<div class="fixed top-4 left-4 z-50">
    <a href="index.html" class="bg-white/90 backdrop-blur text-blue-900 px-4 py-2 rounded-full shadow-md font-bold text-sm hover:bg-blue-900 hover:text-white transition-all flex items-center gap-2">
        ← Volver al Portal
    </a>
</div>

<header class="bg-white shadow-xl sticky top-0 z-40 border-b-4 border-orange-500">
    <div class="container mx-auto px-4 py-4 sm:py-6 flex justify-between items-center gap-4">
        <div class="w-16 sm:w-20">
             <img src="https://raw.githubusercontent.com/DA-itd/web/main/TecNM_logo.jpg" class="h-12 sm:h-16 object-contain" alt="TecNM">
        </div>
        <div class="text-center flex-1">
            <h1 class="text-lg sm:text-2xl font-bold text-slate-800">HISTORIAL DE CURSOS</h1>
            <p class="text-xs sm:text-sm text-orange-600 font-bold tracking-wider uppercase">Kardex de Actualización Docente</p>
        </div>
        <div class="w-16 sm:w-20 flex justify-end">
            <img src="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png" class="h-12 sm:h-16 object-contain" alt="ITD">
        </div>
    </div>
</header>

<div id="root"></div>
<div id="debug-container" class="container mx-auto px-4 max-w-4xl mt-4"></div>

<footer class="bg-slate-900 text-white text-center py-8 mt-12">
    <div class="container mx-auto px-4">
        <p class="font-bold text-sm mb-1">© Coordinación de Actualización Docente</p>
        <p class="text-xs opacity-60 mb-1">Instituto Tecnológico de Durango</p>
        <p class="text-xs opacity-40">M.C. Alejandro Calderón Rentería</p>
    </div>
</footer>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { createRoot } = ReactDOM;

    // ============================================================
    // FUNCIÓN DE DEPURACIÓN - MUESTRA DATOS EN PANTALLA
    // ============================================================
    function showDebug(message, data) {
        const container = document.getElementById('debug-container');
        if (!container) return;
        
        const div = document.createElement('div');
        div.className = 'debug-box';
        const timestamp = new Date().toLocaleTimeString();
        let content = `[${timestamp}] ${message}\n`;
        if (data !== undefined) {
            try {
                content += JSON.stringify(data, null, 2);
            } catch(e) {
                content += String(data);
            }
        }
        div.textContent = content;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // ============================================================
    // 1. CONFIGURACIÓN
    // ============================================================
    const CONFIG = {
        GOOGLE_CLIENT_ID: '524996225715-5l95j3lces5hi49c19rfgotdrfo2seq1.apps.googleusercontent.com',
        APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwFO97VhIEO2ke2p-ZvYpXMWHP_LAxqmR0U5CmhPvOoQAH24FUAOt2rqGtoUhU-MKQauw/exec'
    };

    const ITD_LOGO_URL = 'https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png';

    // ============================================================
    // 2. UTILIDADES
    // ============================================================
    const getImageDataFromURL = (url) => {
        return new Promise((resolve) => {
            const img = new Image(); 
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                const canvas = document.createElement('canvas'); 
                canvas.width = img.width; 
                canvas.height = img.height;
                const ctx = canvas.getContext('2d'); 
                ctx.drawImage(img, 0, 0);
                try { resolve(canvas.toDataURL('image/png')); } 
                catch (e) { resolve(null); }
            };
            img.onerror = () => resolve(null); 
            img.src = url;
        });
    };
    
    const drawLogo = (doc, logoData, x, y, targetWidth) => {
        if (!logoData) return;
        try {
            const props = doc.getImageProperties(logoData);
            const targetHeight = (props.height * targetWidth) / props.width;
            doc.addImage(logoData, 'PNG', x, y, targetWidth, targetHeight);
        } catch (e) { 
            doc.addImage(logoData, 'PNG', x, y, targetWidth, targetWidth); 
        }
    };

    const cleanValue = (val) => {
        if (!val) return '';
        let cleaned = val.trim();
        if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
            cleaned = cleaned.substring(1, cleaned.length - 1).replace(/""/g, '"');
        }
        return cleaned;
    };

    const normalize = (str) => {
        if (!str) return '';
        return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    };

    // ============================================================
    // 3. OBTENER HISTORIAL CON DEPURACIÓN
    // ============================================================
    const getTeacherHistory = async (idToken) => {
        showDebug('📥 Solicitando historial al Apps Script...');
        showDebug('🔑 Token ID (primeros 20 chars):', idToken.substring(0, 20) + '...');
        
        try {
            const url = `${CONFIG.APPS_SCRIPT_URL}?action=getTeacherHistory&id_token=${encodeURIComponent(idToken)}&t=${Date.now()}`;
            showDebug('🔗 URL de petición:', url);
            
            const response = await fetch(url);
            showDebug('📊 Status HTTP:', response.status);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const result = await response.json();
            showDebug('📦 Respuesta completa del servidor:', result);
            
            if (result.success) {
                showDebug('✅ Éxito! Datos recibidos:', result.data);
                return result;
            } else {
                showDebug('❌ Error en la respuesta:', result.message || 'Sin mensaje');
                throw new Error(result.message || 'Error al obtener el historial');
            }
        } catch (error) {
            showDebug('❌ Error en la petición:', error.message);
            throw error;
        }
    };

    // ============================================================
    // 4. COMPONENTE LOGIN
    // ============================================================
    const LoginScreen = ({ onLogin }) => {
        const googleBtnRef = useRef(null);
        
        useEffect(() => {
            showDebug('🔐 Inicializando botón de Google...');
            const interval = setInterval(() => {
                if (window.google && window.google.accounts && googleBtnRef.current) {
                    clearInterval(interval);
                    showDebug('✅ Google Identity Services cargado');
                    try {
                        window.google.accounts.id.initialize({ 
                            client_id: CONFIG.GOOGLE_CLIENT_ID, 
                            callback: onLogin 
                        });
                        window.google.accounts.id.renderButton(googleBtnRef.current, { 
                            theme: "filled_blue", 
                            size: "large", 
                            text: "continue_with", 
                            shape: "pill" 
                        });
                        showDebug('✅ Botón de Google renderizado');
                    } catch (e) { 
                        showDebug('❌ Error al renderizar botón:', e.message);
                        console.error("Error rendering Google Button", e); 
                    }
                }
            }, 500);
            return () => clearInterval(interval);
        }, [onLogin]);

        return React.createElement('div', { className: 'min-h-[60vh] flex items-center justify-center animate-fadeIn' },
            React.createElement('div', { className: 'bg-white p-10 rounded-2xl shadow-2xl text-center max-w-md w-full border-t-4 border-orange-500' },
                React.createElement('div', { className: 'text-5xl mb-4' }, '📚'),
                React.createElement('h2', { className: 'text-2xl font-bold mb-2 text-slate-800' }, 'Acceso a Historial'),
                React.createElement('p', { className: 'text-slate-500 mb-8' }, 'Inicia sesión con tu cuenta institucional para ver tu kardex de cursos.'),
                React.createElement('div', { className: 'flex justify-center min-h-[50px]', ref: googleBtnRef })
            )
        );
    };

    // ============================================================
    // 5. COMPONENTE DASHBOARD (simplificado para depuración)
    // ============================================================
    const Dashboard = ({ user, data, onLogout }) => {
        const [exporting, setExporting] = React.useState(false);
        
        // Mostrar en depuración
        showDebug('📊 Dashboard montado con datos:', data);
        
        if (!data) {
            showDebug('⚠️ data es null o undefined');
            return React.createElement('div', { className: 'container mx-auto px-4 py-10 max-w-3xl' },
                React.createElement('div', { className: 'bg-yellow-50 border-l-4 border-yellow-500 p-6 rounded-r-xl shadow-sm' },
                    React.createElement('h3', { className: 'text-lg font-bold text-yellow-800' }, '⏳ Sin datos'),
                    React.createElement('p', { className: 'text-yellow-700' }, 'No se recibieron datos del servidor.')
                )
            );
        }
        
        if (!data.teacher) {
            showDebug('⚠️ data.teacher es null o undefined', data);
            return React.createElement('div', { className: 'container mx-auto px-4 py-10 max-w-3xl' },
                React.createElement('div', { className: 'bg-yellow-50 border-l-4 border-yellow-500 p-6 rounded-r-xl shadow-sm' },
                    React.createElement('h3', { className: 'text-lg font-bold text-yellow-800' }, '⏳ Cargando datos...'),
                    React.createElement('p', { className: 'text-yellow-700' }, 'Estamos obteniendo tu información académica.')
                )
            );
        }
        
        const { teacher, courses = [] } = data;
        showDebug('👤 Docente:', teacher);
        showDebug('📚 Cursos:', courses.length);
        
        const exportToPdf = async () => {
            setExporting(true);
            try {
                const { jsPDF } = window.jspdf; 
                const doc = new jsPDF('p', 'mm', 'letter');
                const pageWidth = doc.internal.pageSize.getWidth();

                const itdLogo = await getImageDataFromURL(ITD_LOGO_URL); 
                if (itdLogo) drawLogo(doc, itdLogo, pageWidth - 35, 10, 25);

                doc.setFont("helvetica", "bold"); 
                doc.setFontSize(14); 
                doc.setTextColor(27, 57, 106);
                doc.text("INSTITUTO TECNOLÓGICO DE DURANGO", pageWidth/2, 20, { align: "center" });
                doc.setFontSize(11); 
                doc.setTextColor(100); 
                doc.text("Coordinación de Actualización Docente", pageWidth/2, 26, { align: "center" });
                doc.setFontSize(14); 
                doc.setTextColor(128, 0, 0);
                doc.text("HISTORIAL DE CURSOS", pageWidth/2, 38, { align: "center" });
                
                doc.setTextColor(0); 
                doc.setFontSize(10); 
                doc.setFont("helvetica", "bold");
                doc.text("Docente:", 14, 50);
                doc.setFont("helvetica", "normal");
                doc.text(teacher.name || 'No especificado', 35, 50);

                const today = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });
                doc.setFont("helvetica", "bold");
                doc.text("Fecha de emisión:", 14, 55);
                doc.setFont("helvetica", "normal");
                doc.text(today, 50, 55);
                
                const tableBody = courses.length > 0 ? courses.map(c => [
                    c.year || 'N/A', 
                    c.folio || 'N/A', 
                    c.courseName || c.nombre || 'N/A', 
                    c.datesText || c.fecha || 'N/A', 
                    c.hours || c.duracion || 'N/A', 
                    c.type || c.tipo || 'N/A', 
                    c.deptOrigin || c.departamento || teacher.dept || 'N/A'
                ]) : [['N/A', 'N/A', 'Sin cursos registrados', 'N/A', 'N/A', 'N/A', 'N/A']];

                doc.autoTable({ 
                    head: [['Año', 'Folio', 'Curso', 'Fechas', 'Hrs', 'Tipo', 'Depto. Origen']], 
                    body: tableBody, 
                    startY: 60, 
                    theme: 'striped', 
                    headStyles: { fillColor: [234, 88, 12], textColor: 255, fontSize: 9, halign: 'center' },
                    styles: { fontSize: 8, cellPadding: 3, overflow: 'linebreak' },
                    columnStyles: {
                        0: { cellWidth: 12, halign: 'center', fontStyle: 'bold' },
                        1: { cellWidth: 25, fontStyle: 'bold' },
                        2: { cellWidth: 'auto' },
                        3: { cellWidth: 25 },
                        4: { cellWidth: 10, halign: 'center' },
                        5: { cellWidth: 20, halign: 'center' },
                        6: { cellWidth: 30, halign: 'left' }
                    }
                });
                
                const pageCount = doc.internal.getNumberOfPages();
                doc.setFontSize(8); 
                doc.setTextColor(150);
                doc.text(`Página 1 de ${pageCount}`, pageWidth/2, doc.internal.pageSize.getHeight() - 10, { align: "center" });

                doc.save(`Kardex_${teacher.name || 'docente'}.pdf`);
            } catch (error) {
                console.error('Error al exportar PDF:', error);
                alert('Error al generar el PDF. Intente nuevamente.');
            } finally {
                setExporting(false);
            }
        };
        
        const years = [...new Set(courses.map(c => c.year))].sort().reverse();
        
        return React.createElement('div', { className: 'animate-fadeIn container mx-auto px-4 py-8 max-w-5xl' },
            React.createElement('div', { className: 'bg-white rounded-2xl shadow-lg p-6 mb-8 border-l-8 border-orange-500 flex flex-col sm:flex-row justify-between items-center gap-4' },
                React.createElement('div', null,
                    React.createElement('p', { className: 'text-xs font-bold text-gray-400 uppercase tracking-widest' }, 'Bienvenido'),
                    React.createElement('h2', { className: 'text-2xl font-bold text-slate-800' }, user.name || 'Usuario'),
                    React.createElement('p', { className: 'text-sm text-slate-500' }, user.email)
                ),
                React.createElement('button', { 
                    onClick: onLogout, 
                    className: 'bg-slate-100 text-slate-600 px-6 py-2 rounded-full font-bold hover:bg-slate-200 hover:text-slate-800 transition-colors'
                }, 'Cerrar Sesión')
            ),
            
            React.createElement('div', { className: 'bg-white rounded-2xl shadow-md p-8 mb-10 relative border border-slate-100' },
                React.createElement('div', { className: 'absolute top-0 right-0 p-6' },
                    React.createElement('button', { 
                        onClick: exportToPdf, 
                        disabled: exporting || courses.length === 0,
                        className: 'bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-100 transition-colors flex items-center gap-2 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed'
                    },
                        React.createElement('span', null, exporting ? '⏳' : '📄'),
                        exporting ? 'Generando...' : 'Descargar PDF'
                    )
                ),
                React.createElement('div', { className: 'mt-4 sm:mt-0' },
                    React.createElement('p', { className: 'text-xs font-bold text-orange-500 uppercase tracking-wider mb-1' }, 'Historial Académico'),
                    React.createElement('h2', { className: 'text-3xl font-bold text-slate-800 mb-1' }, teacher.name || 'Docente'),
                    React.createElement('p', { className: 'text-slate-500 font-medium' }, teacher.dept || 'Departamento no especificado'),
                    teacher.curp && teacher.curp !== 'N/A' && React.createElement('p', { className: 'text-xs text-slate-400 mt-1' }, 'CURP: ', teacher.curp),
                    React.createElement('p', { className: 'text-xs text-slate-400 mt-1' }, 'Total de cursos: ', courses.length)
                )
            ),

            courses.length === 0 ? 
                React.createElement('div', { className: 'text-center py-12 bg-white rounded-xl shadow' },
                    React.createElement('div', { className: 'text-6xl mb-4' }, '📭'),
                    React.createElement('p', { className: 'text-slate-500 font-medium' }, 'No se encontraron cursos registrados.'),
                    React.createElement('p', { className: 'text-slate-400 text-sm mt-2' }, 'Si has tomado cursos, verifica que estén registrados en el sistema.')
                ) :
                years.map(year => {
                    const yearCourses = courses.filter(c => String(c.year) === String(year));
                    return React.createElement('div', { key: year, className: 'mb-10' },
                        React.createElement('div', { className: 'flex items-center mb-6' },
                            React.createElement('div', { className: `px-6 py-2 rounded-full text-sm font-bold shadow-md ${String(year) === '2026' ? 'bg-orange-600 text-white' : 'bg-slate-700 text-white'}` },
                                String(year) === '2026' ? '📌 Periodo Actual' : year
                            ),
                            React.createElement('div', { className: 'h-px bg-slate-200 flex-grow ml-4' }),
                            React.createElement('span', { className: 'text-xs text-slate-400 ml-4 font-medium' }, yearCourses.length, ' curso', yearCourses.length !== 1 ? 's' : '')
                        ),
                        React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                            yearCourses.map((c, i) => 
                                React.createElement('div', { key: i, className: 'bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-all hover:-translate-y-1 group' },
                                    React.createElement('div', { className: 'flex justify-between items-start mb-3' },
                                        React.createElement('span', { className: `text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide ${c.type && c.type.toUpperCase().includes('PROFESIONAL') ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}` },
                                            c.type || 'Curso'
                                        ),
                                        React.createElement('span', { className: 'text-xs font-mono font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded' }, c.folio || 'N/A')
                                    ),
                                    React.createElement('h3', { className: 'font-bold text-lg text-slate-800 mb-3 leading-tight group-hover:text-orange-600 transition-colors' }, c.courseName || c.nombre || 'Curso sin nombre'),
                                    React.createElement('div', { className: 'space-y-2 pt-3 border-t border-slate-50' },
                                        React.createElement('div', { className: 'flex items-center text-sm text-slate-600' },
                                            React.createElement('span', { className: 'w-6 text-center mr-2' }, '📅'),
                                            c.datesText || c.fecha || 'Fechas no especificadas'
                                        ),
                                        React.createElement('div', { className: 'flex items-center text-sm text-slate-600' },
                                            React.createElement('span', { className: 'w-6 text-center mr-2' }, '⏱️'),
                                            c.hours || c.duracion || 'N/A', ' horas'
                                        ),
                                        React.createElement('div', { className: 'flex items-center text-sm text-slate-500 italic' },
                                            React.createElement('span', { className: 'w-6 text-center mr-2' }, '🏛️'),
                                            c.deptOrigin || c.departamento || teacher.dept || 'Desarrollo Académico'
                                        )
                                    )
                                )
                            )
                        )
                    );
                }),
            
            React.createElement('div', { className: 'text-center text-xs text-slate-400 mt-8' },
                React.createElement('p', null, 'Los cursos registrados hasta la fecha son mostrados en este historial.'),
                React.createElement('p', null, 'Para cualquier corrección, contacta a la Coordinación de Actualización Docente.')
            )
        );
    };

    // ============================================================
    // 6. APP PRINCIPAL
    // ============================================================
    const App = () => {
        const [user, setUser] = useState(null);
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);

        showDebug('🚀 App iniciada');

        const handleLogin = (response) => {
            setLoading(true);
            setError(null);
            showDebug('🔑 Login recibido');
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                showDebug('👤 Usuario autenticado:', payload.email);
                
                getTeacherHistory(response.credential)
                    .then(res => {
                        if(res.success) {
                            showDebug('✅ Login exitoso, datos recibidos');
                            setUser({ 
                                name: payload.name, 
                                email: payload.email, 
                                picture: payload.picture, 
                                token: response.credential 
                            });
                            setData(res.data);
                            setError(null);
                        } else {
                            showDebug('❌ Error en respuesta:', res);
                            setError(res.message || 'Error al obtener el historial');
                        }
                    })
                    .catch(err => {
                        showDebug('❌ Error en petición:', err.message);
                        setError(err.message || 'Error al cargar los datos');
                    })
                    .finally(() => setLoading(false));
            } catch(e) { 
                showDebug('❌ Error en login:', e.message);
                setLoading(false);
                setError('Error al procesar la autenticación');
            }
        };

        const handleLogout = () => { 
            showDebug('👋 Cerrando sesión');
            setUser(null); 
            setData(null);
            setError(null);
        };

        if(loading) return React.createElement('div', { className: 'flex flex-col justify-center items-center h-screen bg-slate-50' },
            React.createElement('div', { className: 'animate-spin h-12 w-12 border-4 border-orange-500 rounded-full border-t-transparent mb-4' }),
            React.createElement('p', { className: 'text-slate-500 font-bold animate-pulse' }, 'Cargando tu historial...')
        );
        
        if(error) return React.createElement('div', { className: 'container mx-auto px-4 py-10 max-w-3xl' },
            React.createElement('div', { className: 'bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm' },
                React.createElement('h3', { className: 'text-lg font-bold text-red-800' }, '❌ Error'),
                React.createElement('p', { className: 'text-red-700' }, error),
                React.createElement('button', { 
                    onClick: () => { window.location.reload(); }, 
                    className: 'mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors'
                }, 'Recargar página')
            )
        );
        
        if(!user || !data) return React.createElement('div', { className: 'container mx-auto px-4 pt-10' }, 
            React.createElement(LoginScreen, { onLogin: handleLogin })
        );
        
        return React.createElement(Dashboard, { user: user, data: data, onLogout: handleLogout });
    };

    // ============================================================
    // 7. MONTAJE
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        showDebug('📄 DOM cargado');
        const rootEl = document.getElementById('root');
        if (rootEl) {
            try {
                const root = createRoot(rootEl);
                root.render(React.createElement(App, null));
                showDebug('✅ React montado correctamente');
            } catch(e) {
                showDebug('❌ Error al montar React:', e.message);
                rootEl.innerHTML = `
                    <div class="container mx-auto px-4 py-10 max-w-3xl">
                        <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm">
                            <h3 class="text-lg font-bold text-red-800">⚠️ Error de carga</h3>
                            <p class="text-red-700">No se pudo cargar la aplicación. Error: ${e.message}</p>
                            <button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">
                                Recargar página
                            </button>
                        </div>
                    </div>
                `;
            }
        } else {
            showDebug('❌ No se encontró el elemento root');
        }
    });
</script>
</body>
</html>
