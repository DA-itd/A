<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>

    .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }

<body class="bg-slate-50 min-h-screen font-sans text-slate-900 pb-20">
<!-- Botón Flotante Volver -->
<div class="fixed top-4 left-4 z-50">
    <a href="index.html" class="bg-white/90 backdrop-blur text-blue-900 px-4 py-2 rounded-full shadow-md font-bold text-sm hover:bg-blue-900 hover:text-white transition-all flex items-center gap-2">
        ← Volver al Portal
    </a>
</div>

<header class="bg-white shadow-xl sticky top-0 z-40 border-b-4 border-orange-500">
    <div class="container mx-auto px-4 py-4 sm:py-6 flex justify-between items-center gap-4">
        <div class="w-16 sm:w-20">
             <img src="https://raw.githubusercontent.com/DA-itd/web/main/TecNM_logo.jpg" class="h-12 sm:h-16 object-contain" alt="TecNM">
        </div>
        <div class="text-center flex-1">
            <h1 class="text-lg sm:text-2xl font-bold text-slate-800">HISTORIAL DE CURSOS</h1>
            <p class="text-xs sm:text-sm text-orange-600 font-bold tracking-wider uppercase">Kardex de Actualización Docente</p>
        </div>
        <div class="w-16 sm:w-20 flex justify-end">
            <img src="https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png" class="h-12 sm:h-16 object-contain" alt="ITD">
        </div>
    </div>
</header>

<div id="root"></div>

<footer class="bg-slate-900 text-white text-center py-8 mt-12">
    <div class="container mx-auto px-4">
        <p class="font-bold text-sm mb-1">© Coordinación de Actualización Docente</p>
        <p class="text-xs opacity-60 mb-1">Instituto Tecnológico de Durango</p>
        <p class="text-xs opacity-40">M.C. Alejandro Calderón Rentería</p>
    </div>
</footer>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CONFIG = {
        GOOGLE_CLIENT_ID: '524996225715-5l95j3lces5hi49c19rfgotdrfo2seq1.apps.googleusercontent.com',
        APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwFO97VhIEO2ke2p-ZvYpXMWHP_LAxqmR0U5CmhPvOoQAH24FUAOt2rqGtoUhU-MKQauw/exec'
    };

    const ITD_LOGO_URL = 'https://raw.githubusercontent.com/DA-itd/web/main/logo_itdurango.png';

    const getImageDataFromURL = (url) => {
        return new Promise((resolve) => {
            const img = new Image(); img.crossOrigin = 'Anonymous';
            img.onload = () => {
                const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                try { resolve(canvas.toDataURL('image/png')); } catch (e) { resolve(null); }
            };
            img.onerror = () => resolve(null); img.src = url;
        });
    };
    
    const drawLogo = (doc, logoData, x, y, targetWidth) => {
        if (!logoData) return;
        try {
            const props = doc.getImageProperties(logoData);
            const targetHeight = (props.height * targetWidth) / props.width;
            doc.addImage(logoData, 'PNG', x, y, targetWidth, targetHeight);
        } catch (e) { doc.addImage(logoData, 'PNG', x, y, targetWidth, targetWidth); }
    };

    // ============================================================
    // FUNCIONES DE UTILIDAD PARA PROCESAR CSV
    // ============================================================
    const parseCSVLine = (line) => {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                if (inQuotes && line[i + 1] === '"') {
                    current += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result;
    };

    const cleanValue = (val) => {
        if (!val) return '';
        let cleaned = val.trim();
        if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
            cleaned = cleaned.substring(1, cleaned.length - 1).replace(/""/g, '"');
        }
        return cleaned;
    };

    const normalize = (str) => {
        if (!str) return '';
        return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    };

    // ============================================================
    // FUNCIÓN MEJORADA PARA OBTENER EL HISTORIAL
    // ============================================================
    const getTeacherHistory = async (idToken) => {
        try {
            const url = `${CONFIG.APPS_SCRIPT_URL}?action=getTeacherHistory&id_token=${encodeURIComponent(idToken)}&t=${Date.now()}`;
            console.log('📥 Solicitando historial...');
            
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const result = await response.json();
            console.log('📊 Respuesta del servidor:', result);
            
            if (result.success) {
                // Verificar si los datos vienen directamente o si necesitan ser procesados
                if (result.data && result.data.teacher && result.data.courses) {
                    return result;
                } else if (result.data && result.data.length > 0) {
                    // Si los datos vienen como array, procesarlos
                    console.warn('⚠️ Datos en formato array, procesando...');
                    return processRawData(result.data);
                } else {
                    throw new Error('No se encontraron datos del historial');
                }
            } else {
                throw new Error(result.message || 'Error al obtener el historial');
            }
        } catch (error) {
            console.error('❌ Error al obtener historial:', error);
            throw error;
        }
    };

    // Función para procesar datos en bruto si el Apps Script devuelve un array
    const processRawData = (rawData) => {
        // Buscar la fila de encabezados
        let headerRowIndex = -1;
        for (let i = 0; i < rawData.length; i++) {
            if (Array.isArray(rawData[i])) {
                const rowStr = rawData[i].join(' ').toLowerCase();
                if (rowStr.includes('nombre') || rowStr.includes('email') || rowStr.includes('curp')) {
                    headerRowIndex = i;
                    break;
                }
            }
        }
        
        if (headerRowIndex === -1) {
            console.warn('⚠️ No se encontraron encabezados, usando fila 0');
            headerRowIndex = 0;
        }
        
        const headers = rawData[headerRowIndex].map(h => cleanValue(h).toLowerCase());
        console.log('📋 Encabezados detectados:', headers);
        
        // Buscar índices de columnas importantes
        const findCol = (keywords) => {
            return headers.findIndex(h => keywords.some(k => normalize(h).includes(normalize(k))));
        };
        
        const idx = {
            nombre: findCol(['nombre', 'nombrecompleto', 'docente', 'participante']),
            curp: findCol(['curp']),
            email: findCol(['email', 'correo', 'emailaddress']),
            departamento: findCol(['departamento', 'depto', 'carrera']),
            nivel: findCol(['nivel', 'tipo']),
            genero: findCol(['genero', 'sexo'])
        };
        
        console.log('🔍 Índices encontrados:', idx);
        
        // Extraer datos del docente (tomando el primer registro válido)
        let teacherData = null;
        for (let i = headerRowIndex + 1; i < rawData.length; i++) {
            const row = rawData[i];
            if (Array.isArray(row) && row.length > 0) {
                const nombre = idx.nombre !== -1 ? cleanValue(row[idx.nombre]) : '';
                if (nombre && nombre.length > 2) {
                    teacherData = {
                        name: nombre,
                        curp: idx.curp !== -1 ? cleanValue(row[idx.curp]) : 'N/A',
                        email: idx.email !== -1 ? cleanValue(row[idx.email]) : '',
                        dept: idx.departamento !== -1 ? cleanValue(row[idx.departamento]) : 'No especificado',
                        nivel: idx.nivel !== -1 ? cleanValue(row[idx.nivel]) : '',
                        genero: idx.genero !== -1 ? cleanValue(row[idx.genero]) : ''
                    };
                    break;
                }
            }
        }
        
        if (!teacherData) {
            throw new Error('No se encontraron datos del docente');
        }
        
        console.log('👤 Datos del docente:', teacherData);
        
        // En este punto, los cursos deberían venir del Apps Script
        // Si no hay cursos, retornar un array vacío
        return {
            teacher: teacherData,
            courses: []
        };
    };

    // ============================================================
    // COMPONENTE LOGIN
    // ============================================================
    const LoginScreen = ({ onLogin }) => {
        const googleBtnRef = useRef(null);
        
        useEffect(() => {
            const interval = setInterval(() => {
                if (window.google && window.google.accounts && googleBtnRef.current) {
                    clearInterval(interval);
                    try {
                        window.google.accounts.id.initialize({ 
                            client_id: CONFIG.GOOGLE_CLIENT_ID, 
                            callback: onLogin 
                        });
                        window.google.accounts.id.renderButton(googleBtnRef.current, { 
                            theme: "filled_blue", 
                            size: "large", 
                            text: "continue_with", 
                            shape: "pill" 
                        });
                    } catch (e) { 
                        console.error("Error rendering Google Button", e); 
                    }
                }
            }, 500);
            return () => clearInterval(interval);
        }, [onLogin]);

        return (
            <div className="min-h-[60vh] flex items-center justify-center animate-fadeIn">
                <div className="bg-white p-10 rounded-2xl shadow-2xl text-center max-w-md w-full border-t-4 border-orange-500">
                    <div className="text-5xl mb-4">📚</div>
                    <h2 className="text-2xl font-bold mb-2 text-slate-800">Acceso a Historial</h2>
                    <p className="text-slate-500 mb-8">Inicia sesión con tu cuenta institucional para ver tu kardex de cursos.</p>
                    <div className="flex justify-center min-h-[50px]" ref={googleBtnRef}></div>
                </div>
            </div>
        );
    };

    // ============================================================
    // COMPONENTE DASHBOARD
    // ============================================================
    const Dashboard = ({ user, data, onLogout }) => {
        const [exporting, setExporting] = useState(false);
        
        // Verificar que tenemos datos válidos
        if (!data || !data.teacher) {
            return (
                <div className="container mx-auto px-4 py-10 max-w-3xl">
                    <div className="bg-yellow-50 border-l-4 border-yellow-500 p-6 rounded-r-xl shadow-sm">
                        <h3 className="text-lg font-bold text-yellow-800">⏳ Cargando datos...</h3>
                        <p className="text-yellow-700">Estamos obteniendo tu información académica. Por favor espera un momento.</p>
                    </div>
                </div>
            );
        }
        
        const { teacher, courses = [] } = data;
        
        const exportToPdf = async () => {
            setExporting(true);
            try {
                const { jsPDF } = window.jspdf; 
                const doc = new jsPDF('p', 'mm', 'letter');
                const pageWidth = doc.internal.pageSize.getWidth();

                const itdLogo = await getImageDataFromURL(ITD_LOGO_URL); 
                if (itdLogo) drawLogo(doc, itdLogo, pageWidth - 35, 10, 25);

                doc.setFont("helvetica", "bold"); 
                doc.setFontSize(14); 
                doc.setTextColor(27, 57, 106);
                doc.text("INSTITUTO TECNOLÓGICO DE DURANGO", pageWidth/2, 20, { align: "center" });
                doc.setFontSize(11); 
                doc.setTextColor(100); 
                doc.text("Coordinación de Actualización Docente", pageWidth/2, 26, { align: "center" });
                doc.setFontSize(14); 
                doc.setTextColor(128, 0, 0);
                doc.text("HISTORIAL DE CURSOS", pageWidth/2, 38, { align: "center" });
                
                doc.setTextColor(0); 
                doc.setFontSize(10); 
                doc.setFont("helvetica", "bold");
                doc.text("Docente:", 14, 50);
                doc.setFont("helvetica", "normal");
                doc.text(teacher.name || 'No especificado', 35, 50);

                const today = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });
                doc.setFont("helvetica", "bold");
                doc.text("Fecha de emisión:", 14, 55);
                doc.setFont("helvetica", "normal");
                doc.text(today, 50, 55);
                
                const tableBody = courses.length > 0 ? courses.map(c => [
                    c.year || 'N/A', 
                    c.folio || 'N/A', 
                    c.courseName || c.nombre || 'N/A', 
                    c.datesText || c.fecha || 'N/A', 
                    c.hours || c.duracion || 'N/A', 
                    c.type || c.tipo || 'N/A', 
                    c.deptOrigin || c.departamento || teacher.dept || 'N/A'
                ]) : [['N/A', 'N/A', 'Sin cursos registrados', 'N/A', 'N/A', 'N/A', 'N/A']];

                doc.autoTable({ 
                    head: [['Año', 'Folio', 'Curso', 'Fechas', 'Hrs', 'Tipo', 'Depto. Origen']], 
                    body: tableBody, 
                    startY: 60, 
                    theme: 'striped', 
                    headStyles: { fillColor: [234, 88, 12], textColor: 255, fontSize: 9, halign: 'center' },
                    styles: { fontSize: 8, cellPadding: 3, overflow: 'linebreak' },
                    columnStyles: {
                        0: { cellWidth: 12, halign: 'center', fontStyle: 'bold' },
                        1: { cellWidth: 25, fontStyle: 'bold' },
                        2: { cellWidth: 'auto' },
                        3: { cellWidth: 25 },
                        4: { cellWidth: 10, halign: 'center' },
                        5: { cellWidth: 20, halign: 'center' },
                        6: { cellWidth: 30, halign: 'left' }
                    }
                });
                
                const pageCount = doc.internal.getNumberOfPages();
                doc.setFontSize(8); 
                doc.setTextColor(150);
                doc.text(`Página 1 de ${pageCount}`, pageWidth/2, doc.internal.pageSize.getHeight() - 10, { align: "center" });

                doc.save(`Kardex_${teacher.name || 'docente'}.pdf`);
            } catch (error) {
                console.error('Error al exportar PDF:', error);
                alert('Error al generar el PDF. Intente nuevamente.');
            } finally {
                setExporting(false);
            }
        };
        
        const years = [...new Set(courses.map(c => c.year))].sort().reverse();
        
        return (
            <div className="animate-fadeIn container mx-auto px-4 py-8 max-w-5xl">
                <div className="bg-white rounded-2xl shadow-lg p-6 mb-8 border-l-8 border-orange-500 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div>
                        <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">Bienvenido</p>
                        <h2 className="text-2xl font-bold text-slate-800">{user.name || 'Usuario'}</h2>
                        <p className="text-sm text-slate-500">{user.email}</p>
                    </div>
                    <button onClick={onLogout} className="bg-slate-100 text-slate-600 px-6 py-2 rounded-full font-bold hover:bg-slate-200 hover:text-slate-800 transition-colors">
                        Cerrar Sesión
                    </button>
                </div>
                
                <div className="bg-white rounded-2xl shadow-md p-8 mb-10 relative border border-slate-100">
                    <div className="absolute top-0 right-0 p-6">
                        <button 
                            onClick={exportToPdf} 
                            disabled={exporting || courses.length === 0}
                            className="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-100 transition-colors flex items-center gap-2 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <span>{exporting ? '⏳' : '📄'}</span> 
                            {exporting ? 'Generando...' : 'Descargar PDF'}
                        </button>
                    </div>
                    <div className="mt-4 sm:mt-0">
                        <p className="text-xs font-bold text-orange-500 uppercase tracking-wider mb-1">Historial Académico</p>
                        <h2 className="text-3xl font-bold text-slate-800 mb-1">{teacher.name || 'Docente'}</h2>
                        <p className="text-slate-500 font-medium">{teacher.dept || 'Departamento no especificado'}</p>
                        {teacher.curp && teacher.curp !== 'N/A' && <p className="text-xs text-slate-400 mt-1">CURP: {teacher.curp}</p>}
                        <p className="text-xs text-slate-400 mt-1">Total de cursos: {courses.length}</p>
                    </div>
                </div>

                {courses.length === 0 ? (
                    <div className="text-center py-12 bg-white rounded-xl shadow">
                        <div className="text-6xl mb-4">📭</div>
                        <p className="text-slate-500 font-medium">No se encontraron cursos registrados.</p>
                        <p className="text-slate-400 text-sm mt-2">Si has tomado cursos, verifica que estén registrados en el sistema.</p>
                    </div>
                ) : (
                    years.map(year => {
                        const yearCourses = courses.filter(c => String(c.year) === String(year));
                        return (
                            <div key={year} className="mb-10">
                                <div className="flex items-center mb-6">
                                    <div className={`px-6 py-2 rounded-full text-sm font-bold shadow-md ${String(year) === '2026' ? 'bg-orange-600 text-white' : 'bg-slate-700 text-white'}`}>
                                        {String(year) === '2026' ? '📌 Periodo Actual' : year}
                                    </div>
                                    <div className="h-px bg-slate-200 flex-grow ml-4"></div>
                                    <span className="text-xs text-slate-400 ml-4 font-medium">{yearCourses.length} curso{yearCourses.length !== 1 ? 's' : ''}</span>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {yearCourses.map((c, i) => (
                                        <div key={i} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-all hover:-translate-y-1 group">
                                            <div className="flex justify-between items-start mb-3">
                                                <span className={`text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide ${c.type && c.type.toUpperCase().includes('PROFESIONAL') ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>
                                                    {c.type || 'Curso'}
                                                </span>
                                                <span className="text-xs font-mono font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded">{c.folio || 'N/A'}</span>
                                            </div>
                                            <h3 className="font-bold text-lg text-slate-800 mb-3 leading-tight group-hover:text-orange-600 transition-colors">{c.courseName || c.nombre || 'Curso sin nombre'}</h3>
                                            
                                            <div className="space-y-2 pt-3 border-t border-slate-50">
                                                <div className="flex items-center text-sm text-slate-600">
                                                    <span className="w-6 text-center mr-2">📅</span> {c.datesText || c.fecha || 'Fechas no especificadas'}
                                                </div>
                                                <div className="flex items-center text-sm text-slate-600">
                                                    <span className="w-6 text-center mr-2">⏱️</span> {c.hours || c.duracion || 'N/A'} horas
                                                </div>
                                                <div className="flex items-center text-sm text-slate-500 italic">
                                                    <span className="w-6 text-center mr-2">🏛️</span> {c.deptOrigin || c.departamento || teacher.dept || 'Desarrollo Académico'}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })
                )}
                
                <div className="text-center text-xs text-slate-400 mt-8">
                    <p>Los cursos registrados hasta la fecha son mostrados en este historial.</p>
                    <p>Para cualquier corrección, contacta a la Coordinación de Actualización Docente.</p>
                </div>
            </div>
        );
    };

    // ============================================================
    // COMPONENTE PRINCIPAL
    // ============================================================
    const App = () => {
        const [user, setUser] = useState(null);
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);

        const handleLogin = (response) => {
            setLoading(true);
            setError(null);
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                console.log('👤 Usuario autenticado:', payload.email);
                
                getTeacherHistory(response.credential)
                    .then(res => {
                        if(res.success) {
                            setUser({ 
                                name: payload.name, 
                                email: payload.email, 
                                picture: payload.picture, 
                                token: response.credential 
                            });
                            setData(res.data);
                            setError(null);
                        } else {
                            setError(res.message || 'Error al obtener el historial');
                        }
                    })
                    .catch(err => {
                        console.error('Error:', err);
                        setError(err.message || 'Error al cargar los datos');
                    })
                    .finally(() => setLoading(false));
            } catch(e) { 
                console.error('Error en login:', e);
                setLoading(false);
                setError('Error al procesar la autenticación');
            }
        };

        const handleLogout = () => { 
            setUser(null); 
            setData(null);
            setError(null);
        };

        if(loading) return (
            <div className="flex flex-col justify-center items-center h-screen bg-slate-50">
                <div className="animate-spin h-12 w-12 border-4 border-orange-500 rounded-full border-t-transparent mb-4"></div>
                <p className="text-slate-500 font-bold animate-pulse">Cargando tu historial...</p>
            </div>
        );
        
        if(error) return (
            <div className="container mx-auto px-4 py-10 max-w-3xl">
                <div className="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm">
                    <h3 className="text-lg font-bold text-red-800">❌ Error</h3>
                    <p className="text-red-700">{error}</p>
                    <button 
                        onClick={() => { setError(null); setLoading(true); 
                            // Reintentar login con el mismo token si existe
                            if (user && user.token) {
                                getTeacherHistory(user.token)
                                    .then(res => {
                                        if(res.success) {
                                            setData(res.data);
                                            setError(null);
                                        } else {
                                            setError(res.message || 'Error al obtener el historial');
                                        }
                                    })
                                    .catch(err => setError(err.message))
                                    .finally(() => setLoading(false));
                            } else {
                                setLoading(false);
                            }
                        }} 
                        className="mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors"
                    >
                        Intentar de nuevo
                    </button>
                </div>
            </div>
        );
        
        if(!user || !data) return <div className="container mx-auto px-4 pt-10"><LoginScreen onLogin={handleLogin} /></div>;
        
        return <Dashboard user={user} data={data} onLogout={handleLogout} />;
    };

    // ============================================================
    // MONTAJE
    // ============================================================
    window.onload = () => {
         const rootEl = document.getElementById('root');
         if(rootEl && window.ReactDOM) {
             try {
                 window.ReactDOM.createRoot(rootEl).render(<App />);
                 console.log('✅ Historial ITD - App montada');
             } catch(e) {
                 console.error('❌ Error al montar la app:', e);
                 rootEl.innerHTML = `
                     <div class="container mx-auto px-4 py-10 max-w-3xl">
                         <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm">
                             <h3 class="text-lg font-bold text-red-800">⚠️ Error de carga</h3>
                             <p class="text-red-700">No se pudo cargar la aplicación. Por favor, recarga la página.</p>
                             <button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">
                                 Recargar página
                             </button>
                         </div>
                     </div>
                 `;
             }
         } else {
             console.error('❌ No se encontró el elemento root o ReactDOM');
         }
    };
</script>
</body>
</html>
